version: '3.8'

# 全サービス一括起動用 Docker Compose
# 実行: docker-compose up --build

services:
  # 家計簿 UI (Flask)
  kakeibo-ui:
    build:
      context: .
      dockerfile: services/kakeibo/Dockerfile
    ports:
      - "5000:5000"
    env_file: .env
    environment:
      - PYTHONPATH=/app
    restart: unless-stopped

  # ドキュメント検索 (Flask)
  doc-search:
    build:
      context: .
      dockerfile: services/doc-search/Dockerfile
    ports:
      - "5001:5001"
    env_file: .env
    environment:
      - PYTHONPATH=/app
      - PORT=5001
    restart: unless-stopped

  # 文書ハブ（doc-processor + review/ + /pipeline スタジオを単一イメージ）
  document-hub:
    build:
      context: .
      dockerfile: services/doc-processor/Dockerfile
    ports:
      - "5002:8080"
    env_file: .env
    environment:
      - PYTHONPATH=/app
      - PORT=8080
      - PIPELINE_STUDIO=1
    restart: unless-stopped

  # Gmail クリーナ等のみ（ローカル想定・軽量）
  gmail-service:
    build:
      context: .
      dockerfile: services/gmail-service/Dockerfile
    ports:
      - "5010:5010"
    env_file: .env
    environment:
      - PORT=5010
    restart: unless-stopped

  # ネットスーパー検索 (Streamlit)
  netsuper-search:
    build:
      context: .
      dockerfile: services/netsuper-search/Dockerfile
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      - PYTHONPATH=/app:/app/services/netsuper-search
      - PORT=8501
    restart: unless-stopped

  # A4 HTML プレビュー・印刷アプリ
  html-to-a4:
    build:
      context: .
      dockerfile: services/html-to-a4/Dockerfile
    ports:
      - "5051:5051"
    env_file: .env
    environment:
      - PYTHONPATH=/app
      - PORT=5051
    restart: unless-stopped
