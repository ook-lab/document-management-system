<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>A4 HTML Previewer</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #525659;
            margin: 0; 
            padding: 20px; 
            color: #333; 
            display: flex; 
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 1000px;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            height: calc(100vh - 100px);
        }
        h2 { margin-top: 0; color: #333; }
        p.desc { font-size: 14px; color: #666; margin-bottom: 20px; }
        form { flex: 1; display: flex; flex-direction: column; }
        textarea { 
            flex: 1; 
            font-family: monospace; 
            padding: 15px; 
            font-size: 14px; 
            margin-bottom: 20px; 
            border-radius: 4px; 
            border: 1px solid #ccc; 
            resize: none; 
            background: #fafafa;
        }
        .btn { 
            padding: 15px 30px; 
            font-size: 16px; 
            font-weight: bold; 
            background-color: #007bff; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            text-align: center; 
        }
        .btn:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <div class="container">
        <h2>HTML入稿エディタ（A4 PDF最適化）</h2>
        <p class="desc">
            数式の読み込み（KaTeX等のJavaScript）を含む「完全なHTML」をごっそり貼り付けてください。<br>
            ボタンを押すと、裏側で「A4絶対にハミ出さない最高設定」を注入した状態のものが別タブで新しく開きます。
        </p>
        <!-- 入力されたHTMLを別タブへ送信 -->
        <form action="/preview" method="POST" target="_blank">
            <textarea name="html_content" placeholder="<!DOCTYPE html> から始まるHTMLコードをここに貼り付けてください..."></textarea>
            <button type="submit" class="btn">HTMLをA4プレビューで開く（別タブ）</button>
        </form>
    </div>
</body>
</html>
