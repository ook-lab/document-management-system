<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML → A4 PDF コンバーター</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <!-- CodeMirror CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">

  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --bar: #1c2128;
      --border: #30363d;
      --accent: #7c3aed;
      --fg: #e6edf3;
      --muted: #7d8590;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Inter', sans-serif;
    }
    *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; font-family: var(--sans); background: var(--bg); color: var(--fg); }
    body { display: flex; flex-direction: column; }

    /* TOOLBAR */
    #toolbar {
      height: 60px; background: var(--bar); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 20px; gap: 15px; flex-shrink: 0;
    }
    .brand { font-weight: 700; font-size: 16px; color: var(--fg); display: flex; align-items: center; gap: 8px; }
    .brand svg { color: var(--accent); }
    
    #filename {
      background: var(--bg); border: 1px solid var(--border); color: var(--fg);
      padding: 8px 12px; border-radius: 6px; font-family: var(--mono); font-size: 14px; width: 240px;
    }
    .spacer { flex: 1; }
    
    .btn {
      padding: 10px 20px; border-radius: 6px; font-weight: 600; font-size: 14px;
      cursor: pointer; border: none; transition: 0.2s; display: flex; align-items: center; gap: 8px;
    }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--panel); color: var(--fg); }
    .btn-primary { background: var(--accent); color: white; box-shadow: 0 4px 12px rgba(124,58,237,0.3); }
    .btn-primary:hover { transform: translateY(-1px); filter: brightness(1.1); }
    .btn-primary:active { transform: translateY(0); }

    /* EDITOR AREA */
    #editor-container { flex: 1; position: relative; overflow: hidden; }
    .CodeMirror { height: 100% !important; font-family: var(--mono) !important; font-size: 14px !important; }

    /* OVERLAY */
    #overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8);
      z-index: 1000; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
    }
    #overlay.show { display: flex; }
    .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="toolbar">
  <div class="brand">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    HTML → A4 PDF
  </div>
  <input id="filename" type="text" value="document" placeholder="ファイル名 (.pdfは自動付与)">
  <button id="btn-sample" class="btn btn-ghost">サンプルを読込</button>
  <div class="spacer"></div>
  <button id="btn-convert" class="btn btn-primary">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    PDFを生成して別画面で開く
  </button>
</div>

<div id="editor-container">
  <textarea id="editor-ta"></textarea>
</div>

<div id="overlay">
  <div class="spinner"></div>
  <div style="font-weight: 600;">PDFを生成しています...</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>

<script>
  const editor = CodeMirror.fromTextArea(document.getElementById('editor-ta'), {
    mode: 'htmlmixed',
    theme: 'dracula',
    lineNumbers: true,
    lineWrapping: true,
    tabSize: 2
  });

  async function generatePDF() {
    const html = editor.getValue().trim();
    if (!html) { alert('HTMLを入力してください'); return; }

    const overlay = document.getElementById('overlay');
    overlay.classList.add('show');

    try {
      const res = await fetch('/convert', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          html: html,
          filename: document.getElementById('filename').value || 'document'
        })
      });

      if (!res.ok) throw new Error('生成失敗');

      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      
      // 別ウィンドウ（タブ）でPDFを開く
      window.open(url, '_blank');
      
    } catch (e) {
      alert('エラーが発生しました: ' + e.message);
    } finally {
      overlay.classList.remove('show');
    }
  }

  document.getElementById('btn-convert').onclick = generatePDF;

  document.getElementById('btn-sample').onclick = () => {
    editor.setValue(`<!DOCTYPE html>
<html>
<head>
  <style>
    @page { size: A4; margin: 20mm; }
    body { font-family: sans-serif; line-height: 1.6; }
    h1 { color: #333; border-bottom: 2px solid #333; padding-bottom: 10px; }
    .content { margin-top: 20px; }
  </style>
</head>
<body>
  <h1>A4 PDF サンプル</h1>
  <div class="content">
    <p>ここにHTMLを記述します。生成ボタンを押すと別ウィンドウでPDFが開きます。</p>
  </div>
</body>
</html>`);
  };

  // Ctrl+S / Cmd+S でPDF生成
  window.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
      e.preventDefault();
      generatePDF();
    }
  });
</script>

</body>
</html>
