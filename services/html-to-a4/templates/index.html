<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML → A4 PDF コンバーター</title>
  <meta name="description" content="HTMLコードを貼り付けるだけでA4サイズの美しいPDFを生成します">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <!-- CodeMirror CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">

  <style>
    :root {
      --bg-app:    #0d1117;
      --bg-panel:  #161b22;
      --bg-bar:    #1c2128;
      --bg-prev:   #525659;
      --border:    #30363d;
      --accent:    #7c3aed;
      --accent-lt: #a855f7;
      --accent-glow: rgba(124,58,237,.35);
      --green:     #22c55e;
      --red:       #ef4444;
      --fg:        #e6edf3;
      --muted:     #7d8590;
      --mono:      'JetBrains Mono', monospace;
      --sans:      'Inter', system-ui, sans-serif;
      --r:         8px;
    }
    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
    html,body { height:100%; overflow:hidden; font-family:var(--sans); background:var(--bg-app); color:var(--fg); }

    /* === TOOLBAR === */
    #toolbar {
      height:56px; flex-shrink:0;
      background:var(--bg-bar);
      border-bottom:1px solid var(--border);
      display:flex; align-items:center; padding:0 18px; gap:12px; position:relative; z-index:100;
    }
    .brand {
      display:flex; align-items:center; gap:8px; margin-right:4px;
      font-size:15px; font-weight:700; letter-spacing:-.3px;
      background:linear-gradient(135deg,var(--accent-lt),#e879f9);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      white-space:nowrap;
    }
    .vdiv { width:1px; height:28px; background:var(--border); flex-shrink:0; }
    .tb-lbl { font-size:12px; color:var(--muted); white-space:nowrap; }
    #filename-input {
      background:var(--bg-panel); border:1px solid var(--border); color:var(--fg);
      font-family:var(--mono); font-size:13px; padding:6px 10px; border-radius:var(--r);
      width:180px; outline:none; transition:.15s;
    }
    #filename-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); }
    .ext { font-size:13px; color:var(--muted); font-family:var(--mono); }
    .spacer { flex:1; }
    .btn {
      display:inline-flex; align-items:center; gap:6px;
      padding:8px 14px; border:none; border-radius:var(--r);
      font-family:var(--sans); font-size:13px; font-weight:600; cursor:pointer; transition:.15s;
      white-space:nowrap;
    }
    .btn-ghost { background:transparent; color:var(--muted); border:1px solid var(--border); }
    .btn-ghost:hover { background:var(--bg-panel); color:var(--fg); border-color:#484f58; }
    .btn-primary { background:var(--accent); color:#fff; box-shadow:0 0 18px var(--accent-glow); }
    .btn-primary:hover { background:var(--accent-lt); box-shadow:0 0 26px rgba(168,85,247,.5); transform:translateY(-1px); }
    .btn-primary:active { transform:none; }
    .btn-primary:disabled { background:#374151; color:#6b7280; box-shadow:none; cursor:not-allowed; transform:none; }

    /* === STATUS BAR === */
    #statusbar {
      height:30px; flex-shrink:0;
      background:var(--bg-panel); border-bottom:1px solid var(--border);
      display:flex; align-items:center; padding:0 18px; gap:16px; font-size:12px;
    }
    .si { display:flex; align-items:center; gap:5px; color:var(--muted); }
    .dot { width:6px; height:6px; border-radius:50%; background:var(--muted); }
    .dot.ready   { background:var(--green); }
    .dot.loading { background:#f59e0b; animation:blink 1s infinite; }
    .dot.error   { background:var(--red); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
    #smsg { margin-left:auto; color:var(--muted); }

    /* === LAYOUT === */
    #layout { display:flex; flex:1; overflow:hidden; }
    body { display:flex; flex-direction:column; }

    /* Editor pane */
    #epane { display:flex; flex-direction:column; width:50%; min-width:280px; border-right:1px solid var(--border); overflow:hidden; }
    .phead {
      height:36px; flex-shrink:0;
      background:var(--bg-bar); border-bottom:1px solid var(--border);
      display:flex; align-items:center; padding:0 14px; gap:8px;
      font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.5px;
    }
    .pbadge {
      margin-left:auto; background:var(--bg-app); border:1px solid var(--border);
      padding:2px 7px; border-radius:4px; font-size:10px; color:var(--muted); font-family:var(--mono);
    }
    #ewrap { flex:1; overflow:hidden; }
    .CodeMirror { height:100% !important; font-family:var(--mono) !important; font-size:13px !important; line-height:1.65 !important; background:#1e2533 !important; }
    .CodeMirror-scroll { background:#1e2533; }

    /* Drag divider */
    #divider { width:5px; background:var(--border); cursor:col-resize; flex-shrink:0; transition:.15s; position:relative; z-index:10; }
    #divider:hover,.divider-active { background:var(--accent) !important; }
    #divider::after { content:''; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:3px; height:30px; background:rgba(255,255,255,.12); border-radius:2px; }

    /* Preview pane */
    #ppane { display:flex; flex-direction:column; flex:1; min-width:280px; overflow:hidden; }
    .pbar {
      height:36px; flex-shrink:0;
      background:var(--bg-bar); border-bottom:1px solid var(--border);
      display:flex; align-items:center; padding:0 14px; gap:8px;
    }
    .pbar-lbl { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; display:flex; align-items:center; gap:6px; }
    #refresh-btn { background:transparent; border:none; color:var(--muted); cursor:pointer; padding:4px; border-radius:4px; display:flex; align-items:center; transition:.15s; margin-left:auto; }
    #refresh-btn:hover { background:var(--bg-panel); color:var(--fg); }
    #parea { flex:1; overflow:hidden; background:var(--bg-prev); display:flex; align-items:flex-start; justify-content:center; padding:16px; }
    #pframe { width:100%; height:100%; border:none; border-radius:4px; box-shadow:0 8px 28px rgba(0,0,0,.5); display:none; }
    #empty { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; color:var(--muted); width:100%; height:100%; }
    #empty svg { opacity:.25; }
    #empty p { font-size:13px; }

    /* Overlay */
    #overlay { display:none; position:fixed; inset:0; background:rgba(13,17,23,.75); backdrop-filter:blur(4px); z-index:9999; flex-direction:column; align-items:center; justify-content:center; gap:18px; }
    #overlay.show { display:flex; }
    .spin { width:44px; height:44px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .ol-text { color:var(--fg); font-size:15px; font-weight:500; }
    .ol-sub  { color:var(--muted); font-size:13px; }

    /* Toast */
    #toast {
      position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(16px);
      background:var(--bg-bar); border:1px solid var(--border); color:var(--fg);
      padding:11px 18px; border-radius:var(--r); font-size:13px; font-weight:500;
      box-shadow:0 6px 20px rgba(0,0,0,.4); opacity:0; transition:.3s; z-index:10000;
      pointer-events:none; white-space:nowrap;
    }
    #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    #toast.ok   { border-color:var(--green); }
    #toast.err  { border-color:var(--red); }
  </style>
</head>
<body>

<!-- TOOLBAR -->
<div id="toolbar">
  <span class="brand">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    HTML → A4 PDF
  </span>
  <div class="vdiv"></div>
  <span class="tb-lbl">ファイル名</span>
  <input id="filename-input" type="text" value="output" placeholder="ファイル名">
  <span class="ext">.pdf</span>
  <div class="vdiv"></div>
  <button id="btn-sample" class="btn btn-ghost">
    <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
    サンプルHTML
  </button>
  <button id="btn-clear" class="btn btn-ghost">
    <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6m5 0V4a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v2"/></svg>
    クリア
  </button>
  <div class="spacer"></div>
  <button id="btn-convert" class="btn btn-primary">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
    PDFを生成・ダウンロード
  </button>
</div>

<!-- STATUS BAR -->
<div id="statusbar">
  <div class="si"><div class="dot ready" id="dot"></div><span id="stxt">準備完了</span></div>
  <div class="si">
    <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    <span id="chars">0 文字</span>
  </div>
  <div class="si">
    <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
    <span id="lines">0 行</span>
  </div>
  <span id="smsg">HTMLを貼り付けてPDFを生成してください</span>
</div>

<!-- LAYOUT -->
<div id="layout">
  <!-- Editor -->
  <div id="epane">
    <div class="phead">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
      HTML エディタ
      <span class="pbadge">HTML</span>
    </div>
    <div id="ewrap">
      <textarea id="html-ta"></textarea>
    </div>
  </div>

  <!-- Divider -->
  <div id="divider"></div>

  <!-- Preview -->
  <div id="ppane">
    <div class="pbar">
      <span class="pbar-lbl">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        ライブプレビュー
      </span>
      <button id="refresh-btn" title="更新">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      </button>
    </div>
    <div id="parea">
      <div id="empty">
        <svg width="56" height="56" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <p>左のエディタにHTMLを入力してください</p>
      </div>
      <iframe id="pframe" sandbox="allow-same-origin allow-scripts"></iframe>
    </div>
  </div>
</div>

<!-- LOADING OVERLAY -->
<div id="overlay">
  <div class="spin"></div>
  <div class="ol-text">PDFを生成しています...</div>
  <div class="ol-sub">WeasyPrint でA4サイズに最適化中</div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- CodeMirror JS (loaded synchronously before our script) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>

<script>
/* ============ App Bootstrap (runs after CodeMirror is loaded) ============ */

// 1. Init CodeMirror
const editor = CodeMirror.fromTextArea(document.getElementById('html-ta'), {
  mode: 'htmlmixed',
  theme: 'dracula',
  lineNumbers: true,
  lineWrapping: true,
  tabSize: 2,
  indentWithTabs: false,
});

// 2. Resize to fill panel
function resizeEditor() {
  const w = document.getElementById('ewrap');
  editor.setSize(w.offsetWidth, w.offsetHeight);
}
window.addEventListener('resize', resizeEditor);
resizeEditor();

// 3. Live preview (debounced 600ms)
let previewTimer = null;
editor.on('change', () => {
  updateStats();
  clearTimeout(previewTimer);
  previewTimer = setTimeout(refreshPreview, 600);
});

function updateStats() {
  const v = editor.getValue();
  document.getElementById('chars').textContent = v.length.toLocaleString() + ' 文字';
  document.getElementById('lines').textContent = editor.lineCount().toLocaleString() + ' 行';
}

function refreshPreview() {
  const html   = editor.getValue().trim();
  const frame  = document.getElementById('pframe');
  const empty  = document.getElementById('empty');
  if (!html) { frame.style.display = 'none'; empty.style.display = 'flex'; return; }
  frame.srcdoc       = html;
  frame.style.display= 'block';
  empty.style.display= 'none';
}

// 4. PDF Convert
async function convertToPDF() {
  const html = editor.getValue().trim();
  if (!html) { toast('⚠️ HTMLを入力してください', 'err'); return; }

  const filename = document.getElementById('filename-input').value.trim() || 'output';
  document.getElementById('btn-convert').disabled = true;
  document.getElementById('overlay').classList.add('show');
  setStatus('loading', 'PDF生成中...');

  try {
    const res = await fetch('/convert', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ html, filename }),
    });
    if (!res.ok) {
      const j = await res.json().catch(() => ({ error: res.statusText }));
      throw new Error(j.error || 'サーバーエラー');
    }
    const blob = await res.blob();
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = filename.endsWith('.pdf') ? filename : filename + '.pdf';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    setStatus('ready', '準備完了');
    toast('✅ PDFを生成しました: ' + a.download, 'ok');
  } catch (e) {
    setStatus('error', e.message);
    toast('❌ ' + e.message, 'err');
  } finally {
    document.getElementById('btn-convert').disabled = false;
    document.getElementById('overlay').classList.remove('show');
  }
}

// 5. Status
function setStatus(type, msg) {
  document.getElementById('dot').className = 'dot ' + type;
  document.getElementById('stxt').textContent = msg;
}

// 6. Toast
let toastT = null;
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + type;
  clearTimeout(toastT);
  toastT = setTimeout(() => { el.className = ''; }, 4000);
}

// 7. Sample HTML
const SAMPLE_HTML = `<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>サンプル：A4レイアウト確認</title>
  <style>
    @page { size: A4 portrait; margin: 15mm 20mm; }
    body { font-family: 'Noto Sans JP', sans-serif; color: #222; margin: 0; padding: 0; }
    h1 { font-size: 24px; text-align: center; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 20px; }
    th, td { border: 1px solid #333; padding: 8px 10px; vertical-align: middle; }
    th { background-color: #f0f0f0; }
    .section-title { border-left: 5px solid #444; padding: 4px 10px; font-size: 16px; font-weight: bold; margin: 20px 0 10px; }
    p { font-size: 13px; line-height: 1.8; text-align: justify; }
  </style>
</head>
<body>
  <h1>サンプルドキュメント（A4確認用）</h1>
  <div class="section-title">■ 基本情報</div>
  <table>
    <tr><th style="width:25%">氏名</th><td>サンプル 太郎</td></tr>
    <tr><th>生年月日</th><td>1990年1月1日</td></tr>
    <tr><th>住所</th><td>東京都千代田区1-1-1</td></tr>
    <tr><th>電話番号</th><td>090-0000-0000</td></tr>
  </table>
  <div class="section-title">■ 職務要約</div>
  <p>これはWeasyPrintによるサーバーサイドPDF生成のサンプルドキュメントです。HTMLに記述した @page ルールや CSS がそのままPDFに反映されます。</p>
  <div class="section-title">■ スキル</div>
  <table>
    <tr><th style="width:25%">カテゴリ</th><th>詳細</th></tr>
    <tr><td>プログラミング</td><td>Python, JavaScript, HTML/CSS</td></tr>
    <tr><td>ツール</td><td>Flask, WeasyPrint, Docker</td></tr>
  </table>
</body>
</html>`;

// 8. Button events
document.getElementById('btn-sample').addEventListener('click', () => {
  editor.setValue(SAMPLE_HTML);
  refreshPreview();
  toast('📄 サンプルHTMLを読み込みました', 'ok');
});

document.getElementById('btn-clear').addEventListener('click', () => {
  if (!editor.getValue().trim() || confirm('エディタの内容をクリアしますか？')) {
    editor.setValue('');
    refreshPreview();
  }
});

document.getElementById('btn-convert').addEventListener('click', convertToPDF);
document.getElementById('refresh-btn').addEventListener('click', refreshPreview);

// 9. Resizable divider
const divider = document.getElementById('divider');
const epane   = document.getElementById('epane');
const layout  = document.getElementById('layout');
let dragging  = false;

divider.addEventListener('mousedown', () => {
  dragging = true;
  divider.classList.add('divider-active');
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
});
document.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  const rect = layout.getBoundingClientRect();
  const w = Math.max(280, Math.min(e.clientX - rect.left, rect.width - 285));
  epane.style.width = w + 'px';
  resizeEditor();
});
document.addEventListener('mouseup', () => {
  if (!dragging) return;
  dragging = false;
  divider.classList.remove('divider-active');
  document.body.style.cursor = '';
  document.body.style.userSelect = '';
  resizeEditor();
});

// 10. Keyboard shortcut
document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); convertToPDF(); }
});

// Initialize stats
updateStats();
</script>
</body>
</html>
