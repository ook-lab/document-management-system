<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doda Scraper 管理画面</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', 'Inter', sans-serif; background: #f8fafc; color: #1e293b; min-height: 100vh; }
  header { background: #ffffff; border-bottom: 1px solid #e2e8f0; padding: 14px 24px; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 16px; font-weight: 700; color: #d97706; }

  .layout { display: grid; grid-template-columns: 350px 1fr; height: calc(100vh - 53px); }

  /* === サイドバー === */
  .sidebar { background: #ffffff; border-right: 1px solid #e2e8f0; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
  .script-card {
    background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 10px;
    padding: 16px; display: flex; flex-direction: column; gap: 10px;
    transition: border-color 0.2s;
  }
  .script-card.running { border-color: #fbbf24; }
  .script-card h3 { font-size: 14px; color: #1e293b; font-weight: 700; }
  .script-card p { font-size: 11px; color: #64748b; line-height: 1.4; }
  
  .btn-run {
    width: 100%; padding: 8px; background: #fbbf24; color: #92400e; border: none;
    border-radius: 6px; font-size: 13px; font-weight: 700; cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn-run:hover:not(:disabled) { background: #f59e0b; transform: translateY(-1px); }
  .btn-run:active:not(:disabled) { transform: translateY(0); }
  .btn-run:disabled { opacity: 0.3; cursor: not-allowed; }

  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group label { font-size: 10px; color: #94a3b8; text-transform: uppercase; font-weight: 700; }
  .form-group input {
    background: #ffffff; border: 1px solid #cbd5e1; border-radius: 4px;
    padding: 6px 8px; color: #1e293b; font-size: 12px;
  }

  /* === メインパネル === */
  .main { display: flex; flex-direction: column; overflow: hidden; background: #f8fafc; }
  .log-header { background: #ffffff; border-bottom: 1px solid #e2e8f0; padding: 8px 16px; font-size: 12px; color: #64748b; font-weight: 600; }
  .log-panel { flex: 1; overflow-y: auto; padding: 16px; font-family: 'Consolas', monospace; font-size: 12px; line-height: 1.5; background: #ffffff; }
  .log-line { margin-bottom: 2px; white-space: pre-wrap; word-break: break-all; }
  .log-ts { color: #94a3b8; margin-right: 8px; }
  .log-text { color: #334155; }
  .log-err { color: #e11d48; background: #fff1f2; padding: 2px 4px; border-radius: 4px; }
  .log-success { color: #059669; font-weight: bold; background: #ecfdf5; padding: 2px 4px; border-radius: 4px; }
  .placeholder { color: #94a3b8; text-align: center; margin-top: 100px; font-size: 14px; }
</style>
</head>
<body>

<header>
  <h1>🕸️ Doda Scraper 管理画面</h1>
</header>

<div class="layout">
  <div class="sidebar">
    {% for id, script in scripts.items() %}
    <div class="script-card" id="card-{{ id }}">
      <h3>{{ script.name }}</h3>
      <p>{{ script.desc }}</p>
      <div class="form-group">
        <label>追加引数</label>
        <input type="text" id="args-{{ id }}" placeholder="例: --limit 5">
      </div>
      <button class="btn-run" id="btn-{{ id }}" onclick="runScript('{{ id }}')">▶ 実行</button>
    </div>
    {% endfor %}
  </div>

  <div class="main">
    <div class="log-header" id="log-header">ログ出力</div>
    <div class="log-panel" id="log-panel">
      <div class="placeholder">スクリプトを選択して実行してください</div>
    </div>
  </div>
</div>

<script>
let activeES = null;

async function runScript(id) {
  if (activeES) activeES.close();
  
  const args = document.getElementById(`args-${id}`).value;
  const btn = document.getElementById(`btn-${id}`);
  const card = document.getElementById(`card-${id}`);
  
  // UI更新
  document.querySelectorAll('.btn-run').forEach(b => b.disabled = true);
  card.classList.add('running');
  const panel = document.getElementById('log-panel');
  panel.innerHTML = '';
  document.getElementById('log-header').textContent = `ログ: ${id}`;

  try {
    const resp = await fetch(`/api/run/${id}`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ extra_args: args })
    });
    const data = await resp.json();
    const runId = data.run_id;

    const es = new EventSource(`/api/stream/${runId}`);
    activeES = es;

    es.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.done) {
        appendLog(`--- 終了: ${msg.status} ---`, msg.status === 'success' ? 'success' : 'err');
        es.close();
        activeES = null;
        document.querySelectorAll('.btn-run').forEach(b => b.disabled = false);
        card.classList.remove('running');
      } else {
        appendLog(msg.line);
      }
    };

    es.onerror = () => {
      appendLog('SSE 接続エラー', 'err');
      es.close();
      activeES = null;
      document.querySelectorAll('.btn-run').forEach(b => b.disabled = false);
      card.classList.remove('running');
    };

  } catch (e) {
    appendLog(`エラー: ${e}`, 'err');
    document.querySelectorAll('.btn-run').forEach(b => b.disabled = false);
    card.classList.remove('running');
  }
}

function appendLog(text, type = 'text') {
  const panel = document.getElementById('log-panel');
  const div = document.createElement('div');
  div.className = 'log-line';
  const ts = new Date().toLocaleTimeString();
  div.innerHTML = `<span class="log-ts">[${ts}]</span><span class="log-${type}">${text}</span>`;
  panel.appendChild(div);
  panel.scrollTop = panel.scrollHeight;
}
</script>
</body>
</html>
