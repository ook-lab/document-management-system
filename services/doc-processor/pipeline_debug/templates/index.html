<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debug Pipeline Runner</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', 'Segoe UI', 'Meiryo', sans-serif; background: #f8fafc; color: #1e293b; min-height: 100vh; }

  .container { max-width: 900px; margin: 0 auto; padding: 20px; }

  h1 { font-size: 1.4rem; padding: 16px 0; color: #4f46e5; border-bottom: 2px solid #e2e8f0; margin-bottom: 20px; font-weight: 800; }

  /* Tabs */
  .tabs { display: flex; gap: 0; margin-bottom: 0; }
  .tab { padding: 10px 24px; cursor: pointer; background: #f1f5f9; border: 1px solid #e2e8f0; border-bottom: none;
         border-radius: 8px 8px 0 0; color: #64748b; font-size: 0.9rem; transition: all 0.2s; font-weight: 600; }
  .tab.active { background: #ffffff; color: #4f46e5; border-color: #e2e8f0; border-bottom-color: #ffffff; z-index: 1; }
  .tab:hover:not(.active) { color: #1e293b; background: #e2e8f0; }

  /* Panels */
  .panel { display: none; background: #ffffff; border: 1px solid #e2e8f0; border-radius: 0 8px 8px 8px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
  .panel.active { display: block; }

  /* Form */
  label { display: block; font-size: 0.85rem; color: #64748b; margin-bottom: 4px; margin-top: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
  label:first-child { margin-top: 0; }
  select, input[type="file"] { width: 100%; padding: 8px 12px; background: #ffffff; border: 1px solid #cbd5e1;
    border-radius: 6px; color: #1e293b; font-size: 0.9rem; }
  select:focus, input:focus { outline: none; border-color: #4f46e5; ring: 2px solid rgba(79, 70, 229, 0.1); }

  .row { display: flex; gap: 16px; }
  .row > * { flex: 1; }

  /* Checkbox */
  .checkbox-row { display: flex; align-items: center; gap: 8px; margin-top: 14px; }
  .checkbox-row input { width: auto; accent-color: #4f46e5; }
  .checkbox-row label { margin: 0; color: #334155; text-transform: none; letter-spacing: normal; }

  /* Stage badges */
  .badges { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .badge { padding: 3px 10px; border-radius: 12px; font-size: 0.78rem; font-weight: 700; }
  .badge.done { background: #dcfce7; color: #166534; }
  .badge.pending { background: #f1f5f9; color: #94a3b8; }

  /* Button */
  .btn-run { display: block; margin: 20px auto 0; padding: 10px 48px; background: #4f46e5; color: #fff;
    border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; transition: all 0.2s; font-weight: 700; }
  .btn-run:hover { background: #4338ca; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2); }
  .btn-run:disabled { background: #94a3b8; cursor: not-allowed; transform: none; box-shadow: none; }

  /* Log area */
  .section { margin-top: 20px; }
  .section-header { display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0; border-bottom: 2px solid #e2e8f0; margin-bottom: 8px; }
  .section-header h2 { font-size: 1rem; color: #1e293b; font-weight: 700; }
  .btn-clear { padding: 4px 12px; background: #ffffff; border: 1px solid #cbd5e1; border-radius: 4px;
    color: #64748b; cursor: pointer; font-size: 0.8rem; font-weight: 600; }
  .btn-clear:hover { color: #1e293b; border-color: #94a3b8; }

  #logArea { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px;
    height: 300px; overflow-y: auto; font-family: 'Consolas', 'Monaco', monospace; font-size: 0.82rem;
    line-height: 1.6; white-space: pre-wrap; word-break: break-all; color: #334155; }
  .log-info { color: #0284c7; }
  .log-warn { color: #d97706; }
  .log-error { color: #dc2626; background: #fef2f2; border-radius: 4px; padding: 0 4px; }
  .log-debug { color: #94a3b8; }

  /* File list */
  .file-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .file-btn { padding: 6px 14px; background: #ffffff; border: 1px solid #cbd5e1; border-radius: 6px;
    color: #4f46e5; cursor: pointer; font-size: 0.82rem; transition: all 0.2s; font-weight: 600; }
  .file-btn:hover { background: #f8fafc; border-color: #4f46e5; }

  /* JSON viewer modal */
  .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(15, 23, 42, 0.6); z-index: 100; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
  .modal-overlay.open { display: flex; }
  .modal { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 12px; width: 80%; max-width: 800px;
    max-height: 80vh; display: flex; flex-direction: column; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
  .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px;
    border-bottom: 1px solid #e2e8f0; }
  .modal-header h3 { font-size: 0.95rem; color: #1e293b; font-weight: 700; }
  .modal-close { background: none; border: none; color: #94a3b8; font-size: 1.5rem; cursor: pointer; line-height: 1; }
  .modal-close:hover { color: #1e293b; }
  .modal-body { padding: 16px; overflow-y: auto; flex: 1; background: #fcfcfc; }
  .modal-body pre { font-family: 'Consolas', monospace; font-size: 0.82rem; line-height: 1.5;
    color: #1e293b; white-space: pre-wrap; word-break: break-all; }

  /* Spinner */
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #e2e8f0;
    border-top-color: #4f46e5; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .status-msg { text-align: center; margin-top: 10px; font-size: 0.85rem; font-weight: 600; }
  .status-msg.running { color: #4f46e5; }
  .status-msg.done { color: #059669; }
  .status-msg.error { color: #dc2626; }

  /* Diagnosis panel */
  #diagPanel { display: none; }
  .diag-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .diag-verdict { font-size: 1.1rem; font-weight: 800; padding: 4px 16px; border-radius: 6px; }
  .diag-verdict.ALLOW { background: #dcfce7; color: #166534; }
  .diag-verdict.BLOCK { background: #fee2e2; color: #991b1b; }

  .diag-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .diag-card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; }
  .diag-card h3 { font-size: 0.82rem; color: #64748b; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700; }
  .diag-card.full { grid-column: 1 / -1; }

  .check-row { display: flex; align-items: flex-start; gap: 8px; padding: 5px 0;
               border-bottom: 1px solid #f1f5f9; font-size: 0.83rem; }
  .check-row:last-child { border-bottom: none; }
  .check-icon { flex-shrink: 0; font-size: 1rem; width: 20px; text-align: center; margin-top: 1px; }
  .check-label { flex: 1; color: #334155; }
  .check-label .sub { color: #64748b; font-size: 0.78rem; margin-top: 2px; }
  .check-val { color: #4f46e5; font-family: monospace; font-size: 0.82rem; white-space: nowrap; font-weight: 600; }
  .check-val.ok { color: #059669; }
  .check-val.ng { color: #dc2626; }

  .meta-row { display: flex; gap: 8px; padding: 4px 0; font-size: 0.82rem;
              border-bottom: 1px solid #f1f5f9; }
  .meta-row:last-child { border-bottom: none; }
  .meta-key { color: #64748b; width: 80px; flex-shrink: 0; }
  .meta-val { color: #1e293b; font-family: monospace; word-break: break-all; }

  .page-type-badge { display: inline-block; padding: 2px 10px; border-radius: 10px;
                     font-size: 0.78rem; font-weight: 700; margin: 2px; }
  .page-type-badge.WORD { background: #e0f2fe; color: #0369a1; }
  .page-type-badge.REPORT { background: #dcfce7; color: #166534; }
  .page-type-badge.DTP { background: #f3e8ff; color: #7e22ce; }
  .page-type-badge.COVER { background: #fef3c7; color: #92400e; }
  .page-type-badge.UNKNOWN { background: #fee2e2; color: #991b1b; }

  .suggestion { padding: 8px 12px; border-radius: 6px; margin-top: 8px; font-size: 0.83rem; }
  .suggestion.info { background: #f0f9ff; border-left: 4px solid #0ea5e9; color: #0369a1; }
  .suggestion.fix  { background: #f0fdf4; border-left: 4px solid #22c55e; color: #15803d; }
  .suggestion strong { display: block; margin-bottom: 4px; }

  .pattern-toggle { cursor: pointer; color: #64748b; font-size: 0.8rem; margin-top: 8px;
                    text-decoration: underline; font-weight: 600; }
  .pattern-toggle:hover { color: #1e293b; }
  .pattern-table { display: none; margin-top: 8px; font-size: 0.78rem; background: #ffffff; padding: 8px; border-radius: 4px; border: 1px solid #e2e8f0; }
  .pattern-table.open { display: block; }
  .pattern-group { margin-bottom: 6px; }
  .pattern-group-name { color: #4f46e5; font-weight: 700; }
  .pattern-list { color: #64748b; padding-left: 12px; }

  .hub-nav {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 16px;
    padding: 12px 0;
    border-bottom: 1px solid #e2e8f0;
  }
  .hub-nav a {
    color: #4f46e5;
    font-weight: 600;
    font-size: 0.88rem;
    text-decoration: none;
    padding: 6px 12px;
    border-radius: 6px;
    border: 1px solid #c7d2fe;
    background: #fff;
  }
  .hub-nav a:hover { background: #eef2ff; }
</style>
</head>
<body>
<div class="container">
  <nav class="hub-nav" aria-label="文書ハブ内の移動">
    <a href="/">Run Requests</a>
    <a href="/documents/review">ドキュメントビューア</a>
    <a href="/emails/inbox">メール受信トレイ</a>
    <a href="/fast-index-ui">高速インデックス</a>
    <a href="/pipeline" aria-current="page">パイプラインスタジオ</a>
  </nav>
  <h1>Debug Pipeline Runner</h1>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" data-tab="new" onclick="switchTab('new')">新規セッション</div>
    <div class="tab" data-tab="existing" onclick="switchTab('existing')">既存セッション</div>
  </div>

  <!-- New Session Panel -->
  <div class="panel active" id="panel-new">
    <label for="pdfFile">PDF ファイル</label>
    <input type="file" id="pdfFile" accept=".pdf">

    <div class="row">
      <div>
        <label for="startStageNew">開始</label>
        <select id="startStageNew"></select>
      </div>
      <div>
        <label for="endStageNew">終了</label>
        <select id="endStageNew"></select>
      </div>
    </div>

    <div class="checkbox-row">
      <input type="checkbox" id="forceNew">
      <label for="forceNew">強制実行（キャッシュ無視）</label>
    </div>

    <button class="btn-run" id="btnRunNew" onclick="runNew()">&#9654; 実行</button>
  </div>

  <!-- Existing Session Panel -->
  <div class="panel" id="panel-existing">
    <label for="sessionSelect">セッション</label>
    <select id="sessionSelect" onchange="onSessionChange()">
      <option value="">-- 選択してください --</option>
    </select>
    <div class="badges" id="stageBadges"></div>

    <div class="row">
      <div>
        <label for="startStageEx">開始</label>
        <select id="startStageEx"></select>
      </div>
      <div>
        <label for="endStageEx">終了</label>
        <select id="endStageEx"></select>
      </div>
    </div>

    <div class="checkbox-row">
      <input type="checkbox" id="forceEx" checked>
      <label for="forceEx">強制実行（キャッシュ無視）</label>
    </div>

    <button class="btn-run" id="btnRunEx" onclick="runExisting()">&#9654; 実行</button>
  </div>

  <!-- Log Output -->
  <div class="section">
    <div class="section-header">
      <h2>ログ出力</h2>
      <button class="btn-clear" onclick="clearLog()">消去</button>
    </div>
    <div id="statusMsg" class="status-msg"></div>
    <div id="logArea"></div>
  </div>

  <!-- Output Files -->
  <div class="section">
    <div class="section-header">
      <h2>出力ファイル</h2>
    </div>
    <div class="file-list" id="fileList">
      <span style="color:#666; font-size:0.85rem;">実行後に表示されます</span>
    </div>
  </div>

  <!-- Stage A Diagnosis -->
  <div class="section" id="diagPanel">
    <div class="section-header">
      <h2>Stage A 診断</h2>
    </div>
    <div id="diagContent"></div>
  </div>
</div>

<!-- JSON Viewer Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">file.json</h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <pre id="modalContent"></pre>
    </div>
  </div>
</div>

<script>
// ────────────────────────────────────────
// Stage data (from server)
// ────────────────────────────────────────
const STAGES = {{ stages | tojson }};
const SUBSTAGES = {{ substages | tojson }};
const LABELS = {{ labels | tojson }};
const STAGE_DEPS = {{ stage_deps | tojson }};

// Build stage options for dropdowns
function buildStageOptions(selectId, defaultLabel) {
  const sel = document.getElementById(selectId);
  sel.innerHTML = '';
  // Default
  const defOpt = document.createElement('option');
  defOpt.value = '';
  defOpt.textContent = defaultLabel;
  sel.appendChild(defOpt);

  STAGES.forEach(stage => {
    const grp = document.createElement('optgroup');
    grp.label = 'Stage ' + stage;
    // Stage-level option
    const stageOpt = document.createElement('option');
    stageOpt.value = stage;
    stageOpt.textContent = stage + ' - 全体';
    grp.appendChild(stageOpt);
    // Substages
    (SUBSTAGES[stage] || []).forEach(sub => {
      const opt = document.createElement('option');
      opt.value = sub;
      opt.textContent = sub + ' - ' + (LABELS[sub] || '');
      grp.appendChild(opt);
    });
    sel.appendChild(grp);
  });
}

// ────────────────────────────────────────
// Tab switching
// ────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.getElementById('panel-new').classList.toggle('active', tab === 'new');
  document.getElementById('panel-existing').classList.toggle('active', tab === 'existing');
  if (tab === 'existing') loadSessions();
}

// ────────────────────────────────────────
// Session loading
// ────────────────────────────────────────
function loadSessions() {
  fetch('/api/sessions')
    .then(r => r.json())
    .then(sessions => {
      const sel = document.getElementById('sessionSelect');
      sel.innerHTML = '<option value="">-- 選択してください --</option>';
      sessions.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.id;
        const stageInfo = s.completed_stages.join(',') || 'なし';
        opt.textContent = s.id + ' (' + stageInfo + ')' + (s.pdf ? ' [' + s.pdf + ']' : '');
        sel.appendChild(opt);
      });
    });
}

function onSessionChange() {
  const sid = document.getElementById('sessionSelect').value;
  if (!sid) {
    document.getElementById('stageBadges').innerHTML = '';
    return;
  }
  fetch('/api/sessions/' + sid + '/check')
    .then(r => r.json())
    .then(data => {
      // Badges
      const badges = document.getElementById('stageBadges');
      badges.innerHTML = '';
      STAGES.forEach(s => {
        const b = document.createElement('span');
        b.className = 'badge ' + (data.completed.includes(s) ? 'done' : 'pending');
        b.textContent = s + (data.completed.includes(s) ? ' ✓' : ' ✗');
        badges.appendChild(b);
      });
      // File list
      renderFiles(data.files, sid);
      // Diagnosis
      if (data.completed.includes('A')) loadDiagnosis(sid);
    });
}

// ────────────────────────────────────────
// Run pipeline
// ────────────────────────────────────────
let currentEventSource = null;

function runNew() {
  const fileInput = document.getElementById('pdfFile');
  if (!fileInput.files.length) { alert('PDF ファイルを選択してください'); return; }

  const form = new FormData();
  form.append('mode', 'new');
  form.append('pdf', fileInput.files[0]);
  form.append('start', document.getElementById('startStageNew').value);
  form.append('end', document.getElementById('endStageNew').value);
  form.append('force', document.getElementById('forceNew').checked ? 'true' : 'false');

  startRun(form, 'btnRunNew');
}

function runExisting() {
  const sid = document.getElementById('sessionSelect').value;
  if (!sid) { alert('セッションを選択してください'); return; }

  const form = new FormData();
  form.append('mode', 'existing');
  form.append('session_id', sid);
  form.append('start', document.getElementById('startStageEx').value);
  form.append('end', document.getElementById('endStageEx').value);
  form.append('force', document.getElementById('forceEx').checked ? 'true' : 'false');

  startRun(form, 'btnRunEx');
}

function startRun(formData, btnId) {
  const btn = document.getElementById(btnId);
  btn.disabled = true;
  clearLog();
  setStatus('running', '<span class="spinner"></span>実行中...');

  fetch('/api/run', { method: 'POST', body: formData })
    .then(r => r.json())
    .then(data => {
      if (data.error) {
        setStatus('error', data.error);
        btn.disabled = false;
        return;
      }
      connectSSE(data.job_id, data.session_id, btn);
    })
    .catch(err => {
      setStatus('error', 'リクエスト失敗: ' + err);
      btn.disabled = false;
    });
}

function connectSSE(jobId, sessionId, btn) {
  if (currentEventSource) currentEventSource.close();

  const es = new EventSource('/api/logs/' + jobId);
  currentEventSource = es;

  es.onmessage = function(e) {
    const data = JSON.parse(e.data);
    if (data.type === 'log') {
      appendLog(data.line);
    } else if (data.type === 'done') {
      es.close();
      currentEventSource = null;
      btn.disabled = false;
      if (data.error) {
        setStatus('error', '完了（エラーあり）: ' + data.error);
      } else {
        setStatus('done', '完了');
      }
      // Refresh files & diagnosis
      refreshFiles(sessionId);
      loadDiagnosis(sessionId);
    }
  };

  es.onerror = function() {
    es.close();
    currentEventSource = null;
    btn.disabled = false;
    setStatus('error', '接続が切断されました');
  };
}

// ────────────────────────────────────────
// Log display
// ────────────────────────────────────────
function appendLog(line) {
  const area = document.getElementById('logArea');
  const div = document.createElement('div');
  // Color by level
  if (line.includes('| ERROR')) div.className = 'log-error';
  else if (line.includes('| WARNI') || line.includes('| WARNING')) div.className = 'log-warn';
  else if (line.includes('| DEBUG')) div.className = 'log-debug';
  else div.className = 'log-info';
  div.textContent = line;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function clearLog() {
  document.getElementById('logArea').innerHTML = '';
  setStatus('', '');
}

function setStatus(cls, html) {
  const el = document.getElementById('statusMsg');
  el.className = 'status-msg ' + cls;
  el.innerHTML = html;
}

// ────────────────────────────────────────
// File list
// ────────────────────────────────────────
function refreshFiles(sessionId) {
  fetch('/api/sessions/' + sessionId + '/check')
    .then(r => r.json())
    .then(data => {
      renderFiles(data.files, sessionId);
      // Also update badges if on existing tab
      if (document.getElementById('sessionSelect').value === sessionId) {
        const badges = document.getElementById('stageBadges');
        badges.innerHTML = '';
        STAGES.forEach(s => {
          const b = document.createElement('span');
          b.className = 'badge ' + (data.completed.includes(s) ? 'done' : 'pending');
          b.textContent = s + (data.completed.includes(s) ? ' ✓' : ' ✗');
          badges.appendChild(b);
        });
      }
    });
}

function renderFiles(files, sessionId) {
  const container = document.getElementById('fileList');
  container.innerHTML = '';
  if (!files || !files.length) {
    container.innerHTML = '<span style="color:#666; font-size:0.85rem;">ファイルなし</span>';
    return;
  }
  files.forEach(f => {
    const btn = document.createElement('button');
    btn.className = 'file-btn';
    btn.textContent = f.name;
    btn.title = 'Size: ' + (f.size / 1024).toFixed(1) + 'KB  Modified: ' + f.modified;
    btn.onclick = () => openFile(sessionId, f.name);
    container.appendChild(btn);
  });
}

// ────────────────────────────────────────
// JSON viewer modal
// ────────────────────────────────────────
function openFile(sessionId, filename) {
  document.getElementById('modalTitle').textContent = filename;
  document.getElementById('modalContent').textContent = '読み込み中...';
  document.getElementById('modalOverlay').classList.add('open');

  fetch('/api/files/' + sessionId + '/' + filename)
    .then(r => r.json())
    .then(data => {
      document.getElementById('modalContent').textContent = JSON.stringify(data, null, 2);
    })
    .catch(err => {
      document.getElementById('modalContent').textContent = 'エラー: ' + err;
    });
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

// ────────────────────────────────────────
// Diagnosis
// ────────────────────────────────────────
function loadDiagnosis(sessionId) {
  const panel = document.getElementById('diagPanel');
  const content = document.getElementById('diagContent');
  panel.style.display = 'block';
  content.innerHTML = '<span style="color:#666;font-size:0.85rem;">読み込み中...</span>';

  fetch('/api/sessions/' + sessionId + '/diagnosis')
    .then(r => r.json())
    .then(d => {
      if (!d.available) {
        content.innerHTML = '<span style="color:#666;font-size:0.85rem;">Stage A 未実行</span>';
        return;
      }
      content.innerHTML = buildDiagHTML(d);
    })
    .catch(() => {
      content.innerHTML = '<span style="color:#f07070;font-size:0.85rem;">診断データ取得失敗</span>';
    });
}

function buildDiagHTML(d) {
  const c = d.checks;
  const ok = v => v ? '✓' : '✗';
  const cls = v => v ? 'ok' : 'ng';

  // 総合判定
  const verdictCls = d.decision === 'ALLOW' ? 'ALLOW' : 'BLOCK';
  let html = `<div class="diag-header">
    <div>
      <span style="font-size:0.85rem;color:#888;">種別: </span>
      <strong style="color:#e0e0e0;">${d.origin_app}</strong>
      <span style="margin:0 8px;color:#555;">|</span>
      <span style="font-size:0.85rem;color:#888;">信頼度: </span>
      <strong style="color:${c.confidence_ok ? '#6fdd8b' : '#f07070'};">${d.confidence}</strong>
      <span style="margin:0 8px;color:#555;">|</span>
      <span style="font-size:0.85rem;color:#888;">レイアウト: </span>
      <strong style="color:#e0e0e0;">${d.layout_profile}</strong>
    </div>
    <span class="diag-verdict ${verdictCls}">${d.decision}${d.block_code ? ' (' + d.block_code + ')' : ''}</span>
  </div>`;

  html += '<div class="diag-grid">';

  // ① メタデータ
  html += `<div class="diag-card">
    <h3>① メタデータ（Creator/Producer）</h3>`;
  for (const [k, v] of Object.entries(d.metadata)) {
    if (k === 'Title' || k === 'Author') continue;
    html += `<div class="meta-row"><span class="meta-key">${k}</span><span class="meta-val">${escHtml(v)}</span></div>`;
  }
  html += `<div style="margin-top:8px; font-size:0.82rem; color:${c.confidence_ok ? '#6fdd8b' : '#f07070'};">
    → ${escHtml(d.reason)}
  </div>`;

  // メタデータ照合詳細（採点内容・採点方法）
  if (d.meta_match_detail) {
    const md = d.meta_match_detail;
    html += `<div style="margin-top:10px;">
      <div style="font-size:0.78rem;color:#666;margin-bottom:4px;">照合対象文字列:</div>
      <div style="font-family:monospace;font-size:0.82rem;color:#a0c4ff;background:#0d0d1a;padding:4px 8px;border-radius:4px;word-break:break-all;">"${escHtml(md.searched)}"</div>
    </div>
    <table style="width:100%;margin-top:8px;font-size:0.78rem;border-collapse:collapse;">
      <tr style="color:#666;border-bottom:1px solid #2a2a42;">
        <th style="text-align:left;padding:3px 6px;width:30%;">種別</th>
        <th style="text-align:left;padding:3px 6px;">パターン</th>
        <th style="text-align:center;padding:3px 6px;width:40px;">結果</th>
      </tr>`;
    for (const r of md.results) {
      const rowCls = r.matched ? 'color:#6fdd8b' : 'color:#555';
      const icon = r.matched ? '✓' : '✗';
      const iconCls = r.matched ? '#6fdd8b' : '#3a3a3a';
      const patternStr = r.patterns.map(p =>
        r.matched && p === r.matched_pattern
          ? `<span style="color:#ffdd60;font-weight:bold;">${escHtml(p)}</span>`
          : `<span style="color:#444;">${escHtml(p)}</span>`
      ).join(' <span style="color:#333;">|</span> ');
      html += `<tr style="border-bottom:1px solid #1e1e30;${rowCls}">
        <td style="padding:3px 6px;">${r.app}</td>
        <td style="padding:3px 6px;font-family:monospace;">${patternStr}</td>
        <td style="text-align:center;color:${iconCls};font-weight:bold;">${icon}</td>
      </tr>`;
    }
    html += '</table>';
  }
  html += '</div>';

  // ② ページフォント解析
  html += `<div class="diag-card">
    <h3>② ページフォント解析</h3>`;
  if (Object.keys(d.page_types).length === 0) {
    html += '<span style="color:#666;font-size:0.82rem;">データなし</span>';
  } else {
    for (const [t, cnt] of Object.entries(d.page_types)) {
      html += `<span class="page-type-badge ${t}">${t}: ${cnt}p</span>`;
    }
    const hasContent = Object.keys(d.page_types).some(t => t !== 'UNKNOWN' && t !== 'COVER');
    html += `<div style="margin-top:8px; font-size:0.82rem; color:${hasContent ? '#6fdd8b' : '#f07070'};">
      ${hasContent ? '✓ フォントで種別確定' : '✗ フォントが既知パターン不一致'}
    </div>`;
  }

  // ページ別フォント詳細（採点内容）
  if (d.page_font_detail && Object.keys(d.page_font_detail).length > 0) {
    html += `<div style="margin-top:10px;">`;
    for (const [pageIdx, pd] of Object.entries(d.page_font_detail)) {
      const isUnknown = pd.matched_type === 'UNKNOWN';
      html += `<div style="margin-bottom:6px;">
        <div style="font-size:0.78rem;color:#888;margin-bottom:2px;">Page ${pageIdx}
          <span style="margin-left:8px;color:${isUnknown ? '#f07070' : '#6fdd8b'};">→ ${pd.matched_type}</span>
          ${pd.matched_font ? `<span style="color:#888;font-size:0.75rem;"> (font="${escHtml(pd.matched_font)}", pattern="${escHtml(pd.matched_pattern)}")</span>` : ''}
        </div>
        <div style="font-family:monospace;font-size:0.75rem;color:${isUnknown ? '#664444' : '#446644'};background:#0d0d1a;padding:3px 8px;border-radius:4px;word-break:break-all;">
          検出フォント: ${pd.fonts.length > 0 ? pd.fonts.map(f => escHtml(f)).join(', ') : '(なし)'}
        </div>
      </div>`;
    }
    // フォントパターン参照表（折りたたみ）
    html += `<div class="pattern-toggle" onclick="togglePatterns(this)" style="margin-top:6px;">▶ 照合パターン一覧を表示</div>
      <div class="pattern-table">`;
    for (const [grp, patterns] of Object.entries(d.page_patterns || {})) {
      html += `<div class="pattern-group">
        <span class="pattern-group-name">${grp}</span>:
        <span class="pattern-list">${patterns.join(' / ')}</span>
      </div>`;
    }
    html += '</div>';
    html += '</div>';
  }
  html += '</div>';

  // ③ Gatekeeper チェック
  html += `<div class="diag-card">
    <h3>③ Gatekeeper チェック</h3>
    <div class="check-row">
      <span class="check-icon">${c.confidence_ok ? '✓' : '✗'}</span>
      <span class="check-label">信頼度チェック<div class="sub">confidence == HIGH が必須</div></span>
      <span class="check-val ${cls(c.confidence_ok)}">${d.confidence}</span>
    </div>
    <div class="check-row">
      <span class="check-icon">${c.confidence_ok ? (c.allowlist_ok ? '✓' : '✗') : '―'}</span>
      <span class="check-label">Allowlistチェック<div class="sub">(${d.origin_app}, ${d.layout_profile})</div></span>
      <span class="check-val ${c.confidence_ok ? cls(c.allowlist_ok) : ''}">${c.confidence_ok ? (c.allowlist_ok ? 'OK' : '対象外') : 'スキップ'}</span>
    </div>`;

  if (c.threshold_results) {
    for (const tr of c.threshold_results) {
      html += `<div class="check-row">
        <span class="check-icon">${ok(tr.ok)}</span>
        <span class="check-label">${tr.name}<div class="sub">条件: ${tr.condition}</div></span>
        <span class="check-val ${cls(tr.ok)}">${tr.value}</span>
      </div>`;
    }
  } else if (c.allowlist_ok) {
    html += `<div class="check-row">
      <span class="check-icon" style="color:#555;">―</span>
      <span class="check-label" style="color:#555;">閾値チェック<div class="sub">WORDのみ適用</div></span>
      <span class="check-val" style="color:#555;">スキップ</span>
    </div>`;
  }
  html += '</div>';

  // ④ メトリクス
  const m = d.layout_metrics;
  html += `<div class="diag-card">
    <h3>④ レイアウトメトリクス</h3>
    <div class="check-row">
      <span class="check-icon" style="color:#555;">—</span>
      <span class="check-label">avg_images/page<div class="sub">≤10 でWORD閾値OK</div></span>
      <span class="check-val ${m.avg_images <= 10 ? 'ok' : 'ng'}">${m.avg_images}</span>
    </div>
    <div class="check-row">
      <span class="check-icon" style="color:#555;">—</span>
      <span class="check-label">avg_words/page<div class="sub">≥20 でWORD閾値OK</div></span>
      <span class="check-val ${m.avg_words >= 20 ? 'ok' : 'ng'}">${m.avg_words}</span>
    </div>
    <div class="check-row">
      <span class="check-icon" style="color:#555;">—</span>
      <span class="check-label">avg_chars/page<div class="sub">≥100 でWORD閾値OK</div></span>
      <span class="check-val ${m.avg_chars >= 100 ? 'ok' : 'ng'}">${m.avg_chars}</span>
    </div>
    <div class="check-row">
      <span class="check-icon" style="color:#555;">—</span>
      <span class="check-label">avg_x_std<div class="sub">≥100 → FIXED判定</div></span>
      <span class="check-val">${m.avg_x_std}</span>
    </div>
  </div>`;

  html += '</div>'; // diag-grid

  // 提案
  if (d.suggestions && d.suggestions.length > 0) {
    html += '<div style="margin-top:12px;">';
    for (const s of d.suggestions) {
      html += `<div class="suggestion ${s.type}"><strong>${escHtml(s.title)}</strong>${escHtml(s.text)}</div>`;
    }
    html += '</div>';
  }

  return html;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function togglePatterns(el) {
  const table = el.nextElementSibling;
  const open = table.classList.toggle('open');
  el.textContent = (open ? '▼' : '▶') + el.textContent.slice(1);
}

// ────────────────────────────────────────
// Init
// ────────────────────────────────────────
buildStageOptions('startStageNew', '-- 最初から --');
buildStageOptions('endStageNew', '-- 最後まで --');
buildStageOptions('startStageEx', '-- 最初から --');
buildStageOptions('endStageEx', '-- 最後まで --');

// Set default end to G
['endStageNew', 'endStageEx'].forEach(id => {
  const sel = document.getElementById(id);
  for (let i = 0; i < sel.options.length; i++) {
    if (sel.options[i].value === 'G') { sel.selectedIndex = i; break; }
  }
});

// Keyboard shortcut: Escape to close modal
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
