<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Maker | Final Fidelity</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.7/ace.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --border: #cbd5e1; --accent: #2563eb; --header-h: 64px; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Noto Sans JP', sans-serif; background: #f8fafc; overflow: hidden; }
        .layout { display: grid; grid-template-rows: var(--header-h) 1fr; height: 100vh; }
        header { background: #fff; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .logo { font-size: 16px; font-weight: 800; color: #0f172a; letter-spacing: 0.1em; }
        .controls { display: flex; align-items: center; gap: 12px; }
        button { padding: 10px 24px; border-radius: 4px; font-size: 14px; font-weight: 700; cursor: pointer; transition: 0.2s; border: 1px solid var(--border); background: #fff; }
        button:hover { background: #f1f5f9; border-color: #94a3b8; }
        .btn-p { background: #2563eb; color: #fff; border: none; }
        .btn-p:hover { background: #1d4ed8; transform: translateY(-1px); }

        .main { display: flex; height: 100%; overflow: hidden; }
        .editor-container { width: 45%; display: flex; flex-direction: column; background: #fff; border-right: 1px solid var(--border); }
        .label { background: #f1f5f9; padding: 8px 16px; border-bottom: 1px solid var(--border); font-size: 11px; font-weight: 800; color: #64748b; }
        #editor { flex: 1; }

        .preview-container { flex: 1; display: flex; flex-direction: column; background: #525659; overflow: auto; padding: 40px; align-items: center; }
        #preview-frame { width: 210mm; min-height: 297mm; background: #fff; border: none; box-shadow: 0 10px 40px rgba(0,0,0,0.4); transform-origin: top center; }

        .pdf-overlay { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95); z-index: 9000; flex-direction: column; padding: 30px; }
        .pdf-header { display: flex; justify-content: space-between; align-items: center; color: #fff; margin-bottom: 15px; }
        .pdf-viewer { flex: 1; background: #fff; border-radius: 4px; overflow: hidden; }
        #pdf-frame { width: 100%; height: 100%; border: none; }
        .loading { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.8); z-index: 5000; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; }
    </style>
</head>
<body>

    <div id="loading" class="loading">PDFを几帳面に生成中...</div>

    <div id="pdf-overlay" class="pdf-overlay">
        <div class="pdf-header">
            <div style="font-weight: 800; font-size: 18px;">最終確認: 生成されたPDF (4ページ)</div>
            <div style="display: flex; gap: 15px;">
                <button onclick="closePdf()">閉じて修正</button>
                <button class="btn-p" id="save-btn">この内容で保存する</button>
            </div>
        </div>
        <div class="pdf-viewer"><iframe id="pdf-frame"></iframe></div>
    </div>

    <div class="layout">
        <header>
            <div class="logo">RESUME STUDIO</div>
            <div class="controls">
                <button onclick="restore()">履歴から復元</button>
                <button class="btn-p" onclick="previewPdf()">PDFに変換して確認</button>
            </div>
        </header>

        <main class="main">
            <div class="editor-container">
                <div class="label">MASTER HTML SOURCE</div>
                <div id="editor"></div>
            </div>
            <div class="preview-container">
                <div style="margin-bottom: 20px; display: flex; align-items: center; gap: 12px;">
                    <span style="color:#fff; font-size:12px; font-weight:bold;">PREVIEW ZOOM:</span>
                    <input type="range" min="0.4" max="1.1" step="0.05" value="0.80" oninput="frame.style.transform=`scale(${this.value})`">
                </div>
                <iframe id="preview-frame"></iframe>
            </div>
        </main>
    </div>

    <script>

            editor.setTheme("ace/theme/chrome");
            editor.session.setMode("ace/mode/html");

            // お客様の【最新】マスターHTMLをセット
            const latestHTML = `<!DOCTYPE html>

  .achievement-block { margin-bottom: 20px; border: 1px solid #ddd; padding: 12px; border-radius: 4px; }
  .achievement-title { font-size: 14px; font-weight: 700; color: #333; margin-bottom: 8px; display: flex; align-items: center; }
  .achievement-title span { background-color: #444; color: #fff; padding: 2px 6px; font-size: 11px; margin-right: 8px; border-radius: 3px; }
  .achievement-content dt { font-weight: 700; font-size: 12px; float: left; clear: left; width: 50px; color: #555; }
  .achievement-content dd { font-size: 12px; margin-left: 50px; margin-bottom: 8px; line-height: 1.6; }
</style>
</head>
<body>

            editor.setValue(latestHTML, -1);
            editor.session.on('change', () => {
                const b = new Blob([editor.getValue()], { type: 'text/html' });
                frame.src = URL.createObjectURL(b);
                localStorage.setItem('resume_user_master_v2', editor.getValue());
            });
            editor.session._emit('change');
            frame.style.transform = `scale(0.80)`;
        }

        async function previewPdf() {
            document.getElementById('loading').style.display = 'flex';
            try {
                const r = await fetch('/convert', { method: 'POST', body: JSON.stringify({ html: editor.getValue() }) });
                const b = await r.blob();
                if (currentUrl) URL.revokeObjectURL(currentUrl);
                currentUrl = URL.createObjectURL(b);
                document.getElementById('pdf-frame').src = currentUrl;
                document.getElementById('pdf-overlay').style.display = 'flex';
                document.getElementById('save-btn').onclick = () => {
                    const a = document.createElement('a'); a.href = currentUrl; a.download = 'resume_official.pdf'; a.click();
                };
            } catch (e) { alert(e.message); }
            finally { document.getElementById('loading').style.display = 'none'; }
        }

        function closePdf() { document.getElementById('pdf-overlay').style.display = 'none'; }
        function restore() { 
            const b = localStorage.getItem('resume_user_master_v2');
            if (b && confirm('前回の編集内容を復元しますか？')) editor.setValue(b, -1);
        }
        window.onload = init;
    </script>
</body>
</html>
