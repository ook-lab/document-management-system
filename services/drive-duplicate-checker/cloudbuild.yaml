steps:
  # 1. 整理アプリのビルド (Googleの工場で軽量な箱にデプロイ)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/drive-checker:latest'
      - '-f'
      - 'services/drive-duplicate-checker/Dockerfile'
      - '.'

  # 2. 保存した箱を公式レポジトリへプッシュ
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/drive-checker:latest'

  # 3. Cloud Runへのデプロイ実行 (最小スペック & ローカルパワー重視設計)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'drive-checker'
      - '--image=asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/drive-checker:latest'
      - '--region=asia-northeast1'
      - '--allow-unauthenticated'
      - '--cpu=0.08'  # [重要] 最小CPU設定
      - '--memory=128Mi' # [重要] 最小メモリ設定
      - '--set-env-vars=RUN_MODE=CLOUD'

options:
  logging: CLOUD_LOGGING_ONLY
