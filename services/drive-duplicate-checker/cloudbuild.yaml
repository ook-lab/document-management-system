steps:
  # 1. Docker イメージをビルド（Google Container Registry へ）
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/drive-checker:latest'
      - '-f'
      - 'services/drive-duplicate-checker/Dockerfile'
      - '.'

  # 2. イメージをプッシュ
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/drive-checker:latest'

  # 3. Cloud Run へデプロイ（最小リソース）
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'drive-checker'
      - '--image=asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/drive-checker:latest'
      - '--region=asia-northeast1'
      - '--allow-unauthenticated'
      - '--service-account=document-management-system@$PROJECT_ID.iam.gserviceaccount.com'
      - '--cpu=0.08'
      - '--memory=128Mi'
      - '--timeout=300'
      - '--update-env-vars=GOOGLE_CLOUD_PROJECT=$PROJECT_ID,RUN_MODE=CLOUD'

options:
  logging: CLOUD_LOGGING_ONLY
  substitutionOption: ALLOW_LOOSE
