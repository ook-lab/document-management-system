steps:
  # 1. ??E????????E(Google??????????E?E??)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/drive-checker:latest'
      - '-f'
      - 'services/drive-duplicate-checker/Dockerfile'
      - '.'

  # 2. ???????E???????????
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/drive-checker:latest'

  # 3. Cloud Run???E?E????E(?????? & ???????????E
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'drive-checker'
      - '--image=asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/drive-checker:latest'
      - '--region=asia-northeast1'
      - '--allow-unauthenticated'
      - '--cpu=0.08'  # [??] ??CPU??E      - '--memory=128Mi' # [??] ???????E      - '--update-env-vars=RUN_MODE=CLOUD'

options:
  logging: CLOUD_LOGGING_ONLY
