<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重複整理 Pro (Ultra-Fast)</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body { font-family: sans-serif; background: #fff; color: #000; height: 100vh; display: flex; flex-direction: column; overflow: hidden; margin: 0; font-size: 11px; }
        .container { flex: 1; display: flex; flex-direction: column; width: 100%; overflow: hidden; }
        .header-section { background: #f1f3f4; padding: 4px 10px; border-bottom: 2px solid #5f6368; flex-shrink: 0; z-index: 100; }
        .excel-scroll-area { flex: 1; overflow: auto; background: #fff; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; line-height: 1.1; }
        thead th { position: sticky; top: 0; background: #dadce0; color: #000; padding: 2px 5px; border: 1px solid #5f6368; z-index: 10; text-align: left; }
        td { padding: 2px 6px; border: 1px solid #bdc1c6; word-break: break-all; vertical-align: middle; }
        .set-group-top td { border-top: 2px solid #000 !important; }
        .set-even { background: #ffffff; }
        .set-odd { background: #f1f3f4; }
        .set-even:hover, .set-odd:hover { background: #e8f0fe; }
        .btn { border: 1px solid #747775; padding: 1px 6px; border-radius: 2px; cursor: pointer; background: #fff; font-size: 10px; line-height: 1; }
        .btn-primary { background: #1a73e8; color: #fff; border-color: #1a73e8; font-weight: bold; }
        .btn-danger { background: #d93025; color: #fff; border-color: #d93025; font-weight: bold; }
        .agent-status { font-size: 10px; font-weight: bold; padding: 1px 6px; border-radius: 2px; border: 1px solid #ccc; }
        .status-online { background: #e6f4ea; color: #1e8e3e; }
        .status-offline { background: #fce8e6; color: #d93025; }
        .target-chip { background: #fff; border: 1px solid #bdc1c6; padding: 1px 5px; border-radius: 2px; font-size: 10px; display: flex; align-items: center; gap: 4px; }
        .stats-badge { font-size: 9px; font-weight: 800; color: #000; background: #ffeb3b; padding: 0 4px; border-radius: 2px; margin-right:4px; }
        .flex-row { display: flex; align-items: center; gap: 6px; }
        [v-cloak] { display: none; }
    </style>
</head>
<body>
    <div id="app" v-cloak class="container">
        <div class="header-section">
            <div class="flex-row" style="justify-content:space-between;">
                <div class="flex-row">
                    <div class="flex-row" style="border:1px solid #94a3b8; border-radius:2px; overflow:hidden;">
                        <button @click="mode = 'file'" :class="{ 'btn-primary': mode === 'file' }" class="btn">重複ファイル</button>
                        <button @click="mode = 'folder'" :class="{ 'btn-primary': mode === 'folder' }" class="btn">フォルダ統合</button>
                    </div>
                    <div v-if="mode === 'file'" class="flex-row">
                        <div class="flex-row" style="border:1px solid #ccc; border-radius:2px; overflow:hidden;">
                            <button @click="scanType = 'local'" :class="{ 'btn-primary': scanType === 'local' }" class="btn">ローカル</button>
                            <button @click="scanType = 'drive'" :class="{ 'btn-primary': scanType === 'drive' }" class="btn">Drive</button>
                        </div>
                        <label style="cursor:pointer;"><input type="checkbox" v-model="sameParentOnly"> 同一フォルダ内のみ</label>
                    </div>
                    <div class="agent-status" :class="isAgentOnline ? 'status-online' : 'status-offline'" @click="checkAgent">
                        [[ isAgentOnline ? 'OK (' + agentPC + ')' : '待機中' ]]
                    </div>
                </div>
                <div class="flex-row">
                    <div v-if="duplicateSets.length > 0" style="font-size:10px; background:#fff; border:1px solid #94a3b8; padding:2px 8px; border-radius:3px; color:#1e293b;">
                        <b>[[ duplicateSets.length ]] セット</b> (計 [[ totalFileCount ]] ファイル) 表示中
                    </div>
                    <button v-if="mode === 'file' && duplicateSets.length > 0" class="btn" @click="markBracketed(false)" :disabled="isMarking" :style="{ background: isMarking ? '#f5f5f5' : '#fffbe6', fontWeight: 'bold' }">
                        [[ isMarking ? '仕分け中...' : 'カッコ付きマーク' ]]
                    </button>
                    <button v-if="mode === 'file' && duplicateSets.length > 0" class="btn" @click="markBracketed(true)" :disabled="isMarking" :style="{ background: isMarking ? '#f5f5f5' : '#e6f7ff', fontWeight: 'bold' }">
                        [[ isMarking ? '仕分け中...' : 'カッコ(最小残し)' ]]
                    </button>
                    <button v-if="mode === 'file' && duplicateSets.length > 0" class="btn" @click="markParentFolders()" :disabled="isMarking" :style="{ background: isMarking ? '#f5f5f5' : '#f0fdf4', fontWeight: 'bold' }">
                        [[ isMarking ? '仕分け中...' : '浅い階層をマーク' ]]
                    </button>
                    <button v-if="mode === 'file' && duplicateSets.length > 0" class="btn" @click="markOlderFiles()" :disabled="isMarking" :style="{ background: isMarking ? '#f5f5f5' : '#fce8e6', fontWeight: 'bold', color: '#d93025' }">
                        [[ isMarking ? '仕分け中...' : '古い物をマーク' ]]
                    </button>
                    <button class="btn btn-primary" @click="startSearch" :disabled="isScanning || scanTargets.length === 0" style="padding:0 15px;">
                        [[ isScanning ? '実行中...' : '検索開始' ]]
                    </button>
                    <button v-if="isScanning" class="btn btn-danger" @click="stopSearch">中断</button>
                    <div v-if="scanLog" style="font-size:10px; color:#1a73e8; font-weight:bold;">[[ scanLog ]]</div>
                </div>
            </div>
            <div class="flex-row" style="margin-top:4px;">
                <button class="btn" @click="addFolder" style="font-weight:bold;">＋ フォルダ追加</button>
                <div v-for="(target, idx) in scanTargets" :key="idx" class="target-chip">[[ target ]] <button @click="removeTarget(idx)" style="border:none; background:none;">&times;</button></div>
            </div>
        </div>

        <div class="excel-scroll-area">
            <table v-if="mode === 'file'">
                <thead>
                    <tr>
                        <th style="width: 25px; text-align:center;"><input type="checkbox" @change="toggleAllFiles" :checked="isAllSelected"></th>
                        <th style="width: 20%;">ファイル名</th>
                        <th style="width: 60px; text-align:center;">サイズ</th>
                        <th style="width: 60%;">フルパス</th>
                        <th style="width: 120px; text-align:center;">作成日時</th>
                        <th style="width: 40px; text-align:center;">開く</th>
                    </tr>
                </thead>
                <tbody>
                    <template v-for="(set, sIdx) in duplicateSets" :key="sIdx">
                        <tr v-for="(f, fIdx) in set.files" :key="f.id" v-memo="[f.id, selectedSet.has(f.id)]" :class="[sIdx % 2 === 0 ? 'set-even' : 'set-odd', fIdx === 0 ? 'set-group-top' : '']">
                            <td style="text-align:center;"><input type="checkbox" :checked="selectedSet.has(f.id)" @change="e => toggleSelect(f.id, e.target.checked)"></td>
                            <td style="font-weight:bold;"><span v-if="fIdx === 0" class="stats-badge">#[[ sIdx + 1 ]]</span>[[ f.name ]]</td>
                            <td style="text-align:right; font-family: monospace;">[[ formatSize(f.size) ]]</td>
                            <td style="color:#222; font-size:10px;">[[ f.path ]]</td>
                            <td style="color:#666; font-size:10px; text-align:center;">[[ formatDate(f.createdTime) ]]</td>
                            <td style="text-align:center;"><button @click="openInExplorer(f.path)" class="btn">📂</button></td>
                        </tr>
                    </template>
                </tbody>
            </table>

            <table v-if="mode === 'folder'">
                <thead><tr><th style="width: 65px;">判定理由</th><th style="width: 45%;">フォルダ A</th><th style="width: 45%;">フォルダ B</th><th style="width: 80px;">マージ</th></tr></thead>
                <tbody>
                    <tr v-for="(c, idx) in folderCandidates" :key="idx">
                        <td style="text-align:center; font-weight:bold; background:#e8f0fe; vertical-align: top; padding: 4px;">
                            <div style="font-size:12px; margin-bottom:2px;">[[ c.ratio ]]%</div>
                            <div v-if="c.name_match" style="font-size:9px; color:#b31412; background:#fce8e6; border:1px solid #fbd2ce; border-radius:3px; margin-bottom:2px; padding:1px;">名前類似</div>
                            <div v-if="c.common > 0" style="font-size:9px; color:#0d652d; background:#e6f4ea; border:1px solid #ceead6; border-radius:3px; padding:1px;">内容[[ c.common ]]件</div>
                        </td>
                        <td>[A] [[ c.path_a ]] <button @click="openInExplorer(c.path_a)" class="btn">📂</button></td>
                        <td>[B] [[ c.path_b ]] <button @click="openInExplorer(c.path_b)" class="btn">📂</button></td>
                        <td style="text-align:center;"><button class="btn btn-primary" @click="mergeFolders(c.path_a, c.path_b)">A➔B</button> <button class="btn btn-primary" @click="mergeFolders(c.path_b, c.path_a)">B➔A</button></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div style="background:#333; color:#ccc; padding:2px 10px; display:flex; justify-content:space-between; align-items:center; flex-shrink:0;">
            <div class="flex-row">
                <button class="btn" @click="openCleanupFolder" style="background:#444; color:#fff; border-color:#666; font-size:9px;">📁 削除候補フォルダを開く</button>
                <span v-if="mode === 'file' && selectedSet.size > 0" style="color:#fff; font-weight:bold; margin-left:10px;">[[ selectedSet.size ]] 件 選択中</span>
            </div>
            <button v-if="mode === 'file' && selectedSet.size > 0" class="btn btn-danger" @click="deleteSelected" style="height:20px; padding:0 15px; font-weight:bold;">削除候補へ移動（実行）</button>
        </div>
    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;
        createApp({
            delimiters: ['[[', ']]'],
            setup() {
                const mode = ref('file');
                const scanType = ref('local');
                const scanTargets = ref([]);
                const sameParentOnly = ref(false);
                const duplicateSets = ref([]);
                const folderCandidates = ref([]);
                const isScanning = ref(false);
                const isMarking = ref(false);
                const scanLog = ref('');
                const selectedSet = ref(new Set());
                const agentPC = ref('');
                const isAgentOnline = ref(false);
                const agentBase = 'http://localhost:8082';

                const checkAgent = async () => {
                    try {
                        const res = await (await fetch(`${agentBase}/api/health`)).json();
                        isAgentOnline.value = !!res.success; agentPC.value = res.pc || '';
                    } catch { isAgentOnline.value = false; }
                };
                onMounted(() => { checkAgent(); setInterval(checkAgent, 5000); });

                const getApiUrl = (path) => (window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1' ? `${agentBase}${path}` : path);

                const openCleanupFolder = () => fetch(getApiUrl('/api/open_cleanup_folder'));

                const toggleSelect = (id, checked) => {
                    const next = new Set(selectedSet.value);
                    if(checked) next.add(id); else next.delete(id);
                    selectedSet.value = next;
                };

                const startSearch = () => {
                    isScanning.value = true; scanLog.value = '...'; duplicateSets.value = []; folderCandidates.value = []; selectedSet.value = new Set();
                    const url = `${getApiUrl(mode.value==='file'?'/api/scan_stream?type='+scanType.value+'&same_parent_only='+sameParentOnly.value:'/api/analyze_folders?')}&targets=${encodeURIComponent(JSON.stringify(scanTargets.value))}`;
                    const es = new EventSource(url);
                    es.onmessage = (e) => {
                        const d = JSON.parse(e.data); if (d.log) scanLog.value = d.log;
                        if (d.done) { if (mode.value==='file') duplicateSets.value = d.results; else folderCandidates.value = d.results; isScanning.value = false; es.close(); }
                    };
                    es.onerror = () => { isScanning.value = false; es.close(); };
                };

                const deleteSelected = async () => {
                    if(selectedSet.value.size===0 || !confirm('削除候補へ？')) return;
                    const res = await (await fetch(getApiUrl('/api/move_to_cleanup'), { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ file_ids: Array.from(selectedSet.value) }) })).json();
                    if (res.success) { duplicateSets.value = duplicateSets.value.map(s => ({...s, files: s.files.filter(f => !selectedSet.value.has(f.id))})).filter(s => s.files.length > 1); selectedSet.value = new Set(); }
                };

                const markBracketed = async (useMinNumber = false) => {
                    if (isMarking.value) return;
                    isMarking.value = true;
                    const next = new Set(selectedSet.value);
                    let added = 0;
                    const sets = duplicateSets.value;
                    const total = sets.length;

                    for (let i = 0; i < total; i++) {
                        const set = sets[i];
                        const files = set.files; if (files.length < 2) continue;

                        // スペースの違いや全角カッコに左右されない「超・堅牢」ロジック
                        const bracketRegex = /[\(（][\s\d]+[\)）]/g;
                        // 判定用ルート名の作成（カッコ除去 + スペース完全排除）
                        const getRoot = (name) => name.replace(bracketRegex, '').replace(/\s+/g, '').trim();
                        // 世代（カッコの数）のカウント
                        const countBrackets = (name) => (name.match(bracketRegex) || []).length;
                        // カッコ内の数字配列を取得
                        const getBracketNums = (name) => {
                            const matches = name.match(bracketRegex);
                            if (!matches) return [];
                            return matches.map(m => {
                                const d = m.match(/\d+/);
                                return d ? parseInt(d[0], 10) : 0;
                            });
                        };

                        files.forEach(fA => {
                            if (next.has(fA.id)) return;
                            const rootA = getRoot(fA.name);
                            const genA = countBrackets(fA.name);
                            const numsA = getBracketNums(fA.name);

                            const hasParent = files.some(fB => {
                                if (fA.id === fB.id) return false;
                                if (rootA !== getRoot(fB.name)) return false;
                                
                                if (useMinNumber) {
                                    const numsB = getBracketNums(fB.name);
                                    if (numsB.length < numsA.length) return true;
                                    if (numsB.length > numsA.length) return false;
                                    for (let j = 0; j < numsA.length; j++) {
                                        if (numsB[j] < numsA[j]) return true;
                                        if (numsB[j] > numsA[j]) return false;
                                    }
                                    return false;
                                } else {
                                    // 親（より世代が古いもの）がいれば、自分はコピー
                                    return countBrackets(fB.name) < genA;
                                }
                            });

                            if (hasParent) {
                                next.add(fA.id);
                                added++;
                            }
                        });

                        if (i % 50 === 0 && i > 0) {
                            scanLog.value = `解析中... ${Math.round((i/total)*100)}%`;
                            await new Promise(r => setTimeout(r, 0));
                        }
                    }

                    selectedSet.value = next;
                    isMarking.value = false;
                    scanLog.value = `完了: ${added}件を新しくマークしました`;
                };

                const markOlderFiles = () => {
                    if (isMarking.value) return;
                    isMarking.value = true;
                    scanLog.value = '解析中...';
                    const next = new Set(selectedSet.value);
                    let added = 0;
                    const sets = duplicateSets.value;
                    const getTime = (t) => t ? (typeof t === 'number' ? t : new Date(t).getTime()) : 0;

                    for (let i = 0; i < sets.length; i++) {
                        const files = sets[i].files;
                        if (files.length < 2) continue;

                        let newestIdx = 0;
                        let maxTime = getTime(files[0].createdTime);
                        for (let j = 1; j < files.length; j++) {
                            const t = getTime(files[j].createdTime);
                            if (t > maxTime) {
                                maxTime = t;
                                newestIdx = j;
                            }
                        }

                        files.forEach((f, idx) => {
                            if (idx !== newestIdx && !next.has(f.id)) {
                                next.add(f.id);
                                added++;
                            }
                        });
                    }
                    selectedSet.value = next;
                    isMarking.value = false;
                    scanLog.value = `完了: 古いファイル ${added}件 をマークしました`;
                };

                const markParentFolders = async () => {
                    if (isMarking.value) return;
                    isMarking.value = true;
                    scanLog.value = '解析中...';
                    const next = new Set(selectedSet.value);
                    let added = 0;
                    const sets = duplicateSets.value;
                    const total = sets.length;

                    for (let i = 0; i < total; i++) {
                        const set = sets[i];
                        const files = set.files; if (files.length < 2) continue;

                        files.forEach(fA => {
                            if (next.has(fA.id) || !fA.path) return;
                            
                            // fAのディレクトリパスを取得 (Windowsのバックスラッシュもスラッシュに統一し、末尾に必ずスラッシュを付ける)
                            const dirA = (fA.path.replace(/\\/g, '/').substring(0, fA.path.replace(/\\/g, '/').lastIndexOf('/')) + '/').toLowerCase();
                            
                            const hasChild = files.some(fB => {
                                if (fA.id === fB.id || !fB.path) return false;
                                const dirB = (fB.path.replace(/\\/g, '/').substring(0, fB.path.replace(/\\/g, '/').lastIndexOf('/')) + '/').toLowerCase();
                                
                                // dirB が dirA より長く、かつ dirA で始まっていれば、dirBはdirAのサブディレクトリ (子フォルダ) にいると言える
                                return dirB.length > dirA.length && dirB.startsWith(dirA);
                            });

                            // 子フォルダに同じファイルがあるなら、親フォルダ(浅い階層)の自分はコピー・不要とみなしてチェック
                            if (hasChild) {
                                next.add(fA.id);
                                added++;
                            }
                        });

                        if (i % 50 === 0 && i > 0) {
                            scanLog.value = `解析中... ${Math.round((i/total)*100)}%`;
                            await new Promise(r => setTimeout(r, 0));
                        }
                    }

                    selectedSet.value = next;
                    isMarking.value = false;
                    scanLog.value = `完了: ${added}件の浅い階層のファイルをマークしました`;
                };

                const totalFileCount = computed(() => {
                    let t = 0; duplicateSets.value.forEach(s => t += s.files.length);
                    return t;
                });

                return {
                    mode, scanType, scanTargets, sameParentOnly, duplicateSets, folderCandidates, isScanning, isMarking, scanLog, selectedSet, isAgentOnline, agentPC,
                    startSearch, deleteSelected, totalFileCount, openCleanupFolder, addFolder: async () => { if(scanType.value==='drive'){const id=prompt('ID'); if(id)scanTargets.value.push(id);}else{const res=await(await fetch(getApiUrl('/api/select_folder'))).json(); if(res.success)scanTargets.value.push(res.path);} },
                    removeTarget: (i) => scanTargets.value.splice(i, 1), formatSize: (b) => { if(!b) return '0 B'; const k=1024, i=Math.floor(Math.log(b)/Math.log(k)); return (b/Math.pow(k, i)).toFixed(2) + ' ' + ['B','KB','MB','GB'][i]; },
                    formatDate: (v) => { if (!v) return ''; const d = typeof v === 'number' ? new Date(v*1000) : new Date(v); if (isNaN(d.getTime())) return v; return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); },
                    openInExplorer: (path) => fetch(`${getApiUrl('/api/open_explorer')}?path=${encodeURIComponent(path)}`),
                    toggleAllFiles: () => { if (selectedSet.value.size > 0) selectedSet.value = new Set(); else { const n = new Set(); duplicateSets.value.forEach(s => s.files.forEach(f => n.add(f.id))); selectedSet.value = n; } },
                    isAllSelected: computed(() => { let t = 0; duplicateSets.value.forEach(s => t += s.files.length); return t > 0 && selectedSet.value.size === t; }),
                    toggleSelect, mergeFolders: async (src, dst) => { const res = await (await fetch(getApiUrl('/api/merge_folders'), { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ src, dst }) })).json(); if(res.success) folderCandidates.value = folderCandidates.value.filter(c => c.path_a !== src && c.path_b !== src); },
                    markBracketed, markParentFolders, markOlderFiles
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
