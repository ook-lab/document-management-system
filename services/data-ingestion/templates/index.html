<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Ingestion 管理画面</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', 'Segoe UI', sans-serif; background: #f8fafc; color: #1e293b; min-height: 100vh; }
  header { background: #ffffff; border-bottom: 1px solid #e2e8f0; padding: 14px 24px; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 16px; font-weight: 700; color: #4f46e5; }

  .layout { display: grid; grid-template-columns: 300px 1fr; height: calc(100vh - 53px); }

  /* === サイドバー === */
  .sidebar { background: #ffffff; border-right: 1px solid #e2e8f0; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 16px; }

  /* Gmail フィーチャードカード */
  .gmail-card {
    background: linear-gradient(135deg, #4f46e5 0%, #3730a3 100%);
    border: 1px solid #4338ca;
    border-radius: 10px;
    padding: 14px;
    box-shadow: 0 4px 12px rgba(79, 70, 229, 0.15);
  }
  .gmail-card .card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .gmail-card .card-icon { font-size: 20px; }
  .gmail-card .card-title { font-size: 15px; font-weight: 700; color: #ffffff; }
  .gmail-card .status-badge { margin-left: auto; }

  .mail-type-row { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
  .mail-type-btn {
    padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
    border: 1px solid rgba(255, 255, 255, 0.3); background: rgba(255, 255, 255, 0.1); color: #e0e7ff; cursor: pointer;
    transition: all 0.15s;
  }
  .mail-type-btn.active { background: #ffffff; color: #4338ca; border-color: #ffffff; }
  .mail-type-btn:hover:not(.active) { background: rgba(255, 255, 255, 0.2); }

  .gmail-actions { display: flex; gap: 6px; }

  /* グループラベル */
  .group-label { font-size: 11px; font-weight: 800; color: #94a3b8; letter-spacing: 0.08em; text-transform: uppercase; padding: 0 4px; margin-bottom: -8px; }

  /* 通常ソースカード */
  .source-card {
    background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 8px;
    padding: 10px 12px; display: flex; align-items: center; gap: 8px;
    transition: border-color 0.2s;
  }
  .source-card.running { border-color: #f59e0b; }
  .source-card.success { border-color: #10b981; }
  .source-card.error   { border-color: #ef4444; }
  .source-card .card-name { flex: 1; font-size: 13px; font-weight: 500; }

  /* ボタン */
  .btn { padding: 4px 10px; border: none; border-radius: 5px; font-size: 12px; cursor: pointer; transition: opacity 0.15s; white-space: nowrap; }
  .btn:hover { opacity: 0.8; }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-run      { background: #6366f1; color: #fff; }
  .btn-run-lg   { background: #6366f1; color: #fff; padding: 7px 18px; font-size: 13px; font-weight: 600; border-radius: 6px; border: none; cursor: pointer; }
  .btn-run-lg:hover:not(:disabled) { background: #4f46e5; }
  .btn-run-lg:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-settings { background: #ffffff; color: #64748b; border: 1px solid #e2e8f0; }

  /* バッジ */
  .status-badge { font-size: 10px; padding: 2px 7px; border-radius: 10px; white-space: nowrap; font-weight: 700; }
  .badge-idle    { background: #e2e8f0; color: #64748b; }
  .badge-running { background: #fef3c7; color: #92400e; animation: pulse 1.5s infinite; }
  .badge-success { background: #dcfce7; color: #166534; }
  .badge-error   { background: #fee2e2; color: #991b1b; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  /* === メインパネル === */
  .main { display: flex; flex-direction: column; overflow: hidden; background: #f8fafc; }
  .log-header { background: #ffffff; border-bottom: 1px solid #e2e8f0; padding: 8px 16px; font-size: 12px; color: #64748b; display: flex; align-items: center; gap: 8px; }
  .log-header .source-name { color: #4f46e5; font-weight: 700; }
  .log-panel { flex: 1; overflow-y: auto; padding: 14px 16px; background: #ffffff; font-family: 'Consolas', monospace; font-size: 12.5px; }
  .log-line { margin: 1px 0; line-height: 1.6; white-space: pre-wrap; word-break: break-all; }
  .log-ts   { color: #94a3b8; margin-right: 8px; }
  .log-text { color: #334155; }
  .log-info { color: #1e293b; }
  .log-warn { color: #d97706; }
  .log-err  { color: #dc2626; background: #fef2f2; border-radius: 3px; padding: 0 4px; }
  .log-placeholder { color: #94a3b8; text-align: center; padding-top: 80px; font-size: 14px; }

  /* === 実行履歴 === */
  .history-panel { height: 220px; border-top: 1px solid #e2e8f0; overflow-y: auto; background: #ffffff; }
  .history-header { padding: 8px 14px; font-size: 12px; font-weight: 700; color: #64748b; border-bottom: 1px solid #f1f5f9; position: sticky; top: 0; background: #f8fafc; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { padding: 6px 12px; text-align: left; color: #94a3b8; font-weight: 700; position: sticky; top: 29px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; }
  td { padding: 6px 12px; border-bottom: 1px solid #f1f5f9; color: #334155; }
  tr:hover td { background: #f8fafc; }

  /* === 設定モーダル === */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 22px; width: 440px; max-width: 90vw; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
  .modal h2 { font-size: 15px; margin-bottom: 16px; color: #1e293b; font-weight: 700; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 11px; color: #64748b; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700; }
  .form-group input, .form-group textarea {
    width: 100%; background: #ffffff; border: 1px solid #cbd5e1; border-radius: 6px;
    padding: 8px 10px; color: #1e293b; font-size: 13px; font-family: 'Inter', monospace;
  }
  .form-group textarea { height: 70px; resize: vertical; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
  .btn-primary { background: #4f46e5; color: #fff; padding: 7px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; }
  .btn-cancel  { background: #f1f5f9; color: #64748b; padding: 7px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; }

  /* === ファイル取り込みボタン === */
  .btn-file-upload {
    width: 100%; padding: 9px 12px; background: #064e3b; border: 1px solid #10b981;
    border-radius: 8px; color: #6ee7b7; font-size: 13px; font-weight: 600;
    cursor: pointer; text-align: left; transition: background 0.15s;
  }
  .btn-file-upload:hover { background: #065f46; }

  /* === アップロードモーダル === */
  .upload-modal { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 12px; width: 420px; max-width: 90vw; overflow: hidden; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
  .upload-modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px; border-bottom: 1px solid #f1f5f9;
    font-size: 14px; font-weight: 700; color: #1e293b;
  }
  .upload-modal-header button { background: none; border: none; color: #94a3b8; font-size: 16px; cursor: pointer; line-height: 1; }
  .upload-modal-header button:hover { color: #1e293b; }
  .upload-modal-body { display: flex; flex-direction: column; gap: 10px; padding: 16px 18px; }
  .upload-field-label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; font-weight: 700; }
  .upload-input {
    width: 100%; background: #ffffff; border: 1px solid #cbd5e1; border-radius: 6px;
    padding: 7px 10px; color: #1e293b; font-size: 13px;
  }
  .upload-input:focus { outline: none; border-color: #4f46e5; }
  .btn-upload-submit {
    width: 100%; padding: 9px; background: #4f46e5; border: none; border-radius: 6px;
    color: #fff; font-size: 13px; font-weight: 700; cursor: pointer; margin-top: 4px;
  }
  .btn-upload-submit:hover:not(:disabled) { background: #4338ca; }
  .btn-upload-submit:disabled { opacity: 0.4; cursor: not-allowed; }
  #upload-status { font-size: 12px; color: #64748b; min-height: 18px; text-align: center; }
</style>
</head>
<body>

<header>
  <h1>⚡ Data Ingestion 管理画面</h1>
</header>

<div class="layout">
  <!-- サイドバー -->
  <div class="sidebar" id="sidebar">
    <!-- JSで構築 -->
  </div>

  <!-- アップロードモーダル -->
  <div id="upload-modal-overlay" class="modal-overlay" style="display:none">
    <div class="upload-modal">
      <div class="upload-modal-header">
        <span>📁 ファイル取り込み</span>
        <button onclick="closeUploadModal()">✕</button>
      </div>
      <div class="upload-modal-body">
        <div>
          <div class="upload-field-label">ファイル選択</div>
          <input type="file" id="upload-file-input" multiple class="upload-input" style="padding:5px 8px;">
        </div>
        <div>
          <div class="upload-field-label">Person</div>
          <input type="text" id="upload-person" list="dl-person" placeholder="Person を入力または選択" class="upload-input" oninput="onUploadPersonChange()">
          <datalist id="dl-person"></datalist>
        </div>
        <div>
          <div class="upload-field-label">Source</div>
          <input type="text" id="upload-source" list="dl-source" placeholder="Source を入力または選択" class="upload-input" oninput="onUploadSourceChange()">
          <datalist id="dl-source"></datalist>
        </div>
        <div>
          <div class="upload-field-label">Category（任意）</div>
          <input type="text" id="upload-category-input" list="dl-category" placeholder="Category を入力または選択" class="upload-input">
          <datalist id="dl-category"></datalist>
        </div>
        <button class="btn-upload-submit" id="btn-upload-submit" onclick="submitUpload()">取り込む</button>
        <div id="upload-status"></div>
      </div>
    </div>
  </div>

  <!-- メイン -->
  <div class="main">
    <div class="log-header">
      ログ: <span class="source-name" id="current-source-name">（ソースを選択して実行）</span>
    </div>
    <div class="log-panel" id="log-panel">
      <div class="log-placeholder" id="log-placeholder">▶ 左のパネルから「実行」をクリックしてください</div>
    </div>
    <div class="history-panel">
      <div class="history-header">📋 実行履歴</div>
      <table>
        <thead><tr><th>ソース</th><th>開始時刻</th><th>状態</th><th>所要時間</th></tr></thead>
        <tbody id="history-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- 設定モーダル -->
<div class="modal-overlay" id="settings-modal">
  <div class="modal">
    <h2 id="modal-title">⚙ 設定</h2>
    <div class="form-group">
      <label>追加引数 (extra_args, スペース区切り)</label>
      <input type="text" id="modal-extra-args" placeholder="例: --browser --max-results 50">
    </div>
    <div class="form-group">
      <label>メモ</label>
      <textarea id="modal-note" placeholder="メモを入力"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeSettings()">キャンセル</button>
      <button class="btn-primary" onclick="saveSettings()">保存して実行</button>
    </div>
  </div>
</div>

<script>
let SOURCES = {};
let cardStates = {};       // source -> 'idle'|'running'|'success'|'error'
let currentSettingsSource = null;
let activeEventSource = null;
let historyInterval = null;

// Gmail選択中のラベル
let gmailMailType = 'DM';
let gmailLabels = [];      // {id, name}[]
let gmailSelectedLabel = null;  // 選択中のラベル名

async function init() {
  const resp = await fetch('/api/sources');
  SOURCES = await resp.json();

  // Gmail ラベルを非同期取得
  fetch('/api/gmail/labels')
    .then(r => r.json())
    .then(labels => {
      if (!labels.error) {
        gmailLabels = labels;
        gmailSelectedLabel = labels.length ? labels[0].name : null;
        renderSidebar();
      }
    })
    .catch(() => {});

  renderSidebar();
  loadHistory();
}

// ========== サイドバー ==========

function renderSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '';

  // --- ファイル取り込みボタン ---
  const uploadBtn = document.createElement('button');
  uploadBtn.className = 'btn-file-upload';
  uploadBtn.textContent = '📁 ファイル取り込み';
  uploadBtn.onclick = openUploadModal;
  sb.appendChild(uploadBtn);

  // --- Gmail フィーチャードカード ---
  const gmail = SOURCES['gmail'];
  if (gmail) {
    const mailTypes = gmail.mail_types || ['DM'];
    const state = cardStates['gmail'] || 'idle';
    const div = document.createElement('div');
    div.className = 'gmail-card';
    div.id = 'card-gmail';
    div.innerHTML = `
      <div class="card-header">
        <span class="card-icon">✉️</span>
        <span class="card-title">${gmail.name}</span>
        <span class="status-badge badge-${state}" id="badge-gmail">${stateLabel(state)}</span>
      </div>
      <div class="mail-type-row" id="gmail-type-row">
        ${gmailLabels.length
          ? gmailLabels.map(lb => `
              <button class="mail-type-btn ${lb.name === gmailSelectedLabel ? 'active' : ''}"
                      onclick="selectLabel('${lb.name.replace(/'/g,"\\'")}')">
                ${lb.name}
              </button>`).join('')
          : `<span style="font-size:11px;color:#4b5563;">ラベル取得中…</span>`
        }
      </div>
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:10px;">
        <label style="font-size:11px;color:#6b7280;white-space:nowrap;">取得件数</label>
        <select id="gmail-max-results" style="background:#0d1117;border:1px solid #374151;border-radius:5px;color:#e2e8f0;font-size:12px;padding:3px 7px;cursor:pointer;">
          <option value="10">10件</option>
          <option value="25">25件</option>
          <option value="50" selected>50件</option>
          <option value="100">100件</option>
          <option value="200">200件</option>
        </select>
      </div>
      <div class="gmail-actions">
        <button class="btn-run-lg" id="btn-run-gmail" onclick="runSource('gmail')" ${state==='running'?'disabled':''}>
          ▶ 実行
        </button>
      </div>
    `;
    sb.appendChild(div);
  }

  // --- 早稲田アカデミー ---
  appendGroup(sb, 'school', '🎓 教育');

  // --- スーパー系 ---
  appendGroup(sb, 'super', '🛒 スーパー');

  // --- モニタリング ---
  appendGroup(sb, 'monitor', '👁 モニタリング');
}

function appendGroup(sb, group, label) {
  const entries = Object.entries(SOURCES).filter(([, v]) => v.group === group);
  if (entries.length === 0) return;

  const labelEl = document.createElement('div');
  labelEl.className = 'group-label';
  labelEl.textContent = label;
  sb.appendChild(labelEl);

  for (const [key, src] of entries) {
    const state = cardStates[key] || 'idle';
    const div = document.createElement('div');
    div.className = `source-card ${state}`;
    div.id = `card-${key}`;
    // 早稲田アカデミーは --browser ボタンを追加
    const browserBtn = key === 'waseda'
      ? `<button class="btn" style="background:#065f46;color:#6ee7b7;" id="btn-browser-${key}" onclick="runSource('${key}', ['--browser'])" ${state==='running'?'disabled':''}>🌐</button>`
      : '';
    div.innerHTML = `
      <span class="card-name">${src.name}</span>
      <span class="status-badge badge-${state}" id="badge-${key}">${stateLabel(state)}</span>
      ${browserBtn}
      <button class="btn btn-run" id="btn-run-${key}" onclick="runSource('${key}')" ${state==='running'?'disabled':''}>▶</button>
      <button class="btn btn-settings" onclick="openSettings('${key}')">⚙</button>
    `;
    sb.appendChild(div);
  }
}

function stateLabel(s) {
  return {idle:'待機', running:'実行中', success:'成功', error:'エラー'}[s] || s;
}

function selectMailType(type) {
  gmailMailType = type;
}

function selectLabel(name) {
  gmailSelectedLabel = name;
  document.querySelectorAll('#gmail-type-row .mail-type-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.trim() === name);
  });
}

function setCardState(source, state) {
  cardStates[source] = state;
  // カード全体のクラスを更新
  const card = document.getElementById(`card-${source}`);
  if (card) {
    // クラスリセット
    card.classList.remove('idle', 'running', 'success', 'error');
    card.classList.add(state);
  }
  const badge = document.getElementById(`badge-${source}`);
  if (badge) {
    badge.className = `status-badge badge-${state}`;
    badge.textContent = stateLabel(state);
  }
  const btn = document.getElementById(`btn-run-${source}`);
  if (btn) btn.disabled = state === 'running';

  // 実行中のソースがあればポーリング開始、なければ停止
  const anyRunning = Object.values(cardStates).some(s => s === 'running');
  if (anyRunning && !historyInterval) {
    historyInterval = setInterval(loadHistory, 10000);
  } else if (!anyRunning && historyInterval) {
    clearInterval(historyInterval);
    historyInterval = null;
    loadHistory(); // 完了直後に1回更新
  }
}

// ========== 実行 ==========

async function runSource(source, forceArgs) {
  if (activeEventSource) {
    activeEventSource.close();
    activeEventSource = null;
  }

  setCardState(source, 'running');
  clearLog();
  const srcName = SOURCES[source]?.name || source;
  const modeLabel = forceArgs && forceArgs.includes('--browser') ? ' [🌐ブラウザ取得]' : '';
  document.getElementById('current-source-name').textContent =
    source === 'gmail' ? `${srcName} [${gmailMailType}]` : `${srcName}${modeLabel}`;

  // extra_args: forceArgs が渡された場合は優先、なければソースごとに組み立てる
  let extra_args = forceArgs || [];
  if (!forceArgs && source === 'gmail') {
    const maxResults = document.getElementById('gmail-max-results')?.value || '50';
    const label = gmailSelectedLabel || gmailMailType;
    extra_args = ['--query', `label:${label}`, '--max-results', maxResults];
  }

  let run_id;
  try {
    // extra_args が空の場合はボディに含めない → サーバーが保存済み設定を使用する
    const body = forceArgs || (source === 'gmail')
      ? JSON.stringify({ extra_args })
      : JSON.stringify({});
    const resp = await fetch(`/api/run/${source}`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body,
    });
    const data = await resp.json();
    run_id = data.run_id;
  } catch(e) {
    appendLog(`[ERROR] 起動失敗: ${e}`, 'err');
    setCardState(source, 'error');
    return;
  }

  // SSEストリーム
  const es = new EventSource(`/api/stream/${run_id}`);
  activeEventSource = es;

  es.onmessage = (evt) => {
    const data = JSON.parse(evt.data);
    if (data.done) {
      const s = data.status === 'success' ? 'success' : 'error';
      setCardState(source, s);
      appendLog(`─── 完了 (${data.status}) ───`, s === 'error' ? 'err' : 'info');
      es.close();
      activeEventSource = null;
      loadHistory();
    } else if (data.line !== undefined) {
      appendLog(data.line);
    }
  };

  es.onerror = () => {
    setCardState(source, 'error');
    appendLog('[ERROR] SSE接続エラー', 'err');
    es.close();
    activeEventSource = null;
  };
}

// ========== ログパネル ==========

function clearLog() {
  document.getElementById('log-panel').innerHTML = '';
}

function appendLog(text, level = null) {
  const ph = document.getElementById('log-placeholder');
  if (ph) ph.remove();

  const panel = document.getElementById('log-panel');
  const div = document.createElement('div');
  div.className = 'log-line';

  // ログレベル自動判定
  if (!level) {
    if (/ERROR|error/i.test(text)) level = 'err';
    else if (/WARNING|WARN/i.test(text)) level = 'warn';
    else if (/INFO/i.test(text)) level = 'info';
    else level = 'text';
  }

  const ts = new Date().toLocaleTimeString('ja-JP');
  div.innerHTML = `<span class="log-ts">[${ts}]</span><span class="log-${level}">${esc(text)}</span>`;
  panel.appendChild(div);
  panel.scrollTop = panel.scrollHeight;
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ========== 実行履歴 ==========

async function loadHistory() {
  try {
    const resp = await fetch('/api/history?limit=30');
    const rows = await resp.json();
    const tbody = document.getElementById('history-tbody');
    tbody.innerHTML = '';
    for (const row of rows) {
      const tr = document.createElement('tr');
      const started = row.started_at ? new Date(row.started_at).toLocaleString('ja-JP') : '-';
      const duration = (row.started_at && row.ended_at)
        ? Math.round((new Date(row.ended_at) - new Date(row.started_at)) / 1000) + 's'
        : row.status === 'running' ? '実行中…' : '-';
      const icon = {success:'✅', error:'❌', running:'🔄'}[row.status] || '⏳';
      const srcName = (SOURCES[row.source] || {name: row.source}).name || row.source;
      tr.innerHTML = `<td>${esc(srcName)}</td><td>${started}</td><td>${icon} ${row.status||'-'}</td><td>${duration}</td>`;
      tbody.appendChild(tr);
    }
  } catch(e) { /* ignore */ }
}

// ========== 設定モーダル ==========

async function openSettings(source) {
  currentSettingsSource = source;
  document.getElementById('modal-title').textContent = `⚙ 設定 — ${SOURCES[source]?.name || source}`;
  try {
    const resp = await fetch(`/api/settings/${source}`);
    const s = await resp.json();
    document.getElementById('modal-extra-args').value =
      Array.isArray(s.extra_args) ? s.extra_args.join(' ') : (s.extra_args || '');
    document.getElementById('modal-note').value = s.note || '';
  } catch(e) {
    document.getElementById('modal-extra-args').value = '';
    document.getElementById('modal-note').value = '';
  }
  document.getElementById('settings-modal').classList.add('open');
}

function closeSettings() {
  document.getElementById('settings-modal').classList.remove('open');
  currentSettingsSource = null;
}

async function saveSettings() {
  if (!currentSettingsSource) return;
  const raw = document.getElementById('modal-extra-args').value.trim();
  const extra_args = raw ? raw.split(/\s+/) : [];
  const note = document.getElementById('modal-note').value;
  await fetch(`/api/settings/${currentSettingsSource}`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ extra_args, note }),
  });
  const src = currentSettingsSource;
  closeSettings();
  // 保存後すぐに実行
  if (extra_args.length > 0) {
    await runSource(src);
  }
}

document.getElementById('settings-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeSettings();
});

document.getElementById('upload-modal-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeUploadModal();
});

// ========== ファイル取り込みモーダル ==========

let uploadHierarchy = {};

async function openUploadModal() {
  try {
    const res = await fetch('/api/workspace-hierarchy');
    uploadHierarchy = await res.json();
  } catch(e) {
    uploadHierarchy = {};
  }
  fillDatalist('dl-person', Object.keys(uploadHierarchy));
  onUploadPersonChange();
  document.getElementById('upload-status').textContent = '';
  document.getElementById('upload-modal-overlay').style.display = 'flex';
}

function closeUploadModal() {
  document.getElementById('upload-modal-overlay').style.display = 'none';
}

function onUploadPersonChange() {
  const person = document.getElementById('upload-person').value;
  const sources = Object.keys(uploadHierarchy[person] || {});
  fillDatalist('dl-source', sources);
  onUploadSourceChange();
}

function onUploadSourceChange() {
  const person = document.getElementById('upload-person').value;
  const source = document.getElementById('upload-source').value;
  const cats = (uploadHierarchy[person] || {})[source] || [];
  fillDatalist('dl-category', cats);
}

function fillDatalist(id, options) {
  const dl = document.getElementById(id);
  dl.innerHTML = '';
  options.forEach(o => {
    const opt = document.createElement('option');
    opt.value = o;
    dl.appendChild(opt);
  });
}

async function submitUpload() {
  const files  = document.getElementById('upload-file-input').files;
  const person   = document.getElementById('upload-person').value.trim();
  const source   = document.getElementById('upload-source').value.trim();
  const category = document.getElementById('upload-category-input').value.trim();
  if (!files.length || !person || !source) {
    document.getElementById('upload-status').textContent = 'ファイル・Person・Source は必須です';
    return;
  }

  const status = document.getElementById('upload-status');
  const btn    = document.getElementById('btn-upload-submit');
  btn.disabled = true;
  status.textContent = '取り込み中…';

  let success = 0, fail = 0;
  for (const file of files) {
    const fd = new FormData();
    fd.append('file', file);
    fd.append('person', person);
    fd.append('source', source);
    fd.append('category', category);
    try {
      const res  = await fetch('/api/upload', { method: 'POST', body: fd });
      const data = await res.json();
      if (data.success) success++;
      else fail++;
    } catch { fail++; }
    status.textContent = `処理中… ${success + fail}/${files.length}`;
  }

  status.textContent = `完了: ${success}件成功${fail ? ' / ' + fail + '件失敗' : ''}`;
  btn.disabled = false;
  loadHistory();
}

init();
</script>
