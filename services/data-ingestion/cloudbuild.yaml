steps:
  # ============================================
  # data-ingestion ?E?E????E  # ============================================
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/data-ingestion:${_TAG}'
      - '-f'
      - 'services/data-ingestion/Dockerfile'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/data-ingestion:${_TAG}'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'data-ingestion'
      - '--image=asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/data-ingestion:${_TAG}'
      - '--region=asia-northeast1'
      - '--allow-unauthenticated'
      - '--timeout=600'
      - '--memory=2Gi'
      - '--cpu=2'
      # ???E????E??????E      - '--update-env-vars=SUPABASE_URL=${_SUPABASE_URL},SUPABASE_SERVICE_ROLE_KEY=${_SUPABASE_SERVICE_ROLE_KEY},GOOGLE_AI_API_KEY=${_GOOGLE_AI_API_KEY},OPENAI_API_KEY=${_OPENAI_API_KEY},ANTHROPIC_API_KEY=${_ANTHROPIC_API_KEY},DEFAULT_OWNER_ID=${_DEFAULT_OWNER_ID},WASEDA_PDF_FOLDER_ID=${_WASEDA_PDF_FOLDER_ID},GOOGLE_SERVICE_ACCOUNT_JSON=${_GOOGLE_SERVICE_ACCOUNT_JSON},WASEDA_LOGIN_ID=${_WASEDA_LOGIN_ID},WASEDA_PASSWORD=${_WASEDA_PASSWORD}'

images:
  - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/data-ingestion:${_TAG}'

substitutions:
  _TAG: 'latest'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
  substitutionOption: ALLOW_LOOSE

timeout: 1200s
