steps:
  # ============================================
  # data-ingestion
  # ============================================
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/data-ingestion:${_TAG}'
      - '-f'
      - 'services/data-ingestion/Dockerfile'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/data-ingestion:${_TAG}'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'data-ingestion'
      - '--image=asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/data-ingestion:${_TAG}'
      - '--region=asia-northeast1'
      - '--allow-unauthenticated'
      - '--service-account=document-management-system@$PROJECT_ID.iam.gserviceaccount.com'
      - '--timeout=600'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--update-env-vars=GOOGLE_CLOUD_PROJECT=$PROJECT_ID,VERTEX_AI_REGION=${_VERTEX_AI_REGION},DEFAULT_OWNER_ID=${_DEFAULT_OWNER_ID},WASEDA_PDF_FOLDER_ID=${_WASEDA_PDF_FOLDER_ID},GOOGLE_SERVICE_ACCOUNT_JSON=${_GOOGLE_SERVICE_ACCOUNT_JSON},WASEDA_LOGIN_ID=${_WASEDA_LOGIN_ID},WASEDA_PASSWORD=${_WASEDA_PASSWORD}'
      - '--remove-env-vars=SUPABASE_URL,SUPABASE_SERVICE_ROLE_KEY,OPENAI_API_KEY'
      - '--set-secrets=SUPABASE_URL=SUPABASE_URL:latest,SUPABASE_SERVICE_ROLE_KEY=SUPABASE_SERVICE_ROLE_KEY:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest'

images:
  - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/data-ingestion:${_TAG}'

substitutions:
  _TAG: 'latest'
  _VERTEX_AI_REGION: 'us-central1'
  _DEFAULT_OWNER_ID: ''
  _WASEDA_PDF_FOLDER_ID: ''
  _GOOGLE_SERVICE_ACCOUNT_JSON: ''
  _WASEDA_LOGIN_ID: ''
  _WASEDA_PASSWORD: ''

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
  substitutionOption: ALLOW_LOOSE

timeout: 1200s
