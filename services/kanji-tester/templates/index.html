<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 漢字テストジェネレーター</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Google Fonts -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
    body {
      font-family: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.7);
      box-shadow: 0 10px 30px 0 rgba(99, 102, 241, 0.04);
    }
    .glass-input {
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid #cbd5e1;
      color: #0f172a;
    }
    .glass-input:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.15);
      outline: none;
    }
    .text-glow {
      text-shadow: 0 0 10px rgba(99, 102, 241, 0.15);
    }
  </style>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f5f3ff',
              100: '#ede9fe',
              500: '#6366f1',
              600: '#4f46e5',
              700: '#4338ca',
              900: '#312e81',
              950: '#1e1b4b',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen antialiased bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-indigo-50 via-slate-50 to-slate-100 selection:bg-indigo-100 selection:text-indigo-900">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // SVG icon definitions for complete React compatibility (No DOM manipulation/Lucide crash issues)
    // Using functional icons to avoid shared reference reconciler issues in React 18
    const ICON_PATHS = {
      'pen-tool': (props) => (
        <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
          <path d="m12 19 7-7 3 3-7 7-3-3z"/>
          <path d="m18 13-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/>
          <path d="m2 2 20 20"/>
        </svg>
      ),
      'home': (props) => (
        <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      ),
      'alert-triangle': (props) => (
        <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/>
          <line x1="12" y1="9" x2="12" y2="13"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
      ),
      'list': (props) => (
        <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <line x1="8" y1="6" x2="21" y2="6"/>
          <line x1="8" y1="12" x2="21" y2="12"/>
          <line x1="8" y1="18" x2="21" y2="18"/>
          <line x1="3" y1="6" x2="3.01" y2="6"/>
          <line x1="3" y1="12" x2="3.01" y2="12"/>
          <line x1="3" y1="18" x2="3.01" y2="18"/>
        </svg>
      ),
      'database': (props) => (
        <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <ellipse cx="12" cy="5" rx="9" ry="3"/>
          <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
          <path d="M3 12c0 1.66 4 3 9 3s9-1.34 9-3"/>
        </svg>
      ),
      'sparkles': (props) => (
        <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
          <path d="m5 3 1 2.5L8.5 6 6 7 5 9.5 4 7 1.5 6 4 5 5 3Z"/>
          <path d="m19 17 1 2.5 2.5.5-2.5 1-1 2.5-1-2.5-2.5-1 2.5-1 1-2.5Z"/>
        </svg>
      ),
      'wand-2': (props) => (
        <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="m15 4 5 5"/>
          <path d="m3 20 12-12"/>
          <path d="m19 3 1 1-1 1"/>
          <path d="m14 2 2 2-2 2"/>
        </svg>
      ),
      'check-circle': (props) => (
        <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
      ),
      'printer': (props) => (
        <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <polyline points="6 9 6 2 18 2 18 9"/>
          <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
          <rect x="6" y="14" width="12" height="8"/>
        </svg>
      ),
      'save': (props) => (
        <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
          <polyline points="17 21 17 13 7 13 7 21"/>
          <polyline points="7 3 7 8 15 8"/>
        </svg>
      ),
      'eye': (props) => (
        <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      ),
      'eye-off': (props) => (
        <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
          <line x1="1" y1="1" x2="23" y2="23"/>
        </svg>
      ),
      'check': (props) => (
        <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      ),
      'arrow-left': (props) => (
        <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"/>
          <polyline points="12 19 5 12 12 5"/>
        </svg>
      )
    };

    function Icon({ name, className }) {
      const renderIcon = ICON_PATHS[name];
      if (!renderIcon) return null;
      return renderIcon({ className });
    }

    // Default Grade 5 Kanji Words
    const DEFAULT_GRADE_5_WORDS = [
      "誠心誠意", "対応", "主役", "聖火リレー", "中華料理", "宣伝", "筆舌", "盛大", "貴族", "豆腐",
      "一寸", "推進", "宣言", "寸法", "貿易", "聖歌", "専念", "垂直", "確信", "墓地",
      "危機", "背景", "規則", "経費", "編集", "賛成", "判断", "構造", "余計", "制限",
      "効率", "余地", "混雑", "豊富", "清潔", "絶妙", "退屈", "複雑", "状態",
      "能率", "困難", "容易", "綿密", "適度", "系統", "表情", "詳細", "解説", "成果"
    ];

    function App() {
      const [step, setStep] = useState('setup'); // 'setup', 'loading', 'test'
      const [mode, setMode] = useState('list'); // 'list' or 'quiz_history'
      const [customWords, setCustomWords] = useState('');
      const [subjects, setSubjects] = useState([]);
      const [selectedSubjectId, setSelectedSubjectId] = useState('');
      const [questionCount, setQuestionCount] = useState(10);
      
      // Generated test questions
      const [questions, setQuestions] = useState([]);
      // Local scoring states: key is question word, value is { isCorrect: bool, ignored: bool }
      const [scores, setScores] = useState({});
      const [showAnswersMap, setShowAnswersMap] = useState({});
      
      // Loading messages state
      const [loadingMessage, setLoadingMessage] = useState('漢字リストを分析中...');
      const [error, setError] = useState(null);
      const [saveStatus, setSaveStatus] = useState(null); // 'saving', 'success', 'error'
      const [pdfStatus, setPdfStatus] = useState(null); // 'generating', 'success', 'error'

      // Fetch subjects for Quiz History mode on mount
      useEffect(() => {
        const fetchSubjects = async () => {
          try {
            const res = await fetch('/api/subjects');
            if (!res.ok) throw new Error('科目の取得に失敗しました');
            const data = await res.json();
            setSubjects(data);
            if (data.length > 0) {
              setSelectedSubjectId(data[0].id);
            }
          } catch (err) {
            console.error(err);
          }
        };
        fetchSubjects();
      }, []);

      // Load preset Grade 5 words into textarea
      const loadGrade5Preset = () => {
        setCustomWords(DEFAULT_GRADE_5_WORDS.join('\n'));
      };

      // Trigger test generation
      const handleGenerate = async () => {
        setError(null);
        setStep('loading');
        
        // Cycle loading messages
        const messages = [
          '漢字データベースを参照しています...',
          '出題候補を選出中 (新規語彙を優先しています)...',
          '学習進捗ログを確認中 (誤答を優先ブレンドします)...',
          'AI (Gemini) が書き取り用の例文を組み立てています...',
          '送り仮名とカタカナ読みを微調整しています...',
          '最終テスト用紙を作成しています...'
        ];
        
        let msgIndex = 0;
        setLoadingMessage(messages[0]);
        const interval = setInterval(() => {
          msgIndex = (msgIndex + 1) % messages.length;
          setLoadingMessage(messages[msgIndex]);
        }, 2200);

        try {
          const res = await fetch('/api/generate-kanji-test', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              mode,
              subject_id: mode === 'quiz_history' ? selectedSubjectId : null,
              custom_words: mode === 'list' ? customWords : '',
              question_count: questionCount
            })
          });

          clearInterval(interval);
          if (!res.ok) {
            const errData = await res.json();
            throw new Error(errData.error || '生成に失敗しました');
          }

          const data = await res.json();
          setQuestions(data.questions);
          
          // Pre-populate scores as correct by default for smooth UX
          const initialScores = {};
          const initialShowAnswers = {};
          data.questions.forEach((q) => {
            initialScores[q.word] = { isCorrect: true, ignored: false };
            initialShowAnswers[q.word] = false;
          });
          setScores(initialScores);
          setShowAnswersMap(initialShowAnswers);
          setStep('test');
        } catch (err) {
          clearInterval(interval);
          setError(err.message);
          setStep('setup');
        }
      };

      // Toggle grading status
      const handleScoreToggle = (word, status) => {
        setScores(prev => {
          const current = prev[word];
          if (status === 'correct') {
            return { ...prev, [word]: { isCorrect: true, ignored: false } };
          } else if (status === 'incorrect') {
            return { ...prev, [word]: { isCorrect: false, ignored: false } };
          } else if (status === 'ignore') {
            return { ...prev, [word]: { isCorrect: false, ignored: true } };
          }
          return prev;
        });
      };

      // Toggle answer display for self-checking
      const toggleAnswer = (word) => {
        setShowAnswersMap(prev => ({ ...prev, [word]: !prev[word] }));
      };

      // Save scoring results to DB
      const handleSaveHistory = async () => {
        setSaveStatus('saving');
        try {
          const resultsPayload = questions.map(q => ({
            word: q.word,
            sentence: q.sentence,
            isCorrect: scores[q.word].isCorrect,
            ignored: scores[q.word].ignored
          }));

          const res = await fetch('/api/save-kanji-history', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              subject_id: mode === 'quiz_history' ? selectedSubjectId : null,
              results: resultsPayload
            })
          });

          if (!res.ok) throw new Error('結果の保存に失敗しました');
          
          setSaveStatus('success');
          setTimeout(() => {
            setSaveStatus(null);
            setStep('setup');
          }, 1500);
        } catch (err) {
          console.error(err);
          setSaveStatus('error');
          setError('履歴の保存に失敗しました。');
        }
      };

      // Construct and open print preview A4 landscape sheet
      const handleDownloadPdf = () => {
        setPdfStatus('generating');
        try {
          let subjectName = "漢字テスト";
          if (mode === 'quiz_history') {
            const sub = subjects.find(s => s.id === selectedSubjectId);
            if (sub) subjectName = sub.name;
          } else {
            subjectName = "漢字練習";
          }

          const buildHtmlContent = () => {
            const colWidth = Math.min(38, Math.max(21, Math.floor(212 / questions.length)));
            const colWidthStyle = `${colWidth}mm`;

            const getCircleNum = (index) => {
              const circles = ['①', '②', '③', '④', '⑤', '⑥', '⑦', '⑧', '⑨', '⑩', '⑪', '⑫', '⑬', '⑭', '⑮'];
              return circles[index] || (index + 1).toString();
            };

            const renderSentenceHTML = (q) => {
              let sentenceText = q.sentence;
              const targetKata = q.hiragana || q.word;
              
              if (sentenceText.includes(`【${targetKata}】`)) {
                return sentenceText.replace(`【${targetKata}】`, `<span class="target-word">${targetKata}</span>`);
              } else if (sentenceText.includes(targetKata)) {
                return sentenceText.replace(targetKata, `<span class="target-word">${targetKata}</span>`);
              } else {
                const match = sentenceText.match(/【([^】]+)】/);
                if (match) {
                  return sentenceText.replace(match[0], `<span class="target-word">${match[1]}</span>`);
                }
                const kataMatch = sentenceText.match(/[\u30a0-\u30ff]+/);
                if (kataMatch) {
                  return sentenceText.replace(kataMatch[0], `<span class="target-word">${kataMatch[0]}</span>`);
                }
              }
              return `<span class="target-word">${targetKata}</span>の練習。`;
            };

            const getFontSizeClass = (word) => {
              if (!word) return '20pt';
              if (word.length === 1) return '24pt';
              if (word.length === 2) return '20pt';
              if (word.length === 3) return '15pt';
              if (word.length === 4) return '13pt';
              if (word.length <= 6) return '11pt';
              return '9pt';
            };

            const renderColumns = (isAnswerKey) => {
              return questions.map((q, idx) => {
                const circleNum = getCircleNum(idx);
                const sentenceHtml = renderSentenceHTML(q);
                const fontSz = getFontSizeClass(q.word);
                
                return `
                  <div class="question-column" style="width: ${colWidthStyle};">
                    <div class="sentence-box">
                      <span class="q-num">${circleNum}</span>${sentenceHtml}
                    </div>
                    <div class="grid-box" style="width: ${colWidthStyle}; ${idx === questions.length - 1 ? 'border-left: 1.5px solid #000;' : ''}">
                      <div class="grid-num">${circleNum}</div>
                      <div class="writing-box">
                        ${isAnswerKey ? `
                          <div class="correct-answer-text" style="font-size: ${fontSz};">
                            ${q.word}
                          </div>
                        ` : ''}
                      </div>
                    </div>
                  </div>
                `;
              }).join('\n');
            };

            return `
              <!DOCTYPE html>
              <html lang="ja">
              <head>
                <meta charset="UTF-8">
                <title>漢字書き取りテスト - ${subjectName}</title>
                <style>
                  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap');
                  @page {
                    size: A4 landscape;
                    margin: 0;
                  }
                  * {
                    box-sizing: border-box;
                  }
                  body {
                    margin: 0;
                    padding: 0;
                    background: white;
                    color: black;
                    font-family: 'Noto Serif JP', serif;
                  }
                  .page {
                    width: 297mm;
                    height: 210mm;
                    position: relative;
                    overflow: hidden;
                    page-break-after: always;
                    background: white;
                    padding: 12mm 15mm;
                  }
                  .page:last-child {
                    page-break-after: avoid;
                  }
                  /* Title and Name Block on the right */
                  .header-block {
                    position: absolute;
                    right: 15mm;
                    top: 12mm;
                    bottom: 12mm;
                    width: 32mm;
                    display: flex;
                    flex-direction: row-reverse;
                  }
                  .title-strip {
                    width: 12mm;
                    height: 186mm;
                    background-color: #374151;
                    color: white;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    writing-mode: vertical-rl;
                    font-size: 12pt;
                    font-weight: bold;
                    letter-spacing: 0.25em;
                    border: 1.5px solid #000;
                    border-radius: 2px;
                    text-align: center;
                    line-height: 1.2;
                    padding: 4mm 0;
                  }
                  .info-strip {
                    width: 20mm;
                    height: 186mm;
                    display: flex;
                    flex-direction: column;
                  }
                  .class-box {
                    height: 35mm;
                    border: 1.5px solid #000;
                    border-left: none;
                    display: flex;
                    align-items: flex-start;
                    justify-content: center;
                    writing-mode: vertical-rl;
                    font-size: 11pt;
                    padding: 3mm 0;
                    font-weight: bold;
                  }
                  .name-box {
                    height: 95mm;
                    border: 1.5px solid #000;
                    border-top: none;
                    border-left: none;
                    display: flex;
                    align-items: flex-start;
                    justify-content: center;
                    writing-mode: vertical-rl;
                    font-size: 11pt;
                    padding: 3mm 0;
                    font-weight: bold;
                  }
                  .score-box {
                    height: 56mm;
                    border: 1.5px solid #000;
                    border-top: none;
                    border-left: none;
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                    justify-content: space-between;
                    padding: 4mm 0;
                    font-size: 11pt;
                    font-weight: bold;
                  }
                  .score-box-title {
                    letter-spacing: 0.5em;
                  }
                  .score-box-unit {
                    margin-top: auto;
                    align-self: flex-end;
                    margin-right: 3mm;
                  }
                  
                  /* Instruction Text column */
                  .instruction-column {
                    position: absolute;
                    right: 52mm;
                    top: 12mm;
                    bottom: 12mm;
                    width: 8mm;
                    font-size: 11pt;
                    writing-mode: vertical-rl;
                    font-weight: bold;
                    line-height: 1.3;
                  }
                  
                  /* Main Question columns section */
                  .test-columns-container {
                    position: absolute;
                    right: 65mm;
                    left: 15mm;
                    top: 12mm;
                    bottom: 12mm;
                    display: flex;
                    flex-direction: row-reverse;
                    justify-content: flex-start;
                    align-items: stretch;
                  }
                  .question-column {
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                    position: relative;
                  }
                  .sentence-box {
                    height: 111mm;
                    width: 100%;
                    writing-mode: vertical-rl;
                    font-size: 12pt;
                    line-height: 1.8;
                    letter-spacing: 0.15em;
                    padding: 4mm 1mm 0 1mm;
                    box-sizing: border-box;
                  }
                  .q-num {
                    font-size: 12pt;
                    font-weight: bold;
                    display: inline;
                  }
                  .target-word {
                    border-right: 1.5px solid #000;
                    border-left: 1.5px solid #000;
                    padding: 4px 0;
                    margin: 0 -2px;
                  }
                  
                  /* Bottom grid cells */
                  .grid-box {
                    height: 75mm;
                    display: flex;
                    flex-direction: column;
                    border-top: 1.5px solid #000;
                    border-bottom: 1.5px solid #000;
                    border-right: 1.5px solid #000;
                    box-sizing: border-box;
                  }
                  .grid-num {
                    height: 8mm;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    font-size: 10pt;
                    font-weight: bold;
                    border-bottom: 1.5px solid #000;
                    background-color: #f3f4f6;
                  }
                  .writing-box {
                    height: 67mm;
                    position: relative;
                    background-color: #fff;
                  }
                  .correct-answer-text {
                    position: absolute;
                    top: 0;
                    left: 0;
                    right: 0;
                    bottom: 0;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    font-weight: bold;
                    color: #e11d48;
                    writing-mode: vertical-rl;
                    text-align: center;
                    line-height: 1.2;
                    padding: 4mm 0;
                  }
                  
                  /* Footer branding */
                  .footer-brand {
                    position: absolute;
                    bottom: 4mm;
                    left: 15mm;
                    font-size: 8.5pt;
                    font-weight: bold;
                    color: #9ca3af;
                    letter-spacing: 0.05em;
                  }
                  
                  @media print {
                    .no-print {
                      display: none !important;
                    }
                  }
                </style>
              </head>
              <body>
                
                <!-- Screen-only Floating Controls -->
                <div class="no-print" style="position: fixed; top: 12px; left: 50%; transform: translateX(-50%); background: rgba(15, 23, 42, 0.95); color: white; padding: 10px 20px; border-radius: 9999px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 13px; font-weight: bold; display: flex; gap: 16px; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.25); z-index: 99999;">
                  <span>A4印刷プレビュー（2ページ構成）</span>
                  <button onclick="window.print()" style="background: #4f46e5; border: none; color: white; padding: 6px 14px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 12px; transition: background 0.2s;" onmouseover="this.style.background='#4338ca'" onmouseout="this.style.background='#4f46e5'">印刷する / PDF保存</button>
                  <button onclick="window.close()" style="background: transparent; border: 1px solid rgba(255,255,255,0.3); color: white; padding: 5px 13px; border-radius: 8px; cursor: pointer; font-size: 12px;">閉じる</button>
                </div>

                <!-- Page 1: Blank Test Sheet -->
                <div class="page">
                  <div class="header-block">
                    <div class="title-strip">漢字テスト シリーズ五年（下）</div>
                    <div class="info-strip">
                      <div class="class-box">クラス</div>
                      <div class="name-box">氏名</div>
                      <div class="score-box">
                        <div class="score-box-title">得点</div>
                        <div class="score-box-unit">点</div>
                      </div>
                    </div>
                  </div>
                  <div class="instruction-column">次の ─── を漢字に直しなさい。（送り仮名が必要な場合は書きなさい。）</div>
                  <div class="test-columns-container">
                    ${renderColumns(false)}
                  </div>
                  <div class="footer-brand">AI漢字書き取りテスター</div>
                </div>

                <!-- Page 2: Answer Key Sheet -->
                <div class="page">
                  <div class="header-block">
                    <div class="title-strip">漢字テスト （解答） シリーズ五年（下）</div>
                    <div class="info-strip">
                      <div class="class-box" style="visibility: hidden;">クラス</div>
                      <div class="name-box" style="visibility: hidden;">氏名</div>
                      <div class="score-box">
                        <div class="score-box-title">得点</div>
                        <div class="score-box-unit">点</div>
                      </div>
                    </div>
                  </div>
                  <div class="instruction-column">次の ─── を漢字に直しなさい。（送り仮名が必要な場合は書きなさい。）</div>
                  <div class="test-columns-container">
                    ${renderColumns(true)}
                  </div>
                  <div class="footer-brand">AI漢字書き取りテスター（模範解答）</div>
                </div>

              </body>
              </html>
            `;
          };

          const htmlContent = buildHtmlContent();
          
          const printWindow = window.open('', '_blank');
          if (!printWindow) {
            throw new Error('ポップアップがブロックされました。ブラウザの設定でポップアップの許可をしてください。');
          }

          printWindow.document.write(htmlContent);
          printWindow.document.close();

          printWindow.onload = () => {
            printWindow.print();
          };

          // Fallback trigger for cached pages
          setTimeout(() => {
            if (printWindow) {
              printWindow.print();
            }
          }, 1000);

          setPdfStatus('success');
          setTimeout(() => setPdfStatus(null), 1500);
        } catch (err) {
          console.error(err);
          setPdfStatus('error');
          setError(`印刷プレビューの起動に失敗しました: ${err.message}`);
          setTimeout(() => setPdfStatus(null), 3000);
        }
      };

      return (
        <div className="max-w-3xl mx-auto px-4 py-6 md:py-8">
          
          {/* Header */}
          <div className="flex items-center justify-between mb-6 pb-4 border-b border-slate-200">
            <div className="flex items-center gap-2.5">
              <div className="w-10 h-10 rounded-xl bg-gradient-to-tr from-brand-600 to-indigo-500 flex items-center justify-center shadow-md shadow-brand-500/10 text-white">
                <Icon name="pen-tool" className="w-5 h-5" />
              </div>
              <div>
                <h1 className="text-lg font-extrabold tracking-tight text-slate-900 flex items-center gap-1.5">
                  AI 漢字テストジェネレーター
                  <span className="text-[10px] bg-brand-500/10 text-brand-700 border border-brand-500/20 px-2 py-0.5 rounded-full font-medium">Premium</span>
                </h1>
                <p className="text-[11px] text-slate-500 mt-0.5">漢字リストまたは過去クイズの履歴から、本格A4印刷テスト用紙を自動作成</p>
              </div>
            </div>
            
            <a href="/" className="text-xs font-semibold text-slate-600 hover:text-slate-900 transition flex items-center gap-1">
              <Icon name="home" className="w-3.5 h-3.5" />
              ポータルに戻る
            </a>
          </div>

          {error && (
            <div className="mb-6 p-4 rounded-xl bg-rose-50 border border-rose-200 text-rose-800 flex items-start gap-3">
              <Icon name="alert-triangle" className="w-5 h-5 mt-0.5 text-rose-500 flex-shrink-0" />
              <div>
                <div className="font-bold">エラーが発生しました</div>
                <div className="text-sm opacity-90 mt-1">{error}</div>
              </div>
            </div>
          )}

          {/* Step 1: Setup Screen */}
          {step === 'setup' && (
            <div className="glass-card rounded-2xl p-5 md:p-6 animate-fadeIn">
              
              {/* Mode Tabs */}
              <div className="flex p-1 rounded-xl bg-slate-100 border border-slate-200/80 mb-6">
                <button
                  type="button"
                  onClick={() => setMode('list')}
                  className={`flex-1 flex items-center justify-center gap-1.5 py-2 rounded-lg font-bold text-xs transition-all duration-200 ${
                    mode === 'list' 
                      ? 'bg-brand-600 text-white shadow-md shadow-brand-500/10' 
                      : 'text-slate-600 hover:text-slate-900'
                  }`}
                >
                  <Icon name="list" className="w-3.5 h-3.5" />
                  漢字リストから作成
                </button>
                <button
                  type="button"
                  onClick={() => setMode('quiz_history')}
                  className={`flex-1 flex items-center justify-center gap-1.5 py-2 rounded-lg font-bold text-xs transition-all duration-200 ${
                    mode === 'quiz_history' 
                      ? 'bg-brand-600 text-white shadow-md shadow-brand-500/10' 
                      : 'text-slate-600 hover:text-slate-900'
                  }`}
                >
                  <Icon name="database" className="w-3.5 h-3.5" />
                  クイズ履歴から抽出
                </button>
              </div>

              {/* Mode 1: List Input */}
              {mode === 'list' && (
                <div className="space-y-4">
                  <div>
                    <div className="flex items-center justify-between mb-1.5">
                      <label className="text-xs font-bold text-slate-700 flex items-center gap-1">
                        漢字・単語リスト
                      </label>
                      <button
                        type="button"
                        onClick={loadGrade5Preset}
                        className="text-[10px] text-brand-700 hover:text-brand-800 font-bold flex items-center gap-1 bg-brand-500/10 px-2 py-0.5 rounded-lg border border-brand-500/20 hover:border-brand-500/30 transition"
                      >
                        <Icon name="sparkles" className="w-3 h-3" />
                        小学5年生の頻出語彙 (50語)
                      </button>
                    </div>
                    <textarea
                      value={customWords}
                      onChange={(e) => setCustomWords(e.target.value)}
                      placeholder="テストに含めたい単語を改行またはスペース区切りで入力してください。&#10;（例：&#10;誠心誠意&#10;豆腐）"
                      rows="6"
                      className="w-full glass-input rounded-xl p-3 text-xs font-semibold font-mono placeholder:text-slate-400 resize-y"
                    />
                    <p className="text-[10px] text-slate-500 mt-1">※未入力の場合はデフォルトの小学5年生語彙リストを使用します。</p>
                  </div>
                </div>
              )}

              {/* Mode 2: Quiz Subject Dropdown */}
              {mode === 'quiz_history' && (
                <div className="space-y-4">
                  <div>
                    <label className="block text-xs font-bold text-slate-700 mb-1.5">
                      科目の選択
                    </label>
                    <select
                      value={selectedSubjectId}
                      onChange={(e) => setSelectedSubjectId(e.target.value)}
                      className="w-full glass-input rounded-xl px-3 py-2 text-xs font-semibold cursor-pointer"
                    >
                      {subjects.length === 0 ? (
                        <option>読み込み中...</option>
                      ) : (
                        subjects.map(s => (
                          <option key={s.id} value={s.id}>{s.name}</option>
                        ))
                      )}
                    </select>
                    <p className="text-[10px] text-slate-500 mt-2 leading-relaxed">
                      ※選択された科目の過去のクイズの「正解の言葉」から、AIが漢字単語を自動抽出します。<br />
                      過去の学習結果に基づき、間違えやすい言葉（誤答率の高い漢字）を優先的にブレンドして問題を作成します。
                    </p>
                  </div>
                </div>
              )}

              {/* Common Parameter Settings */}
              <div className="mt-6 pt-5 border-t border-slate-200 space-y-4">
                <div>
                  <div className="flex justify-between mb-1.5">
                    <label className="text-xs font-bold text-slate-700">問題数</label>
                    <span className="text-xs font-extrabold text-brand-600">{questionCount} 問</span>
                  </div>
                  <input
                    type="range"
                    min="5"
                    max="15"
                    step="1"
                    value={questionCount}
                    onChange={(e) => setQuestionCount(parseInt(e.target.value))}
                    className="w-full h-1 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-brand-600"
                  />
                  <div className="flex justify-between text-[9px] text-slate-400 mt-0.5 font-bold">
                    <span>5問</span>
                    <span>10問 (推奨)</span>
                    <span>15問</span>
                  </div>
                </div>

                <button
                  type="button"
                  onClick={handleGenerate}
                  className="w-full bg-gradient-to-r from-brand-600 to-indigo-600 hover:from-brand-500 hover:to-indigo-500 text-white font-bold py-3 rounded-xl shadow-md hover:shadow-lg transition-all duration-300 flex items-center justify-center gap-1.5 text-sm mt-3"
                >
                  <Icon name="wand-2" className="w-4.5 h-4.5" />
                  漢字テストを生成する
                </button>
              </div>

            </div>
          )}

          {/* Step 2: Loading State Screen */}
          {step === 'loading' && (
            <div className="glass-card rounded-2xl p-12 text-center animate-pulse flex flex-col items-center justify-center min-h-[350px]">
              <div className="w-16 h-16 rounded-full border-4 border-brand-600/10 border-t-brand-600 animate-spin mb-6"></div>
              <h2 className="text-xl font-bold text-slate-900 mb-2">漢字テストを生成中</h2>
              <p class="text-sm text-slate-500 max-w-md mx-auto leading-relaxed">{loadingMessage}</p>
            </div>
          )}

          {/* Step 3: Grading & PDF Sheet Screen */}
          {step === 'test' && (
            <div className="space-y-6 animate-fadeIn">
              
              {/* Operations Floating Panel */}
              <div className="glass-card rounded-2xl p-6 flex flex-col sm:flex-row items-center justify-between gap-4 border-b border-brand-500/10">
                <div className="text-center sm:text-left">
                  <h2 className="text-lg font-bold text-slate-900 flex items-center gap-1.5 justify-center sm:justify-start">
                    <Icon name="check-circle" className="w-5 h-5 text-emerald-600" />
                    テスト問題を作成しました！
                  </h2>
                  <p className="text-xs text-slate-500 mt-1">印刷してテストするか、以下の画面上で採点を記録して保存します。</p>
                </div>
                
                <div className="flex items-center gap-3 w-full sm:w-auto">
                  <button
                    type="button"
                    onClick={handleDownloadPdf}
                    disabled={pdfStatus === 'generating'}
                    className="flex-1 sm:flex-initial bg-brand-600 hover:bg-brand-500 text-white font-bold px-5 py-3 rounded-xl transition flex items-center justify-center gap-2 shadow-md disabled:opacity-50"
                  >
                    {pdfStatus === 'generating' ? (
                      <span className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
                    ) : (
                      <Icon name="printer" className="w-4.5 h-4.5" />
                    )}
                    A4印刷PDFを出力
                  </button>
                  
                  <button
                    type="button"
                    onClick={handleSaveHistory}
                    disabled={saveStatus === 'saving'}
                    className="flex-1 sm:flex-initial bg-emerald-600 hover:bg-emerald-500 text-white font-bold px-5 py-3 rounded-xl transition flex items-center justify-center gap-2 shadow-md disabled:opacity-50"
                  >
                    {saveStatus === 'saving' ? (
                      <span className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
                    ) : (
                      <Icon name="save" className="w-4.5 h-4.5" />
                    )}
                    結果を保存して終了
                  </button>
                </div>
              </div>

              {/* Questions List */}
              <div className="space-y-4">
                {questions.map((q, index) => {
                  const currentScore = scores[q.word] || { isCorrect: true, ignored: false };
                  const isShow = showAnswersMap[q.word];
                  
                  return (
                    <div 
                      key={index} 
                      className={`glass-card rounded-2xl p-5 md:p-6 transition-all duration-300 border ${
                        currentScore.ignored 
                          ? 'border-amber-500/20 bg-amber-50/40 opacity-90' 
                          : !currentScore.isCorrect 
                            ? 'border-rose-500/20 bg-rose-50/40' 
                            : 'border-slate-200 bg-white/60'
                      }`}
                    >
                      <div className="flex flex-col md:flex-row items-stretch md:items-center justify-between gap-4">
                        {/* Question Content */}
                        <div className="flex-1 space-y-2">
                          <div className="flex items-center gap-2">
                            <span className="text-xs font-bold text-slate-600 bg-slate-100 px-2.5 py-0.5 rounded-full border border-slate-200">
                              問 {index + 1}
                            </span>
                            <span className="text-xs font-bold text-slate-500 font-mono">
                              単語: {q.word} ({q.hiragana})
                            </span>
                          </div>
                          
                          {/* Sentence Display */}
                          <div className="text-base font-bold text-slate-900 tracking-wide bg-slate-100/80 p-3 rounded-xl border border-slate-200/80">
                            {q.sentence.includes(`【${q.hiragana}】`) || q.sentence.includes(`【${q.word}】`) 
                              ? q.sentence 
                              : q.sentence.replace(q.hiragana, `【${q.hiragana}】`)
                            }
                          </div>
                        </div>

                        {/* Interactive Actions Grid */}
                        <div className="flex items-center gap-4 flex-shrink-0">
                          {/* Self check toggle answer */}
                          <button
                            type="button"
                            onClick={() => toggleAnswer(q.word)}
                            className="text-xs text-slate-700 hover:text-slate-900 font-bold bg-slate-100 px-3 py-2 rounded-lg border border-slate-200 hover:border-slate-300 transition flex items-center gap-1.5 h-11"
                          >
                            <Icon name={isShow ? "eye-off" : "eye"} className="w-4 h-4" />
                            {isShow ? q.word : '答えを表示'}
                          </button>

                          {/* Grade control group */}
                          <div className="flex items-center p-1 bg-slate-50 rounded-xl border border-slate-200 gap-1 h-11">
                            <button
                              type="button"
                              onClick={() => handleScoreToggle(q.word, 'correct')}
                              className={`px-3 py-1.5 rounded-lg text-xs font-extrabold flex items-center gap-1 transition-all ${
                                currentScore.isCorrect && !currentScore.ignored
                                  ? 'bg-emerald-500/10 text-emerald-700 border border-emerald-500/20 shadow-sm'
                                  : 'text-slate-400 hover:text-slate-600'
                              }`}
                            >
                              <span className="w-2 h-2 rounded-full bg-emerald-500"></span>
                              正解
                            </button>
                            <button
                              type="button"
                              onClick={() => handleScoreToggle(q.word, 'incorrect')}
                              className={`px-3 py-1.5 rounded-lg text-xs font-extrabold flex items-center gap-1 transition-all ${
                                !currentScore.isCorrect && !currentScore.ignored
                                  ? 'bg-rose-500/10 text-rose-700 border border-rose-500/20 shadow-sm'
                                  : 'text-slate-400 hover:text-slate-600'
                              }`}
                            >
                              <span className="w-2 h-2 rounded-full bg-rose-500"></span>
                              不正解
                            </button>
                            <button
                              type="button"
                              onClick={() => handleScoreToggle(q.word, 'ignore')}
                              className={`px-3 py-1.5 rounded-lg text-xs font-extrabold flex items-center gap-1 transition-all ${
                                currentScore.ignored
                                  ? 'bg-amber-500/10 text-amber-700 border border-amber-500/20 shadow-sm'
                                  : 'text-slate-400 hover:text-slate-600'
                              }`}
                            >
                              <span className="w-2 h-2 rounded-full bg-amber-500"></span>
                              除外
                            </button>
                          </div>
                        </div>

                      </div>
                    </div>
                  );
                })}
              </div>

              {/* Footer controls */}
              <div className="flex items-center justify-between pt-4">
                <button
                  type="button"
                  onClick={() => setStep('setup')}
                  className="text-sm font-semibold text-slate-500 hover:text-slate-800 transition flex items-center gap-1.5"
                >
                  <Icon name="arrow-left" className="w-4 h-4" />
                  やり直す (保存しない)
                </button>
              </div>

            </div>
          )}

          {/* Success Overlay for Saves */}
          {saveStatus === 'success' && (
            <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center animate-fadeIn">
              <div className="glass-card rounded-2xl p-8 max-w-sm text-center border border-emerald-500/30">
                <div className="w-16 h-16 rounded-full bg-emerald-500/10 text-emerald-600 flex items-center justify-center mx-auto mb-4 border border-emerald-500/35">
                  <Icon name="check" className="w-8 h-8" />
                </div>
                <h3 className="text-lg font-bold text-slate-900">履歴を保存しました</h3>
                <p className="text-sm text-slate-500 mt-2">設定画面に戻ります...</p>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
