steps:
  # キャッシュ用に前回イメージを pull（初回は失敗しても続行）
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'docker pull asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/debug-pipeline:latest || true'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--cache-from'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/debug-pipeline:latest'
      - '-t'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/debug-pipeline:latest'
      - '-f'
      - 'services/debug-pipeline/Dockerfile'
      - '.'
    dir: '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/debug-pipeline:latest'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'debug-pipeline'
      - '--image=asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/debug-pipeline:latest'
      - '--region=asia-northeast1'
      - '--allow-unauthenticated'
      - '--timeout=3600'

images:
  - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/debug-pipeline:latest'

options:
  logging: CLOUD_LOGGING_ONLY

timeout: 1800s
