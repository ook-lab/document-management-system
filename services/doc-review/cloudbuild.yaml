steps:
  # ???E????????????Epull?E??E??E????????E
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'docker pull asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/doc-review:latest || true'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--cache-from'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/doc-review:latest'
      - '-t'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/doc-review:latest'
      - '-f'
      - 'services/doc-review/Dockerfile'
      - '.'
    dir: '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/doc-review:latest'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'doc-review'
      - '--image=asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/doc-review:latest'
      - '--region=asia-northeast1'
      - '--allow-unauthenticated'
      - '--service-account=document-management-system@$PROJECT_ID.iam.gserviceaccount.com'
      - '--timeout=300'
      - '--set-env-vars=SUPABASE_URL=${_SUPABASE_URL},SUPABASE_KEY=${_SUPABASE_KEY},SUPABASE_SERVICE_ROLE_KEY=${_SUPABASE_SERVICE_ROLE_KEY},GCP_PROJECT_ID=$PROJECT_ID,GOOGLE_AI_API_KEY=${_GOOGLE_AI_API_KEY},GMAIL_CLEANER_REDIRECT_URI=https://doc-review-983922127476.asia-northeast1.run.app/gmail-cleaner/auth/callback'

images:
  - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/doc-review:latest'

substitutions:
  _SUPABASE_URL: ''
  _SUPABASE_KEY: ''
  _SUPABASE_SERVICE_ROLE_KEY: ''
  _GOOGLE_AI_API_KEY: ''

options:
  logging: CLOUD_LOGGING_ONLY
  substitutionOption: ALLOW_LOOSE

timeout: 2400s
