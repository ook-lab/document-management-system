steps:
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'docker pull asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/gmail-service:latest || true'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--cache-from'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/gmail-service:latest'
      - '-t'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/gmail-service:latest'
      - '-f'
      - 'services/gmail-service/Dockerfile'
      - '.'
    dir: '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/gmail-service:latest'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'gmail-service'
      - '--image=asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/gmail-service:latest'
      - '--region=asia-northeast1'
      - '--allow-unauthenticated'
      - '--service-account=document-management-system@$PROJECT_ID.iam.gserviceaccount.com'
      - '--timeout=300'
      - '--memory=2Gi'
      - '--update-env-vars=GCP_PROJECT_ID=$PROJECT_ID,GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GOOGLE_APPLICATION_CREDENTIALS=/secrets/google_credentials.json,GMAIL_DM_ATTACHMENT_FOLDER_ID=17px817NTGJg1bHPOb1J49KR5WFM4EI7c,GMAIL_DM_EMAIL_FOLDER_ID=1qua1VOzPkxzX4j1qjLPJg6GzcjN-cHgZ'
      - '--remove-env-vars=SUPABASE_URL,SUPABASE_KEY,SUPABASE_SERVICE_ROLE_KEY,GOOGLE_AI_API_KEY,OPENAI_API_KEY,GMAIL_USER_EMAIL,SUPABASE_ADMIN_USER_ID,GMAIL_CLEANER_REDIRECT_URI'
      - '--set-secrets=SUPABASE_URL=SUPABASE_URL:latest,SUPABASE_KEY=SUPABASE_KEY:latest,SUPABASE_SERVICE_ROLE_KEY=SUPABASE_SERVICE_ROLE_KEY:latest,GOOGLE_AI_API_KEY=GOOGLE_AI_API_KEY:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest,GMAIL_USER_EMAIL=GMAIL_USER_EMAIL:latest,SUPABASE_ADMIN_USER_ID=SUPABASE_ADMIN_USER_ID:latest,/secrets/google_credentials.json=GOOGLE_APPLICATION_CREDENTIALS:latest'

images:
  - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/gmail-service:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  substitutionOption: ALLOW_LOOSE

timeout: 1800s
