<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDFの目次（しおり）作成ツール</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar: Page List -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    <span>PDFの目次（しおり）作成ツール</span>
                </div>
                <button id="upload-btn" class="btn btn-primary">ファイルのアップロード</button>
                <input type="file" id="file-input" accept="application/pdf" style="display: none;">
            </div>
            
            <div class="page-list-container">
                <div id="page-list" class="page-list">
                    <!-- Thumbnails will be generated here by JS -->
                    <div class="empty-state">
                        PDFをアップロードしてください
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Top Right: Preview Region -->
            <section class="preview-section" id="preview-section">
                <div class="preview-controls">
                    <button id="zoom-out-btn">－縮小</button>
                    <button id="zoom-in-btn">＋拡大</button>
                    <button id="zoom-reset-btn">リセット</button>
                </div>
                <div class="preview-container" id="preview-container">
                    <div class="empty-state">サムネイルを選択してプレビュー</div>
                </div>
            </section>

            <!-- Bottom Right: Editor Panel -->
            <section class="editor-section">
                <div class="panel-card metadata-panel">
                    <h3>メタデータ編集</h3>
                    <div class="form-group">
                        <label for="meta-title">タイトル (Title)</label>
                        <input type="text" id="meta-title" placeholder="ドキュメントのタイトル">
                    </div>
                    <div class="form-group">
                        <label for="meta-author">作成者 (Author)</label>
                        <input type="text" id="meta-author" placeholder="作成者名">
                    </div>
                    <div class="form-group">
                        <label for="meta-subject">サブジェクト (Subject)</label>
                        <input type="text" id="meta-subject" placeholder="NotebookLM 最適化" value="NotebookLM Optimization">
                    </div>
                </div>

                <div class="panel-card tags-panel">
                    <h3>ページタイトル（透明テキスト）</h3>
                    <div class="form-row">
                        <div class="form-group flex-2">
                            <label for="base-title">タイトル名</label>
                            <input type="text" id="base-title" placeholder="例: 第1回 算数">
                        </div>
                        <div class="form-group flex-1">
                            <label for="start-num">開始ページ数</label>
                            <input type="number" id="start-num" placeholder="空は1">
                        </div>
                    </div>
                    <button id="apply-tags-btn" class="btn btn-secondary">選択ページに適用</button>
                    <p class="help-text">Shift/Ctrlキーで左のページを複数選択できます。</p>
                </div>

                <div class="panel-card action-panel">
                    <h3>保存・出力</h3>
                    <button id="process-download-btn" class="btn btn-success">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                        上書き保存してダウンロード
                    </button>
                </div>
            </section>
        </main>
    </div>

    <!-- Custom JS -->
    <script src="/static/js/main.js"></script>
</body>
</html>
