<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>家計簿 集計</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  body { margin:0; font-family:sans-serif; background:#f5f5f5; }
  header { background:#2c3e50; color:white; padding:10px 20px; display:flex; justify-content:space-between; align-items:center; }
  header a { color:#aed6f1; text-decoration:none; margin-left:20px; font-size:14px; }
  header a:hover { color:white; }
  header a.active { color:white; font-weight:bold; border-bottom:2px solid #3498db; }
  .container { max-width:1200px; margin:20px auto; padding:0 15px; }
  .card { background:white; border-radius:8px; padding:20px; margin-bottom:20px; box-shadow:0 1px 4px rgba(0,0,0,.1); }
  h2 { margin-top:0; color:#2c3e50; font-size:18px; }
  .kpi-row { display:flex; gap:15px; margin-bottom:20px; }
  .kpi { flex:1; background:white; border-radius:8px; padding:15px 20px; box-shadow:0 1px 4px rgba(0,0,0,.1); text-align:center; }
  .kpi-label { font-size:12px; color:#888; margin-bottom:5px; }
  .kpi-value { font-size:28px; font-weight:bold; }
  .income  { color:#27ae60; }
  .expense { color:#e74c3c; }
  .net-pos { color:#27ae60; }
  .net-neg { color:#e74c3c; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { background:#ecf0f1; padding:8px; text-align:left; border-bottom:2px solid #bdc3c7; }
  td { padding:7px 8px; border-bottom:1px solid #ecf0f1; }
  tr:hover td { background:#f9f9f9; }
  .amt { text-align:right; font-family:monospace; }
  .amt.neg { color:#e74c3c; }
  .amt.pos { color:#27ae60; }
  .month-nav { display:flex; align-items:center; gap:10px; }
  .month-nav a { padding:4px 12px; background:#3498db; color:white; border-radius:4px; text-decoration:none; font-size:13px; }
  .filter-row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:15px; }
  .filter-row label { font-size:13px; color:#555; }
  .filter-row input, .filter-row select { padding:5px 8px; border:1px solid #ccc; border-radius:4px; font-size:13px; }
  .filter-row button { padding:5px 14px; background:#3498db; color:white; border:none; border-radius:4px; cursor:pointer; font-size:13px; }
  .two-col { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
  @media(max-width:700px){ .two-col{ grid-template-columns:1fr; } .kpi-row{ flex-wrap:wrap; } }
</style>
</head>
<body>
<header>
  <div style="font-weight:bold;">家計簿 集計</div>
  <nav>
    <a href="/expense"     {% if active=='expense'     %}class="active"{% endif %}>支出サマリー</a>
    <a href="/cash"        {% if active=='cash'        %}class="active"{% endif %}>入出金サマリー</a>
    <a href="/multi_month" {% if active=='multi_month' %}class="active"{% endif %}>複数月</a>
    <a href="/trend"       {% if active=='trend'       %}class="active"{% endif %}>カテゴリ推移</a>
    <a href="/person"      {% if active=='person'      %}class="active"{% endif %}>人物別</a>
    <a href="http://localhost:5000" style="color:#f39c12;">← 入力アプリ</a>
  </nav>
</header>
<div class="container">
  {% block content %}{% endblock %}
</div>
</body>
</html>
