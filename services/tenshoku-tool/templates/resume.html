{% extends "base.html" %}
{% block title %}履歴書エディタ | 転職ツール{% endblock %}
{% block main_class %}{% endblock %}
{% block content %}
<style>
    :root { --resume-border: #e2e8f0; --resume-accent: #2563eb; }
    .resume-layout { display: flex; height: calc(100vh - 60px); overflow: hidden; }
    .editor-container { width: 45%; display: flex; flex-direction: column; background: #fff; border-right: 1px solid var(--resume-border); }
    .editor-label { background: #f8fafc; padding: 10px 16px; border-bottom: 1px solid var(--resume-border); font-size: 11px; font-weight: 800; color: #64748b; display: flex; justify-content: space-between; align-items: center; letter-spacing: 0.05em; }
    #editor { flex: 1; }

    .preview-container { flex: 1; display: flex; flex-direction: column; background: #cbd5e1; overflow: auto; padding: 40px; align-items: center; }
    #preview-frame { width: 210mm; min-height: 297mm; background: #fff; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); transform-origin: top center; }

    .pdf-overlay { display: none; position: fixed; inset: 0; background: rgba(255, 255, 255, 0.98); z-index: 9000; flex-direction: column; padding: 30px; backdrop-filter: blur(8px); }
    .pdf-header-bar { display: flex; justify-content: space-between; align-items: center; color: var(--text-primary); margin-bottom: 15px; border-bottom: 1px solid var(--resume-border); padding-bottom: 15px; }
    .pdf-viewer { flex: 1; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 0 40px rgba(0,0,0,0.1); border: 1px solid var(--resume-border); }
    #pdf-frame { width: 100%; height: 100%; border: none; }
    .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 5000; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; color: var(--accent); }

    .resume-btn { padding: 8px 20px; border-radius: 6px; font-size: 13px; font-weight: 700; cursor: pointer; transition: 0.2s; border: 1px solid var(--resume-border); background: #fff; color: var(--text-secondary); box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    .resume-btn:hover { background: #f8fafc; border-color: #cbd5e1; color: var(--text-primary); }
    .resume-btn-primary { background: var(--resume-accent); color: #fff; border: none; box-shadow: 0 4px 12px rgba(37,99,235,0.2); }
    .resume-btn-primary:hover { background: #1d4ed8; transform: translateY(-1px); box-shadow: 0 6px 16px rgba(37,99,235,0.3); }
</style>

<div id="loading" class="loading-overlay">PDFを几帳面に生成中...</div>

<div id="pdf-overlay" class="pdf-overlay">
    <div class="pdf-header-bar">
        <div style="font-weight: 800; font-size: 18px;">最終確認: 生成されたPDF</div>
        <div style="display: flex; gap: 15px;">
            <button class="resume-btn" onclick="closePdf()">閉じて修正</button>
            <button class="resume-btn resume-btn-primary" id="save-btn">この内容で保存する</button>
        </div>
    </div>
    <div class="pdf-viewer"><iframe id="pdf-frame"></iframe></div>
</div>

<div class="resume-layout">
    <div class="editor-container">
        <div class="editor-label">
            <span>MASTER HTML SOURCE</span>
            <div style="display: flex; gap: 8px;">
                <button class="resume-btn" onclick="restore()" style="padding: 4px 12px; font-size: 11px;">履歴から復元</button>
                <button class="resume-btn resume-btn-primary" onclick="previewPdf()" style="padding: 4px 12px; font-size: 11px;">PDFに変換して確認</button>
            </div>
        </div>
        <div id="editor"></div>
    </div>
    <div class="preview-container">
        <div style="margin-bottom: 20px; display: flex; align-items: center; gap: 12px;">
            <span style="color:var(--text-primary); font-size:12px; font-weight:bold;">PREVIEW ZOOM:</span>
            <input type="range" min="0.4" max="1.1" step="0.05" value="0.80" oninput="frame.style.transform=`scale(${this.value})`">
        </div>
        <iframe id="preview-frame"></iframe>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.7/ace.min.js"></script>
<script>
    let editor, currentUrl = null;
    const frame = document.getElementById('preview-frame');

    function init() {
        editor = ace.edit("editor");
        editor.setTheme("ace/theme/chrome");
        editor.session.setMode("ace/mode/html");
        editor.setOptions({ fontSize: "13px", showPrintMargin: false, wrap: true });

        // ローカルストレージから復元、なければデフォルト
        const saved = localStorage.getItem('resume_user_master_v2');
        const defaultHTML = `<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>履歴書・職務経歴書</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  body { margin: 0; padding: 20px; background-color: #525659; display: flex; flex-direction: column; align-items: center; font-family: 'Noto Sans JP', sans-serif; color: #222; }
  .page { background-color: #fff; width: 210mm; min-height: 297mm; padding: 15mm 20mm; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); box-sizing: border-box; page-break-after: always; }
  @media print { body { background: #fff; padding: 0; } .page { margin: 0; box-shadow: none; } }
</style>
</head>
<body>
  <div class="page">
    <h1>履歴書</h1>
    <p>ここにHTMLで履歴書を記述してください。</p>
  </div>
</body>
</html>`;

        editor.setValue(saved || defaultHTML, -1);
        editor.session.on('change', () => {
            const b = new Blob([editor.getValue()], { type: 'text/html' });
            frame.src = URL.createObjectURL(b);
            localStorage.setItem('resume_user_master_v2', editor.getValue());
        });
        editor.session._emit('change');
        frame.style.transform = `scale(0.80)`;
    }

    async function previewPdf() {
        document.getElementById('loading').style.display = 'flex';
        try {
            const r = await fetch('/resume/convert', { method: 'POST', body: JSON.stringify({ html: editor.getValue() }) });
            if (!r.ok) throw new Error(`HTTP ${r.status}`);
            const b = await r.blob();
            if (currentUrl) URL.revokeObjectURL(currentUrl);
            currentUrl = URL.createObjectURL(b);
            document.getElementById('pdf-frame').src = currentUrl;
            document.getElementById('pdf-overlay').style.display = 'flex';
            document.getElementById('save-btn').onclick = () => {
                const a = document.createElement('a'); a.href = currentUrl; a.download = 'resume_official.pdf'; a.click();
            };
        } catch (e) { alert(e.message); }
        finally { document.getElementById('loading').style.display = 'none'; }
    }

    function closePdf() { document.getElementById('pdf-overlay').style.display = 'none'; }
    function restore() {
        const b = localStorage.getItem('resume_user_master_v2');
        if (b && confirm('前回の編集内容を復元しますか？')) editor.setValue(b, -1);
    }
    window.addEventListener('load', init);
</script>
{% endblock %}
