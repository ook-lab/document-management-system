<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}転職ツール{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans JP', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
    <style>
        :root {
            /* ─ ライトモード カラーシステム ─ */
            --bg-page:     #F4F6FB;   /* ページ背景 - 落ち着いた薄グレー */
            --bg-surface:  #FFFFFF;   /* サイドバー・詳細パネル */
            --bg-card:     #FFFFFF;   /* カード本体 */
            --bg-elevated: #F0F2F8;   /* メトリクスボックス */
            --bg-input:    #F8F9FD;   /* フォーム入力 */
            --bg-header:   #FFFFFF;   /* ヘッダー */

            --border-subtle: rgba(60, 80, 180, 0.10);
            --border-mid:    rgba(60, 80, 180, 0.18);
            --border-bright: rgba(60, 80, 180, 0.35);

            --text-primary:   #1A1A3A; /* 濃い紺 - 基本テキスト */
            --text-secondary: #4A5070; /* やや薄い紺 */
            --text-muted:     #8890B0; /* ラベル */

            /* ─ アクセント（ブランドカラー） ─ */
            --accent:       #4F46E5;
            --accent-light: #EEF2FF;
            --accent-glow:  rgba(79,70,229,0.15);

            /* ─ タグ カテゴリ別カラー ─ */
            --tag-it-bg:      #EBF5FF;
            --tag-it-text:    #0066CC;
            --tag-it-border:  #99CEFF;

            --tag-growth-bg:   #EDFAF2;
            --tag-growth-text: #1A8C44;
            --tag-growth-border: #88DBA6;

            --tag-mgmt-bg:    #FFF4EB;
            --tag-mgmt-text:  #C45D00;
            --tag-mgmt-border:#FFBB88;

            --tag-global-bg:  #F3F0FF;
            --tag-global-text:#6025C0;
            --tag-global-border:#C4AAFF;

            --tag-mfg-bg:     #FFF0F0;
            --tag-mfg-text:   #9A2020;
            --tag-mfg-border: #FFAAAA;

            --tag-finance-bg:     #FFFBE8;
            --tag-finance-text:   #8A6500;
            --tag-finance-border: #FFDD88;
        }

        [x-cloak] { display: none !important; }

        html, body {
            background-color: var(--bg-page);
            color: var(--text-primary);
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
        }

        /* ─── Scrollbar ─── */
        .scrollbar-thin::-webkit-scrollbar { width: 5px; height: 5px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: #C8CEDF; border-radius: 99px; }
        .scrollbar-thin::-webkit-scrollbar-thumb:hover { background: #A0AACC; }

        /* ─── Header ─── */
        .app-header {
            background: var(--bg-header);
            border-bottom: 1px solid var(--border-mid);
            box-shadow: 0 1px 8px rgba(60,80,180,0.07);
        }

        /* ─── Gradient brand text ─── */
        .gradient-text {
            background: linear-gradient(120deg, #4F46E5, #7C3AED);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ─── Navigation ─── */
        .nav-link {
            color: var(--text-secondary);
            font-size: 0.8125rem;
            font-weight: 500;
            padding: 0.25rem 0;
            transition: color 0.15s;
            position: relative;
        }
        .nav-link:hover { color: var(--text-primary); }
        .nav-link.active {
            color: var(--accent);
        }
        .nav-link.active::after {
            content: '';
            position: absolute;
            bottom: -2px; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, #4F46E5, #7C3AED);
            border-radius: 99px;
        }

        /* ─── Card ─── */
        .job-card {
            background: var(--bg-card);
            border: 1.5px solid var(--border-subtle);
            border-radius: 14px;
            transition: border-color 0.15s, box-shadow 0.15s, transform 0.12s;
        }
        .job-card:hover {
            border-color: var(--border-bright);
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(60,80,180,0.12);
        }
        .job-card.selected {
            border-color: var(--accent) !important;
            box-shadow: 0 0 0 2px rgba(79,70,229,0.15), 0 6px 24px rgba(79,70,229,0.12);
        }

        /* ─── Card accent strip ─── */
        .card-accent-strip {
            height: 4px;
            border-radius: 12px 12px 0 0;
            margin: -1rem -1rem 0.75rem -1rem;
        }

        /* ─── Tags ─── */
        .tag-base {
            display: inline-flex;
            align-items: center;
            font-size: 0.6875rem;
            font-weight: 600;
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
            border: 1px solid;
            line-height: 1.4;
        }

        /* スキルタグ - IT系デフォルト（青） */
        .tag-skill {
            background: var(--tag-it-bg);
            color: var(--tag-it-text);
            border-color: var(--tag-it-border);
            font-size: 0.6875rem;
            font-weight: 600;
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
            border: 1px solid;
        }

        /* 福利厚生タグ - グレー系 */
        .tag-benefit {
            background: #F0F2F8;
            color: var(--text-secondary);
            border: 1px solid var(--border-mid);
            font-size: 0.6875rem;
            padding: 0.2rem 0.55rem;
            border-radius: 5px;
        }

        /* 上場バッジ */
        .tag-prime   { background:#EEF2FF; color:#4338CA; border:1px solid #C7D2FE; font-size:0.6875rem; padding:0.2rem 0.6rem; border-radius:6px; font-weight:700; }
        .tag-growth  { background:#EDFAF2; color:#1A8C44; border:1px solid #88DBA6; font-size:0.6875rem; padding:0.2rem 0.6rem; border-radius:6px; font-weight:700; }
        .tag-ipo     { background:#FFFBE8; color:#8A6500; border:1px solid #FFDD88; font-size:0.6875rem; padding:0.2rem 0.6rem; border-radius:6px; font-weight:700; }
        .tag-remote  { background:#EDFAF2; color:#0D7A3F; border:1px solid #77D49C; font-size:0.6875rem; padding:0.2rem 0.6rem; border-radius:6px; font-weight:700; }
        .tag-service { background:#F3F4F6; color:#374151; border:1px solid #D1D5DB; font-size:0.6875rem; padding:0.2rem 0.6rem; border-radius:6px; font-weight:600; white-space:nowrap; }

        /* ─── Section label ─── */
        .section-label {
            font-size: 0.6875rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        /* ─── Metric box ─── */
        .metric-box {
            background: var(--bg-elevated);
            border: 1px solid var(--border-subtle);
            border-radius: 10px;
            padding: 0.6rem 0.75rem;
        }
        .metric-box .metric-label { font-size: 0.6875rem; color: var(--text-muted); margin-bottom: 3px; font-weight: 500; }
        .metric-box .metric-value { font-size: 0.875rem; font-weight: 700; color: var(--text-primary); }

        /* ─── Metric icon boxes ─── */
        .metric-icon-box {
            background: var(--bg-elevated);
            border: 1px solid var(--border-subtle);
            border-radius: 10px;
            padding: 0.75rem 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .metric-icon-box .mic-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .metric-icon-box .mic-label { font-size: 0.6rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
        .metric-icon-box .mic-value { font-size: 1rem; font-weight: 800; color: var(--text-primary); line-height: 1.2; }

        /* ─── Salary card ─── */
        .salary-card {
            background: #EEF2FF;
            border: 1px solid #C7D2FE;
            border-radius: 12px;
            padding: 1rem;
        }

        /* ─── Buttons ─── */
        .btn-primary {
            background: linear-gradient(135deg, #4F46E5, #7C3AED);
            color: #fff;
            font-size: 0.8125rem;
            font-weight: 600;
            padding: 0.5rem 1.125rem;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s;
            display: inline-block;
            text-align: center;
            text-decoration: none;
            box-shadow: 0 2px 8px rgba(79,70,229,0.25);
        }
        .btn-primary:hover { opacity: 0.90; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(79,70,229,0.35); }
        .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }

        .btn-secondary {
            background: #FFFFFF;
            color: var(--text-secondary);
            font-size: 0.8125rem;
            font-weight: 500;
            padding: 0.5rem 1.125rem;
            border-radius: 8px;
            border: 1.5px solid var(--border-mid);
            cursor: pointer;
            text-align: center;
            display: block;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
            text-decoration: none;
        }
        .btn-secondary:hover { background: var(--bg-elevated); color: var(--text-primary); border-color: var(--border-bright); }

        /* ─── Sidebar inputs ─── */
        .sidebar-input {
            width: 100%;
            background: var(--bg-input);
            border: 1.5px solid var(--border-mid);
            border-radius: 8px;
            padding: 0.4375rem 0.625rem;
            font-size: 0.8125rem;
            color: var(--text-primary);
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
            font-family: inherit;
            -webkit-appearance: none;
        }
        .sidebar-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
        .sidebar-input::placeholder { color: var(--text-muted); }
        select.sidebar-input option { background: #FFFFFF; color: var(--text-primary); }

        /* ─── Range slider ─── */
        input[type=range] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 4px;
            background: #D5DAF0;
            border-radius: 99px;
            outline: none;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            box-shadow: 0 0 0 3px white, 0 0 0 5px rgba(79,70,229,0.25);
            transition: box-shadow 0.15s;
        }
        input[type=range]::-webkit-slider-thumb:hover {
            box-shadow: 0 0 0 3px white, 0 0 0 7px rgba(79,70,229,0.3);
        }

        /* ─── Industry tab カスタムカラー ─── */
        .tab-active-it       { border-color: #0066CC !important; color: #0066CC !important; }
        .tab-active-finance  { border-color: #D4A000 !important; color: #D4A000 !important; }
        .tab-active-mgmt     { border-color: #C45D00 !important; color: #C45D00 !important; }
        .tab-active-mfg      { border-color: #9A2020 !important; color: #9A2020 !important; }
        .tab-active-default  { border-color: var(--accent) !important; color: var(--accent) !important; }

        /* ─── Body text readability ─── */
        .body-text {
            color: var(--text-secondary);
            line-height: 1.75;
            font-size: 0.8rem;
        }

        /* ─── Joblisting preview text ─── */
        .job-preview-text {
            color: #374070;
            line-height: 1.8;
            font-size: 0.78rem;
        }
    </style>
</head>
<body class="antialiased min-h-screen">

<header class="app-header px-6 py-3.5 sticky top-0 z-50 flex items-center justify-between">
    <a href="/" class="flex items-center gap-2.5 no-underline">
        <div class="w-7 h-7 rounded-lg flex items-center justify-center shrink-0"
             style="background: linear-gradient(135deg, #4F46E5, #7C3AED); box-shadow: 0 2px 8px rgba(79,70,229,0.4);">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                <path d="M2 12L6 7L9 10L13 4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <span class="font-bold text-base tracking-tight">
            <span class="gradient-text">転職ツール</span>
        </span>
        <span class="hidden sm:inline" style="color:var(--text-muted); font-size:0.75rem; font-weight:400;">求人分析・スクレイパー・履歴書</span>
    </a>
    <nav class="flex items-center gap-6">
        <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">ダッシュボード</a>
        <a href="/compare" class="nav-link {% if request.path == '/compare' %}active{% endif %}">比較</a>
        <span style="color:var(--border-mid);">│</span>
        <a href="/scraper" class="nav-link {% if request.path.startswith('/scraper') %}active{% endif %}">🕸️ スクレイパー</a>
        <a href="/resume" class="nav-link {% if request.path.startswith('/resume') %}active{% endif %}">📝 履歴書</a>
    </nav>
</header>

<main class="{% block main_class %}{% endblock %}">
    {% block content %}{% endblock %}
</main>

{% block scripts %}{% endblock %}
</body>
</html>
