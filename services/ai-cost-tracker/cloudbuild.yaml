steps:
  # ???E????????????Epull?E??E??E????????E
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'docker pull asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/ai-cost-tracker:latest || true'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--cache-from'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/ai-cost-tracker:latest'
      - '-t'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/ai-cost-tracker:latest'
      - '-f'
      - 'services/ai-cost-tracker/Dockerfile'
      - '.'
    dir: '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/ai-cost-tracker:latest'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'ai-cost-tracker'
      - '--image=asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/ai-cost-tracker:latest'
      - '--region=asia-northeast1'
      - '--allow-unauthenticated'
      - '--service-account=document-management-system@$PROJECT_ID.iam.gserviceaccount.com'
      - '--timeout=60'
      - '--set-env-vars=SUPABASE_URL=${_SUPABASE_URL},SUPABASE_KEY=${_SUPABASE_KEY},SUPABASE_SERVICE_ROLE_KEY=${_SUPABASE_SERVICE_ROLE_KEY}'

images:
  - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/ai-cost-tracker:latest'

substitutions:
  _SUPABASE_URL: ''
  _SUPABASE_KEY: ''
  _SUPABASE_SERVICE_ROLE_KEY: ''

options:
  logging: CLOUD_LOGGING_ONLY
  substitutionOption: ALLOW_LOOSE

timeout: 600s
