<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Drive Map for AI 🌎</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #1e293b; padding: 40px; margin: 0; }
        .container { max-width: 1000px; margin: 0 auto; }
        header { border-bottom: 2px solid #e2e8f0; margin-bottom: 30px; padding-bottom: 20px; }
        h1 { font-weight: 800; color: #0284c7; margin: 0; }
        .instr { color: #64748b; font-size: 1.1rem; margin-top: 10px; }
        .copy-box { background: #ffffff; border-radius: 12px; padding: 20px; border: 1px solid #e2e8f0; position: relative; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        pre { white-space: pre-wrap; word-break: break-all; font-family: 'Courier New', monospace; font-size: 0.85rem; height: 600px; overflow-y: scroll; padding: 15px; background: #f1f5f9; color: #334155; border-radius: 8px; margin: 0; border: 1px solid #cbd5e1; }
        .btn-copy { position: absolute; top: 30px; right: 30px; background: #0284c7; color: #ffffff; border: none; padding: 10px 20px; border-radius: 6px; font-weight: 800; cursor: pointer; }
        .btn-back { display: inline-block; margin-top: 30px; padding: 12px 24px; color: #0284c7; text-decoration: none; border: 2px solid #0284c7; border-radius: 6px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Google Drive Map Generator 🌎</h1>
            <p class="instr">全ファイルの構造データを生成しました。これを全てコピーして AI に渡してください。</p>
        </header>
        
        <div class="copy-box">
            <button class="btn-copy" onclick="copyToClipboard()">📋 全てコピー</button>
            <pre id="mapContent">{{ map_text }}</pre>
        </div>

        <a href="/" class="btn-back">← 戻る</a>
    </div>

    <script>
        function copyToClipboard() {
            const pre = document.getElementById('mapContent');
            const text = pre.innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert("クリップボードにコピーしました！これを Custom GEM に貼り付けて「整理をお願い」と伝えてください。");
            });
        }
    </script>
</body>
</html>
