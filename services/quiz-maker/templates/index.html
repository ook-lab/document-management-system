<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 4択クイズメーカー Premium</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/static/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="クイズメーカー">
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Google Fonts -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
    body {
      font-family: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 8px 32px 0 rgba(99, 102, 241, 0.04);
    }
    .light-glass-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 10px 40px 0 rgba(99, 102, 241, 0.06);
    }
    .neon-border {
      box-shadow: 0 0 15px rgba(99, 102, 241, 0.1);
    }


  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f5f3ff',
              100: '#ede9fe',
              500: '#6366f1',
              600: '#4f46e5',
              700: '#4338ca',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen antialiased bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-indigo-50 via-slate-50 to-slate-100 selection:bg-indigo-100 selection:text-indigo-900">


  <div id="root"></div>

  <script type="text/babel">
    {% raw %}
    const { useState, useEffect } = React;

    function App() {
      // 画面状態
      const [step, setStep] = useState('input'); // 'input', 'loading', 'quiz', 'result'
      
      // クイズ生成パラメータ
      const [sourceText, setSourceText] = useState('');
      const [inputType, setInputType] = useState('pdf'); // 'pdf', 'text'
      const [pdfFile, setPdfFile] = useState(null);
      const [questionCount, setQuestionCount] = useState(10);
      // 苦手分析の反映度 (strong, medium, weak, none)
      const [historyAnalysisLevel, setHistoryAnalysisLevel] = useState(() => {
        return localStorage.getItem('historyAnalysisLevel') || 'none';
      });
      
      // 科目データ関連
      const [subjects, setSubjects] = useState([]);
      const [selectedSubjectId, setSelectedSubjectId] = useState('');
      
      // クイズ実行データ
      const [questions, setQuestions] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [selectedOption, setSelectedOption] = useState(null);
      const [showAnswer, setShowAnswer] = useState(false);
      const [score, setScore] = useState(0);
      const [answerHistory, setAnswerHistory] = useState([]);
      
      // トークン消費情報
      const [tokenUsage, setTokenUsage] = useState(null);
      
      // 保存・通信ステータス
      const [error, setError] = useState(null);
      const [saveStatus, setSaveStatus] = useState(null); // 'saving', 'success', 'error'
      const [isDragging, setIsDragging] = useState(false); // ドラッグ中フラグ
      
      // 隠し設定画面用 (モーダル/タブ)
      const [showSettings, setShowSettings] = useState(false);
      const [newSubjectName, setNewSubjectName] = useState('');
      const [selectedEditSubjectId, setSelectedEditSubjectId] = useState('');
      const [editingPrompt, setEditingPrompt] = useState('');
      const [optimizingPrompt, setOptimizingPrompt] = useState(false);
      const [settingsSaveStatus, setSettingsSaveStatus] = useState(null);

      // 苦手分析反映度のローカルストレージ同期
      useEffect(() => {
        localStorage.setItem('historyAnalysisLevel', historyAnalysisLevel);
      }, [historyAnalysisLevel]);

      // 初期ロード: 科目データの取得 & モバイル縦向きロック & PWA・共有ファイルのロード
      useEffect(() => {
        fetchSubjects();
        
        // 縦向きロック
        if (window.screen && window.screen.orientation && window.screen.orientation.lock) {
          window.screen.orientation.lock('portrait').catch(err => {
            console.log("Orientation lock is not supported or was rejected:", err);
          });
        }
        
        // サービスワーカー登録
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('ServiceWorker registered'))
            .catch(err => console.error('ServiceWorker registration failed', err));
        }

        // URLパラメータの解析 (共有ファイルやエラーの受け取り)
        const params = new URLSearchParams(window.location.search);
        const sharedId = params.get('shared_id');
        const errParam = params.get('error');

        if (errParam) {
          if (errParam === 'empty_file') {
            setError("共有されたファイルの中身が空（0バイト）でした。");
          } else if (errParam === 'share_failed') {
            setError("共有ファイルの受け取りに失敗しました。");
          }
          // URLパラメータをクリア
          window.history.replaceState({}, document.title, window.location.pathname);
        } else if (sharedId) {
          loadSharedPdf(sharedId);
        }
      }, []);

      const loadSharedPdf = async (id) => {
        setStep('loading');
        setError(null);
        try {
          const res = await fetch(`/api/get-shared-pdf?id=${id}`);
          if (!res.ok) throw new Error("共有ファイルの取得に失敗したか、期限が切れています。");
          
          const blob = await res.blob();
          
          const contentDisposition = res.headers.get('Content-Disposition');
          let filename = "shared_document.pdf";
          if (contentDisposition) {
            const filenameMatch = contentDisposition.match(/filename\*?=(?:UTF-8'')?([^;'\"]+)/i) || contentDisposition.match(/filename=\"?([^;\"]+)\"?/i);
            if (filenameMatch && filenameMatch[1]) {
              filename = decodeURIComponent(filenameMatch[1]);
            }
          }
          
          const file = new File([blob], filename, { type: 'application/pdf' });
          setPdfFile(file);
          setInputType('pdf');
          setStep('input');
        } catch (err) {
          console.error(err);
          setError(err.message || "共有ファイルの読み込みに失敗しました。");
          setStep('input');
        } finally {
          window.history.replaceState({}, document.title, window.location.pathname);
        }
      };

      // Lucideアイコンの再描画
      useEffect(() => {
        if (window.lucide) {
          window.lucide.createIcons();
        }
      }, [step, inputType, pdfFile, showAnswer, showSettings, subjects, selectedEditSubjectId, saveStatus, tokenUsage, historyAnalysisLevel]);

      const fetchSubjects = async () => {
        try {
          const res = await fetch('/api/subjects');
          if (!res.ok) throw new Error("科目の取得に失敗しました。");
          const data = await res.json();
          setSubjects(data);
          if (data.length > 0) {
            setSelectedSubjectId(data[0].id);
            setSelectedEditSubjectId(data[0].id);
            setEditingPrompt(data[0].prompt);
          }
        } catch (err) {
          console.error(err);
          setError("DB接続エラー: 科目データが読み込めません。マイグレーションファイルが適用されているか確認してください。");
        }
      };

      // 科目選択時に編集プロンプトを同期
      const handleEditSubjectChange = (id) => {
        setSelectedEditSubjectId(id);
        const sub = subjects.find(s => s.id === id);
        if (sub) {
          setEditingPrompt(sub.prompt);
        }
      };

      // 科目の並び替え処理
      const handleMoveSubject = async (index, direction) => {
        if (direction === 'up' && index === 0) return;
        if (direction === 'down' && index === subjects.length - 1) return;

        const newSubjects = [...subjects];
        const targetIndex = direction === 'up' ? index - 1 : index + 1;
        
        // 要素を入れ替える
        const temp = newSubjects[index];
        newSubjects[index] = newSubjects[targetIndex];
        newSubjects[targetIndex] = temp;

        // sort_order をインデックス順に振り直す (1から始める)
        const reordered = newSubjects.map((sub, idx) => ({
          ...sub,
          sort_order: idx + 1
        }));

        setSubjects(reordered);

        // バックエンドに順序変更を送信
        setSettingsSaveStatus('saving');
        try {
          const payload = reordered.map(sub => ({
            id: sub.id,
            sort_order: sub.sort_order
          }));
          const res = await fetch('/api/subjects/reorder', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          if (!res.ok) throw new Error("順序の更新に失敗しました。");
          setSettingsSaveStatus('success_save');
        } catch (err) {
          console.error(err);
          setSettingsSaveStatus('error');
          // エラーの場合は元の順序を再取得
          fetchSubjects();
        }
        setTimeout(() => setSettingsSaveStatus(null), 3000);
      };

      // クイズ生成API呼び出し
      const generateQuestions = async () => {
        setStep('loading');
        setError(null);
        setAnswerHistory([]);
        setTokenUsage(null);

        const formData = new FormData();
        formData.append("subject_id", selectedSubjectId);
        formData.append("question_count", questionCount);
        formData.append("history_analysis_level", historyAnalysisLevel);
        
        if (inputType === 'text') {
          formData.append("source_text", sourceText);
        } else if (inputType === 'pdf' && pdfFile) {
          formData.append("pdf", pdfFile);
        } else {
          setError("入力データが不足しています。");
          setStep('input');
          return;
        }

        try {
          const response = await fetch('/api/generate-questions', {
            method: 'POST',
            body: formData
          });

          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.error || "問題の作成中にエラーが発生しました。");
          }

          setQuestions(data.questions);
          setTokenUsage(data.tokens); // トークン情報保存
          setCurrentIndex(0);
          setSelectedOption(null);
          setShowAnswer(false);
          setScore(0);
          setStep('quiz');
        } catch (err) {
          console.error(err);
          setError(err.message || "問題の生成に失敗しました。APIキーを確認してください。");
          setStep('input');
        }
      };

      // 科目の追加
      const handleAddSubject = async () => {
        if (!newSubjectName.trim()) return;
        setSettingsSaveStatus('saving');
        try {
          // デフォルトのプロンプトをセット
          const defaultPrompt = `あなたは最難関中学校に生徒を合格させるために最適な問題を作る教材クリエイターです。入力されたテキストやファイルから${newSubjectName}に関する重要な要素を抽出し、問題文、正解、もっともらしいダミーの選択肢3つを含む4択問題を作成してください。`;
          const res = await fetch('/api/subjects', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: newSubjectName, prompt: defaultPrompt })
          });
          if (!res.ok) throw new Error("科目の追加に失敗しました。");
          setNewSubjectName('');
          await fetchSubjects();
          setSettingsSaveStatus('success_add');
        } catch (err) {
          console.error(err);
          setSettingsSaveStatus('error');
        }
        setTimeout(() => setSettingsSaveStatus(null), 3000);
      };

      // 科目の削除
      const handleDeleteSubject = async (id) => {
        if (!confirm("この科目を削除しますか？紐づく履歴もすべて削除されます。")) return;
        setSettingsSaveStatus('saving');
        try {
          const res = await fetch(`/api/subjects/${id}`, { method: 'DELETE' });
          if (!res.ok) throw new Error("科目の削除に失敗しました。");
          await fetchSubjects();
          setSettingsSaveStatus('success_delete');
        } catch (err) {
          console.error(err);
          setSettingsSaveStatus('error');
        }
        setTimeout(() => setSettingsSaveStatus(null), 3000);
      };

      // プロンプトの保存
      const handleSavePrompt = async () => {
        if (!selectedEditSubjectId || !editingPrompt.trim()) return;
        setSettingsSaveStatus('saving');
        try {
          const currentSubject = subjects.find(s => s.id === selectedEditSubjectId);
          const res = await fetch('/api/subjects', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              id: selectedEditSubjectId,
              name: currentSubject.name,
              prompt: editingPrompt
            })
          });
          if (!res.ok) throw new Error("プロンプトの保存に失敗しました。");
          await fetchSubjects();
          setSettingsSaveStatus('success_save');
        } catch (err) {
          console.error(err);
          setSettingsSaveStatus('error');
        }
        setTimeout(() => setSettingsSaveStatus(null), 3000);
      };

      // AIによるプロンプト自動調整
      const handleOptimizePrompt = async () => {
        if (!editingPrompt.trim()) return;
        setOptimizingPrompt(true);
        try {
          const currentSubject = subjects.find(s => s.id === selectedEditSubjectId);
          const res = await fetch('/api/optimize-prompt', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              prompt: editingPrompt,
              subject: currentSubject ? currentSubject.name : '一般科目'
            })
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || "最適化に失敗しました。");
          setEditingPrompt(data.optimized_prompt);
        } catch (err) {
          alert("自動調整エラー: " + err.message);
        } finally {
          setOptimizingPrompt(false);
        }
      };

      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (file.type !== "application/pdf") {
          setError("PDFファイルを選択してください。");
          return;
        }
        
        if (file.size === 0) {
          setError(
            "ファイルの中身が空（0バイト）です。iOSの制限により、Google ドライブ等のクラウド上のファイルが一時的に端末にダウンロードされていないとこのエラーが発生します。\n\n" +
            "【対策①】iPadの「ファイル」アプリで対象ファイルを「長押し」して「今すぐダウンロード」を実行してから選択し直してください。\n" +
            "【対策②】iPadの画面分割（Split View）を使い、「ファイル」アプリから対象のPDFを直接この画面の「PDFファイルを選択」エリアにドラッグ＆ドロップしてください。"
          );
          setPdfFile(null);
          return;
        }
        
        setError(null);
        setPdfFile(file);
      };

      const handleDragOver = (e) => {
        e.preventDefault();
        setIsDragging(true);
      };

      const handleDragLeave = () => {
        setIsDragging(false);
      };

      const handleDrop = (e) => {
        e.preventDefault();
        setIsDragging(false);
        setError(null);
        
        const files = e.dataTransfer.files;
        if (files && files.length > 0) {
          const file = files[0];
          if (file.type !== "application/pdf") {
            setError("PDFファイルを選択してください。");
            return;
          }
          if (file.size === 0) {
            setError(
              "ファイルの中身が空（0バイト）です。ファイルが完全にダウンロードされているか確認してください。"
            );
            return;
          }
          setPdfFile(file);
        }
      };

      const handleStart = () => {
        if (!selectedSubjectId) {
          setError("科目を選択してください。科目が登録されていない場合は、設定（⚙️）から作成してください。");
          return;
        }
        if (inputType === 'text' && sourceText.trim().length < 40) {
          setError("テキストが短すぎます。もう少し詳しい内容（目安: 40文字以上）を入力してください。");
          return;
        }
        if (inputType === 'pdf' && !pdfFile) {
          setError("PDFファイルが準備されていません。ファイルを選択してください。");
          return;
        }
        generateQuestions();
      };

      const handleOptionSelect = (option) => {
        if (showAnswer) return;
        setSelectedOption(option);
        setShowAnswer(true);
        
        const isCorrect = option === questions[currentIndex].correctAnswer;
        if (isCorrect) setScore(prev => prev + 1);
        setAnswerHistory(prev => {
          const newHistory = [...prev];
          newHistory[currentIndex] = {
            timestamp: new Date().toLocaleString('ja-JP'),
            question: questions[currentIndex].question,
            correctAnswer: questions[currentIndex].correctAnswer,
            userAnswer: option,
            isCorrect: isCorrect
          };
          return newHistory;
        });
      };

      const handleNext = () => {
        if (currentIndex < questions.length - 1) {
          setCurrentIndex(prev => prev + 1);
          setSelectedOption(null);
          setShowAnswer(false);
        } else {
          setStep('result');
        }
      };

      // 回答履歴のSupabase保存
      const saveQuizResultToSupabase = async () => {
        setSaveStatus('saving');
        try {
          const payload = {
            subject_id: selectedSubjectId,
            history: answerHistory.filter(Boolean)
          };
          const res = await fetch('/api/save-history', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          const result = await res.json();
          if (!res.ok) throw new Error(result.error || "保存に失敗しました。");
          setSaveStatus('success');
        } catch (err) {
          console.error(err);
          setSaveStatus('error');
        }
        setTimeout(() => setSaveStatus(null), 5000);
      };

      const resetApp = () => {
        setStep('input');
        setSourceText('');
        setPdfFile(null);
        setQuestions([]);
        setCurrentIndex(0);
        setSelectedOption(null);
        setShowAnswer(false);
        setScore(0);
        setError(null);
        setAnswerHistory([]);
        setSaveStatus(null);
        setTokenUsage(null);
      };

      const insertSampleText = () => {
        setSourceText("日本国憲法は、1946年（昭和21年）11月3日に公布され、1947年（昭和22年）5月3日に施行された日本の憲法である。国民主権、基本的人権の尊重、平和主義を基本原理としている。天皇は日本国の象徴であり日本国民統合の象徴とされ、国政に関する権能を有しない。国会は国権の最高機関であり、国の唯一の立法機関である。衆議院と参議院の両院で構成される二院制をとる。行政権は内閣に属し、内閣総理大臣は国会議員の中から国会の議決で指名される。司法権は最高裁判所及び下級裁判所に属する。");
        setError(null);
      };

      return (
        <div className="min-h-screen pb-16 flex flex-col justify-between">
          <div>
            {/* ヘッダー */}
            <header className="border-b border-slate-200/80 bg-white/80 backdrop-blur-md sticky top-0 z-20">
              <div className="max-w-4xl mx-auto px-6 py-4 flex items-center justify-between">
                <div className="flex items-center gap-3">
                  <div className="bg-indigo-600 text-white p-2 rounded-xl neon-border">
                    <i data-lucide="brain-circuit" className="w-6 h-6"></i>
                  </div>
                  <div>
                    <h1 className="text-xl font-bold tracking-tight text-slate-900 flex items-center gap-2">
                      AI 4択クイズメーカー <span className="text-xs bg-indigo-50 text-indigo-600 border border-indigo-200 px-2 py-0.5 rounded font-mono">v3.5</span>
                    </h1>
                    <p className="text-[10px] text-slate-500">Powered by Gemini 3.5 Flash & Supabase</p>
                  </div>
                </div>

                <div className="flex items-center gap-3">
                  <button
                    onClick={() => setShowSettings(!showSettings)}
                    className="p-2.5 rounded-xl border border-slate-200 bg-white text-slate-700 hover:text-indigo-600 hover:bg-indigo-50/50 hover:border-indigo-200 transition-all flex items-center gap-1.5 text-xs font-semibold shadow-sm"
                    title="科目別プロンプト設定 (隠しタブ)"
                  >
                    <i data-lucide="settings" className="w-4 h-4"></i>
                    <span>プロンプト設定</span>
                  </button>
                </div>
              </div>
            </header>

            {/* メインコンテンツ */}
            <main className="max-w-3xl mx-auto px-6 py-8">
              
              {/* エラー表示 */}
              {error && (
                <div className="mb-8 p-4 rounded-2xl bg-rose-5 border border-rose-200 text-rose-700 text-sm flex items-start gap-3 animate-in fade-in duration-300 shadow-sm">
                  <i data-lucide="alert-triangle" className="w-5 h-5 text-rose-500 flex-shrink-0 mt-0.5"></i>
                  <div className="leading-relaxed">
                    <p className="font-semibold text-rose-800">エラーが発生しました</p>
                    <p className="mt-1 opacity-90">{error}</p>
                  </div>
                </div>
              )}

              {/* 隠し設定タブ（プロンプト・科目編集画面） */}
              {showSettings && (
                <div className="mb-8 glass-card rounded-3xl p-6 sm:p-8 animate-in slide-in-from-top-4 duration-300 relative overflow-hidden shadow-xl border border-slate-200/80">
                  <div className="absolute top-0 right-0 w-32 h-32 bg-indigo-500/5 rounded-full blur-3xl -z-10"></div>
                  
                  <div className="flex items-center justify-between border-b border-slate-200 pb-4 mb-6">
                    <h2 className="text-xl font-bold flex items-center gap-2 text-indigo-600">
                      <i data-lucide="settings" className="w-5 h-5"></i>
                      ⚙️ システム設定 & 科目並び替え
                    </h2>
                    <button 
                      onClick={() => setShowSettings(false)}
                      className="text-slate-500 hover:text-indigo-600 p-1 rounded-lg hover:bg-slate-100 transition-colors"
                    >
                      <i data-lucide="x" className="w-5 h-5"></i>
                    </button>
                  </div>

                  {/* サブステータス */}
                  {settingsSaveStatus && (
                    <div className="mb-4 p-3 text-sm rounded-xl font-medium flex items-center gap-2 border animate-in fade-in">
                      {settingsSaveStatus === 'saving' && (
                        <span className="text-indigo-600 border-indigo-200 bg-indigo-50 flex items-center gap-1.5 w-full">
                          <i data-lucide="loader" className="w-4 h-4 animate-spin"></i> 処理中...
                        </span>
                      )}

                            buttonClass += "bg-emerald-50 border-emerald-300 text-emerald-800 shadow-sm";

                            buttonClass += "bg-rose-50 border-rose-300 text-rose-800 shadow-sm";
                          } else {
                            buttonClass += "bg-white/40 border-slate-150 text-slate-400 opacity-60";

                                  : 'bg-slate-100 border-slate-200 text-slate-500'

                          {currentIndex < questions.length - 1 ? '次の問題へ' : '結果を見る'} <i data-lucide="chevron-right" className="w-4 h-4"></i>
                        </button>
                      </div>
                    )}
                  </div>
                </div>
              )}

              {/* 4. 結果表示フェーズ */}
              {step === 'result' && (
                <div className="animate-in slide-in-from-bottom-8 fade-in duration-500 text-center py-8">
                  
                  {/* スコアグラフィック */}
                  <div className="w-20 h-20 bg-indigo-50 text-indigo-600 rounded-3xl flex items-center justify-center mx-auto mb-6 border border-indigo-200 shadow-lg neon-border">
                    <i data-lucide="award" className="w-10 h-10"></i>
                  </div>
                  
                  <h2 className="text-2xl sm:text-3xl font-black text-slate-800 mb-2">クイズ完了</h2>
                  <div className="text-4xl sm:text-5xl font-black text-indigo-600 mb-6 font-mono">
                    {score} <span className="text-lg text-slate-500 font-bold font-sans">/ {questions.length} 問正解</span>
                  </div>
                  
                  <p className="text-slate-500 mb-8 max-w-md mx-auto text-sm leading-relaxed font-medium">
                    {score === questions.length ? "パーフェクト！素晴らしい理解力です。" : 
                     score >= questions.length * 0.7 ? "優秀な成績です！復習して満点を目指しましょう。" : 
                     "解説をよく読み、もう一度挑戦してみましょう！"}
                  </p>

                  {/* トークン消費量詳細表示 */}
                  {tokenUsage && (
                    <div className="max-w-md mx-auto mb-8 bg-white p-4 rounded-2xl border border-slate-200 text-left shadow-sm">
                      <h4 className="text-xs font-bold text-slate-500 mb-2 flex items-center gap-1.5">
                        <i data-lucide="database" className="w-4 h-4 text-indigo-600"></i>
                        API Token Usage (Gemini 3.5 Flash)
                      </h4>
                      <div className="grid grid-cols-3 gap-2 text-center text-xs font-mono">
                        <div className="bg-slate-50 p-2.5 rounded-xl border border-slate-200">
                          <p className="text-[10px] text-slate-400 mb-0.5">Input</p>
                          <p className="font-bold text-slate-700">{tokenUsage.prompt_tokens}</p>
                        </div>
                        <div className="bg-slate-50 p-2.5 rounded-xl border border-slate-200">
                          <p className="text-[10px] text-slate-400 mb-0.5">Output</p>
                          <p className="font-bold text-slate-700">{tokenUsage.candidates_tokens}</p>
                        </div>
                        <div className="bg-slate-50 p-2.5 rounded-xl border border-slate-200">
                          <p className="text-[10px] text-slate-400 mb-0.5">Total</p>
                          <p className="font-bold text-indigo-600">{tokenUsage.total_tokens}</p>
                        </div>
                      </div>
                    </div>
                  )}

                  {/* Supabase保存セクション */}
                  <div className="mb-10 max-w-sm mx-auto">
                    <button
                      onClick={saveQuizResultToSupabase}
                      disabled={saveStatus === 'saving'}
                      className="w-full bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-200 text-white font-bold py-3.5 px-6 rounded-xl transition-all shadow-md flex items-center justify-center gap-2 text-sm shadow-indigo-600/10"
                    >
                      {saveStatus === 'saving' ? (
                        <i data-lucide="loader" className="w-4 h-4 animate-spin"></i>
                      ) : (
                        <i data-lucide="database" className="w-4 h-4"></i>
                      )}
                      {saveStatus === 'saving' ? "Supabaseに保存中..." : "回答履歴をDBへ同期する"}
                    </button>
                    
                    <div className="h-6 mt-3">
                      {saveStatus === 'success' && (
                        <span className="text-emerald-600 font-bold text-xs flex items-center justify-center gap-1 animate-in fade-in">
                          <i data-lucide="check-circle" className="w-4 h-4 text-emerald-500"></i> 回答データをSupabaseに同期しました！
                        </span>
                      )}
                      {saveStatus === 'error' && (
                        <span className="text-rose-600 font-bold text-xs flex items-center justify-center gap-1 animate-in fade-in">
                          <i data-lucide="alert-circle" className="w-4 h-4 text-rose-500"></i> 同期に失敗しました。DB設定を確認してください。
                        </span>
                      )}
                    </div>
                  </div>

                  {/* アクションボタン */}
                  <div className="flex flex-col sm:flex-row items-center justify-center gap-3 max-w-md mx-auto">
                    <button
                      onClick={() => {
                        setCurrentIndex(0);
                        setSelectedOption(null);
                        setShowAnswer(false);
                        setScore(0);
                        setStep('quiz');
                        setAnswerHistory([]); 
                      }}
                      className="w-full bg-white border border-slate-200 hover:border-slate-350 text-slate-700 hover:text-slate-900 font-bold py-3 px-6 rounded-xl transition-all text-sm shadow-sm"
                    >
                      同じ問題に再挑戦
                    </button>
                    <button
                      onClick={generateQuestions}
                      className="w-full bg-indigo-50 hover:bg-indigo-100 border border-indigo-200 text-indigo-700 font-bold py-3 px-6 rounded-xl transition-all flex items-center justify-center gap-1.5 text-sm shadow-sm"
                    >
                      <i data-lucide="refresh-cw" className="w-4 h-4"></i> 別の問題を作成
                    </button>
                    <button
                      onClick={resetApp}
                      className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-xl transition-all shadow-md flex items-center justify-center gap-1.5 text-sm shadow-indigo-600/10"
                    >
                      <i data-lucide="rotate-ccw" className="w-4 h-4"></i> トップに戻る
                    </button>
                  </div>

                  {/* 復習リスト */}
                  <div className="mt-16 text-left max-w-2xl mx-auto border-t border-slate-200 pt-8">
                    <h3 className="text-lg font-bold text-slate-800 mb-6 flex items-center gap-2">
                      <i data-lucide="book-open" className="text-indigo-600 w-5 h-5"></i>
                      今回の問題と詳細解説（復習リスト）
                    </h3>
                    <div className="space-y-4">
                      {questions.map((q, idx) => (
                        <div key={idx} className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                          <p className="font-bold text-xs text-indigo-600 mb-1">QUESTION {idx + 1}</p>
                          <p className="text-slate-800 mb-3 font-bold text-base leading-relaxed">{q.question}</p>
                          <div className="bg-emerald-50 text-emerald-750 p-3.5 rounded-xl text-xs sm:text-sm font-semibold border border-emerald-200 flex items-start gap-2 mb-3">
                            <span className="font-bold shrink-0 text-emerald-600">正解：</span>
                            <span>{q.correctAnswer}</span>
                          </div>
                          <div className="text-xs sm:text-sm text-slate-600 bg-slate-50 p-4 rounded-xl border border-slate-200 leading-relaxed shadow-inner">
                            <span className="font-bold text-slate-400 block mb-1 text-xs">解説：</span>
                            {q.explanationDetailed}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              )}
            </main>
          </div>

          {/* フッター */}
          <footer className="max-w-4xl mx-auto px-6 pt-12 border-t border-slate-200 w-full text-center text-[10px] sm:text-xs text-slate-500">
            <p>© 2026 AI Quiz Maker Premium. All Rights Reserved.</p>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
    {% endraw %}
  </script>
</body>
</html>
