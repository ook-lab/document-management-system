<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 4択クイズメーカー Premium</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/static/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="クイズメーカー">
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Google Fonts -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
    body {
      font-family: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 8px 32px 0 rgba(99, 102, 241, 0.04);
    }
    .light-glass-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 10px 40px 0 rgba(99, 102, 241, 0.06);
    }
    .neon-border {
      box-shadow: 0 0 15px rgba(99, 102, 241, 0.1);
    }


  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f5f3ff',
              100: '#ede9fe',
              500: '#6366f1',
              600: '#4f46e5',
              700: '#4338ca',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen antialiased bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-indigo-50 via-slate-50 to-slate-100 selection:bg-indigo-100 selection:text-indigo-900">


  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Lucide icons を React 管理下で安全に描画するコンポーネント
    // createIcons() は使わず dangerouslySetInnerHTML で SVG を挿入することで
    // React の DOM reconciliation と競合しない
    function Icon({ name, className }) {
      const iconData = window.lucide && window.lucide.icons && window.lucide.icons[name];
      if (!iconData) return <span className={className} />;
      const svg = iconData.toSvg({ class: className, width: undefined, height: undefined, style: 'display:inline-block;vertical-align:middle' });
      return <span dangerouslySetInnerHTML={{ __html: svg }} />;
    }

    // JSONパースの安全なラッパー（HTMLエラーページなどの非JSONレスポンスでSafariがクラッシュするのを防ぐ）
    async function safeParseJson(res) {
      const contentType = res.headers.get("content-type");
      if (contentType && contentType.includes("application/json")) {
        return await res.json();
      }
      const text = await res.text();
      throw new Error(`サーバーエラー (${res.status}): ${text.substring(0, 150)}`);
    }

    function App() {
      // 画面状態
      const [step, setStep] = useState('input'); // 'input', 'loading', 'quiz', 'result'
      
      // クイズ生成パラメータ
      const [sourceText, setSourceText] = useState('');
      const [inputType, setInputType] = useState('pdf'); // 'pdf', 'text'
      const [pdfFiles, setPdfFiles] = useState([]);
      const [questionCount, setQuestionCount] = useState(10);
      // 苦手分析の反映度 (strong, medium, weak, none)
      const [historyAnalysisLevel, setHistoryAnalysisLevel] = useState(() => {
        return localStorage.getItem('historyAnalysisLevel') || 'none';
      });
      
      // 科目データ関連
      const [subjects, setSubjects] = useState([]);
      const [selectedSubjectId, setSelectedSubjectId] = useState('');
      
      // クイズ実行データ
      const [questions, setQuestions] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const transitioningRef = useRef(false);
      const [selectedOption, setSelectedOption] = useState(null);
      const [showAnswer, setShowAnswer] = useState(false);
      const [score, setScore] = useState(0);
      const [answerHistory, setAnswerHistory] = useState([]);
      
      // トークン消費情報
      const [tokenUsage, setTokenUsage] = useState(null);
      
      // 保存・通信ステータス
      const [error, setError] = useState(null);
      const [saveStatus, setSaveStatus] = useState(null); // 'saving', 'success', 'error'
      const [isDragging, setIsDragging] = useState(false); // ドラッグ中フラグ
      const [googleConfig, setGoogleConfig] = useState({ clientId: '', apiKey: '' }); // Google Picker用
      
      // 隠し設定画面用 (モーダル/タブ)
      const [showSettings, setShowSettings] = useState(false);
      const [newSubjectName, setNewSubjectName] = useState('');
      const [selectedEditSubjectId, setSelectedEditSubjectId] = useState('');
      const [editingPrompt, setEditingPrompt] = useState('');
      const [optimizingPrompt, setOptimizingPrompt] = useState(false);
      const [settingsSaveStatus, setSettingsSaveStatus] = useState(null);

      // 苦手分析反映度のローカルストレージ同期
      useEffect(() => {
        localStorage.setItem('historyAnalysisLevel', historyAnalysisLevel);
      }, [historyAnalysisLevel]);

      // クイズ結果画面に遷移した際に自動でSupabaseへ履歴を同期
      useEffect(() => {
        if (step === 'result' && answerHistory.length > 0) {
          saveQuizResultToSupabase();
        }
      }, [step]);


      // 初期ロード: 科目データの取得 & モバイル縦向きロック & PWA・共有ファイルのロード
      useEffect(() => {
        fetchSubjects();
        
        // 縦向きロック
        if (window.screen && window.screen.orientation && window.screen.orientation.lock) {
          window.screen.orientation.lock('portrait').catch(err => {
            console.log("Orientation lock is not supported or was rejected:", err);
          });
        }
        
        // サービスワーカー登録
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('ServiceWorker registered'))
            .catch(err => console.error('ServiceWorker registration failed', err));
        }

        // URLパラメータの解析 (共有ファイルやエラーの受け取り)
        const params = new URLSearchParams(window.location.search);
        const sharedId = params.get('shared_id');
        const errParam = params.get('error');

        if (errParam) {
          if (errParam === 'empty_file') {
            setError("共有されたファイルの中身が空（0バイト）でした。");
          } else if (errParam === 'share_failed') {
            setError("共有ファイルの受け取りに失敗しました。");
          }
          // URLパラメータをクリア
          window.history.replaceState({}, document.title, window.location.pathname);
        } else if (sharedId) {
          loadSharedPdf(sharedId);
        }
      }, []);

      // ドライブ連携用
      // ドライブ連携用
      const [gdriveFoldersList, setGdriveFoldersList] = useState([]);
      const [newFolderId, setNewFolderId] = useState('');
      const [folderAddError, setFolderAddError] = useState(null);
      const [loadingAddFolder, setLoadingAddFolder] = useState(false);

      const [driveModalOpen, setDriveModalOpen] = useState(false);
      const [driveFolders, setDriveFolders] = useState([]);
      const [selectedFolderId, setSelectedFolderId] = useState('');
      const [driveFiles, setDriveFiles] = useState([]);
      const [loadingDriveFiles, setLoadingDriveFiles] = useState(false);
      const [loadingDriveSelect, setLoadingDriveSelect] = useState(false);

      const fetchSettings = async () => {
        try {
          const res = await fetch('/api/settings');
          if (res.ok) {
            const data = await safeParseJson(res);
            setGdriveFoldersList(data.gdrive_folders || []);
          }
        } catch (err) {
          console.error("Failed to load settings:", err);
        }
      };

      const handleAddFolder = async () => {
        if (!newFolderId.trim()) return;
        setFolderAddError(null);
        setLoadingAddFolder(true);
        try {
          const res = await fetch('/api/drive/add-folder', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ gdrive_folder_id: newFolderId.trim() })
          });
          const data = await safeParseJson(res);
          if (!res.ok) throw new Error(data.error || "フォルダの追加に失敗しました。");
          
          setGdriveFoldersList(data.folders);
          setNewFolderId('');
          setSettingsSaveStatus('success_add');
          setTimeout(() => setSettingsSaveStatus(null), 3000);
        } catch (err) {
          console.error(err);
          setFolderAddError(err.message || "フォルダを追加できませんでした。");
        } finally {
          setLoadingAddFolder(false);
        }
      };

      const handleDeleteFolder = async (folderId) => {
        if (!confirm("このフォルダを一覧から削除しますか？")) return;
        setSettingsSaveStatus('saving');
        try {
          const updatedFolders = gdriveFoldersList.filter(f => f.id !== folderId);
          const res = await fetch('/api/settings', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ gdrive_folders: updatedFolders })
          });
          if (!res.ok) throw new Error("フォルダの削除に失敗しました。");
          
          setGdriveFoldersList(updatedFolders);
          setSettingsSaveStatus('success_delete');
          setTimeout(() => setSettingsSaveStatus(null), 3000);
        } catch (err) {
          console.error(err);
          setSettingsSaveStatus('error');
          setTimeout(() => setSettingsSaveStatus(null), 3000);
        }
      };

      // 設定モーダルが開いたときに設定を取得
      useEffect(() => {
        if (showSettings) {
          fetchSettings();
        }
      }, [showSettings]);

      const openDriveModal = async () => {
        setDriveModalOpen(true);
        setDriveFiles([]);
        setLoadingDriveFiles(true);
        try {
          const res = await fetch('/api/drive/folders');
          if (!res.ok) throw new Error("フォルダ一覧の取得に失敗しました。");
          const folders = await safeParseJson(res);
          setDriveFolders(folders);
          if (folders.length > 0) {
            setSelectedFolderId(folders[0].id);
          } else {
            setLoadingDriveFiles(false);
          }
        } catch (err) {
          console.error(err);
          setError(err.message || "Googleドライブの連携フォルダが見つかりません。");
          setLoadingDriveFiles(false);
        }
      };

      const fetchDriveFiles = async (folderId) => {
        setLoadingDriveFiles(true);
        try {
          const res = await fetch(`/api/drive/files?folder_id=${folderId}`);
          if (!res.ok) throw new Error("ファイル一覧の取得に失敗しました。");
          const files = await safeParseJson(res);
          setDriveFiles(files);
        } catch (err) {
          console.error(err);
          setError(err.message || "ファイル一覧の取得に失敗しました。");
        } finally {
          setLoadingDriveFiles(false);
        }
      };

      // フォルダタブの切り替え時
      useEffect(() => {
        if (selectedFolderId) {
          fetchDriveFiles(selectedFolderId);
        }
      }, [selectedFolderId]);

      // ドライブからファイル選択時
      const handleSelectDriveFile = async (fileId, filename) => {
        setLoadingDriveSelect(true);
        try {
          const res = await fetch('/api/drive/select-file', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ file_id: fileId, filename: filename })
          });
          const data = await safeParseJson(res);
          if (!res.ok) throw new Error(data.error || "ファイルの読み込みに失敗しました。");
          
          setDriveModalOpen(false);
          await loadSharedPdf(data.shared_id);
        } catch (err) {
          console.error(err);
          setError(err.message || "ファイルの読み込みに失敗しました。");
        } finally {
          setLoadingDriveSelect(false);
        }
      };

      const loadSharedPdf = async (id) => {
        setStep('loading');
        setError(null);
        try {
          const res = await fetch(`/api/get-shared-pdf?id=${id}`);
          if (!res.ok) throw new Error("共有ファイルの取得に失敗したか、期限が切れています。");
          
          const blob = await res.blob();
          
          const contentDisposition = res.headers.get('Content-Disposition');
          let filename = "shared_document.pdf";
          if (contentDisposition) {
            const filenameMatch = contentDisposition.match(/filename\*?=(?:UTF-8'')?([^;'\"]+)/i) || contentDisposition.match(/filename=\"?([^;\"]+)\"?/i);
            if (filenameMatch && filenameMatch[1]) {
              filename = decodeURIComponent(filenameMatch[1]);
            }
          }
          
          const file = new File([blob], filename, { type: 'application/pdf' });
          setPdfFiles(prev => {
            if (prev.some(f => f.name === file.name)) return prev;
            return [...prev, file];
          });
          setInputType('pdf');
          setStep('input');
        } catch (err) {
          console.error(err);
          setError(err.message || "共有ファイルの読み込みに失敗しました。");
          setStep('input');
        } finally {
          window.history.replaceState({}, document.title, window.location.pathname);
        }
      };

      // Lucideアイコンの再描画
      useEffect(() => {
        if (window.lucide) {
          window.lucide.createIcons();
        }
      }, [step, inputType, pdfFiles, showAnswer, showSettings, subjects, selectedEditSubjectId, saveStatus, tokenUsage, historyAnalysisLevel]);

      const fetchSubjects = async () => {
        try {
          const res = await fetch('/api/subjects');
          if (!res.ok) throw new Error("科目の取得に失敗しました。");
          const data = await safeParseJson(res);
          setSubjects(data);
          if (data.length > 0) {
            setSelectedSubjectId(data[0].id);
            setSelectedEditSubjectId(data[0].id);
            setEditingPrompt(data[0].prompt);
          }
        } catch (err) {
          console.error(err);
          setError("DB接続エラー: 科目データが読み込めません。マイグレーションファイルが適用されているか確認してください。");
        }
      };

      // 科目選択時に編集プロンプトを同期
      const handleEditSubjectChange = (id) => {
        setSelectedEditSubjectId(id);
        const sub = subjects.find(s => s.id === id);
        if (sub) {
          setEditingPrompt(sub.prompt);
        }
      };

      // 科目の並び替え処理
      const handleMoveSubject = async (index, direction) => {
        if (direction === 'up' && index === 0) return;
        if (direction === 'down' && index === subjects.length - 1) return;

        const newSubjects = [...subjects];
        const targetIndex = direction === 'up' ? index - 1 : index + 1;
        
        // 要素を入れ替える
        const temp = newSubjects[index];
        newSubjects[index] = newSubjects[targetIndex];
        newSubjects[targetIndex] = temp;

        // sort_order をインデックス順に振り直す (1から始める)
        const reordered = newSubjects.map((sub, idx) => ({
          ...sub,
          sort_order: idx + 1
        }));

        setSubjects(reordered);

        // バックエンドに順序変更を送信
        setSettingsSaveStatus('saving');
        try {
          const payload = reordered.map(sub => ({
            id: sub.id,
            sort_order: sub.sort_order
          }));
          const res = await fetch('/api/subjects/reorder', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          if (!res.ok) throw new Error("順序の更新に失敗しました。");
          setSettingsSaveStatus('success_save');
        } catch (err) {
          console.error(err);
          setSettingsSaveStatus('error');
          // エラーの場合は元の順序を再取得
          fetchSubjects();
        }
        setTimeout(() => setSettingsSaveStatus(null), 3000);
      };

      // クイズ生成API呼び出し
      const generateQuestions = async () => {
        setStep('loading');
        setError(null);
        setAnswerHistory([]);
        setTokenUsage(null);

        const formData = new FormData();
        formData.append("subject_id", selectedSubjectId);
        formData.append("question_count", questionCount);
        formData.append("history_analysis_level", historyAnalysisLevel);
        
        if (inputType === 'text') {
          formData.append("source_text", sourceText);
        } else if (inputType === 'pdf' && pdfFiles.length > 0) {
          pdfFiles.forEach(file => {
            formData.append("pdf", file);
          });
        } else {
          setError("入力データが不足しています。");
          setStep('input');
          return;
        }

        try {
          const response = await fetch('/api/generate-questions', {
            method: 'POST',
            body: formData
          });

          const data = await safeParseJson(response);
          if (!response.ok) {
            throw new Error(data.error || "問題の作成中にエラーが発生しました。");
          }

          setQuestions(data.questions);
          setTokenUsage(data.tokens); // トークン情報保存
          setCurrentIndex(0);
          setSelectedOption(null);
          setShowAnswer(false);
          setScore(0);
          setStep('quiz');
        } catch (err) {
          console.error(err);
          setError(err.message || "問題の生成に失敗しました。APIキーを確認してください。");
          setStep('input');
        }
      };

      // 科目の追加
      const handleAddSubject = async () => {
        if (!newSubjectName.trim()) return;
        setSettingsSaveStatus('saving');
        try {
          // デフォルトのプロンプトをセット
          const defaultPrompt = `あなたは最難関中学校に生徒を合格させるために最適な問題を作る教材クリエイターです。入力されたテキストやファイルから${newSubjectName}に関する重要な要素を抽出し、問題文、正解、もっともらしいダミーの選択肢3つを含む4択問題を作成してください。`;
          const res = await fetch('/api/subjects', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: newSubjectName, prompt: defaultPrompt })
          });
          if (!res.ok) throw new Error("科目の追加に失敗しました。");
          setNewSubjectName('');
          await fetchSubjects();
          setSettingsSaveStatus('success_add');
        } catch (err) {
          console.error(err);
          setSettingsSaveStatus('error');
        }
        setTimeout(() => setSettingsSaveStatus(null), 3000);
      };

      // 科目の削除
      const handleDeleteSubject = async (id) => {
        if (!confirm("この科目を削除しますか？紐づく履歴もすべて削除されます。")) return;
        setSettingsSaveStatus('saving');
        try {
          const res = await fetch(`/api/subjects/${id}`, { method: 'DELETE' });
          if (!res.ok) throw new Error("科目の削除に失敗しました。");
          await fetchSubjects();
          setSettingsSaveStatus('success_delete');
        } catch (err) {
          console.error(err);
          setSettingsSaveStatus('error');
        }
        setTimeout(() => setSettingsSaveStatus(null), 3000);
      };

      // プロンプトの保存
      const handleSavePrompt = async () => {
        if (!selectedEditSubjectId || !editingPrompt.trim()) return;
        setSettingsSaveStatus('saving');
        try {
          const currentSubject = subjects.find(s => s.id === selectedEditSubjectId);
          const res = await fetch('/api/subjects', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              id: selectedEditSubjectId,
              name: currentSubject.name,
              prompt: editingPrompt
            })
          });
          if (!res.ok) throw new Error("プロンプトの保存に失敗しました。");
          await fetchSubjects();
          setSettingsSaveStatus('success_save');
        } catch (err) {
          console.error(err);
          setSettingsSaveStatus('error');
        }
        setTimeout(() => setSettingsSaveStatus(null), 3000);
      };

      // AIによるプロンプト自動調整
      const handleOptimizePrompt = async () => {
        if (!editingPrompt.trim()) return;
        setOptimizingPrompt(true);
        try {
          const currentSubject = subjects.find(s => s.id === selectedEditSubjectId);
          const res = await fetch('/api/optimize-prompt', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              prompt: editingPrompt,
              subject: currentSubject ? currentSubject.name : '一般科目'
            })
          });
          const data = await safeParseJson(res);
          if (!res.ok) throw new Error(data.error || "最適化に失敗しました。");
          setEditingPrompt(data.optimized_prompt);
        } catch (err) {
          alert("自動調整エラー: " + err.message);
        } finally {
          setOptimizingPrompt(false);
        }
      };

      const handleFileUpload = (e) => {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;
        
        const validFiles = [];
        for (const file of files) {
          if (file.type !== "application/pdf") {
            setError("PDFファイルを選択してください。");
            continue;
          }
          if (file.size === 0) {
            setError(
              "ファイルの中身が空（0バイト）のファイルが含まれています。iOSの制限により、Google ドライブ等のクラウド上のファイルが一時的に端末にダウンロードされていないとこのエラーが発生します。\n\n" +
              "【対策①】iPadの「ファイル」アプリで対象ファイルを「長押し」して「今すぐダウンロード」を実行してから選択し直してください。\n" +
              "【対策②】iPadの画面分割（Split View）を使い、「ファイル」アプリから対象のPDFを直接この画面の「PDFファイルを選択」エリアにドラッグ＆ドロップしてください。"
            );
            continue;
          }
          validFiles.push(file);
        }
        
        if (validFiles.length > 0) {
          setError(null);
          setPdfFiles(prev => {
            const newFiles = [...prev];
            validFiles.forEach(vf => {
              if (!newFiles.some(f => f.name === vf.name)) {
                newFiles.push(vf);
              }
            });
            return newFiles;
          });
        }
      };

      const handleDragOver = (e) => {
        e.preventDefault();
        setIsDragging(true);
      };

      const handleDragLeave = () => {
        setIsDragging(false);
      };

      const handleDrop = (e) => {
        e.preventDefault();
        setIsDragging(false);
        setError(null);
        
        const files = Array.from(e.dataTransfer.files);
        if (files && files.length > 0) {
          const validFiles = [];
          for (const file of files) {
            if (file.type !== "application/pdf") {
              setError("PDFファイルを選択してください。");
              continue;
            }
            if (file.size === 0) {
              setError(
                "ファイルの中身が空（0バイト）です。ファイルが完全にダウンロードされているか確認してください。"
              );
              continue;
            }
            validFiles.push(file);
          }
          
          if (validFiles.length > 0) {
            setPdfFiles(prev => {

                      </div>

                          <option value={20}>20問</option>
                          <option value={30}>30問</option>
                        </select>

                          inputType === 'pdf' ? 'bg-indigo-600 text-white' : 'text-slate-500 hover:text-indigo-600'

                        <Icon name="file-text" className="w-3.5 h-3.5" /> PDF選択
                      </button>
                      <button
                        onClick={() => { setInputType('text'); setError(null); }}
                        className={`flex-1 py-2 px-1 text-xs rounded-lg flex items-center justify-center gap-1.5 font-bold transition-all ${
                          inputType === 'text' ? 'bg-indigo-600 text-white' : 'text-slate-500 hover:text-indigo-600'

                            </label>

                              onClick={insertSampleText}
                              className="text-xs text-indigo-600 hover:text-indigo-700 flex items-center gap-1 font-bold bg-indigo-50 border border-indigo-100 px-2.5 py-1 rounded-lg transition-all shadow-sm"

                                        <Icon name="trash-2" className="w-3.5 h-3.5" />
                                      </button>
                                    </div>
                                  ))}
                                </div>
                              </div>
                            )}

                            {/* Google ドライブから直接安全にインポートするボタン */}
                            <button
                              type="button"

                              <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M19.349 14.525l-4.14-7.185h-6.42l4.14 7.185h6.42z" fill="#0066DA"/>
                                <path d="M9.162 14.525l3.21-5.568H5.952l-3.21 5.568h6.42z" fill="#00A25B"/>
                                <path d="M11.972 5.342l3.21 5.568H8.762l-3.21-5.568h6.42z" fill="#FFC107"/>
                              </svg>
                              <span>Google ドライブから直接選択 (ログイン不要)</span>
                            </button>
                          </div>
                        </div>
                      )}
                    </div>

                    <button

                        (inputType === 'pdf' && pdfFiles.length === 0)

                      className="w-full bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-200 disabled:text-slate-400 disabled:cursor-not-allowed text-white font-bold py-4 px-6 rounded-2xl transition-all shadow-lg hover:shadow-indigo-500/10 hover:shadow-2xl flex items-center justify-center gap-2 text-base sm:text-lg shadow-indigo-600/10"
                    >
                      問題を作成する <Icon name="sparkles" className="w-5 h-5" />
                    </button>
                  </div>
                </div>

              {/* 2. ローディングフェーズ */}
              {step === 'loading' && (
                <div className="flex flex-col items-center justify-center py-24 animate-in fade-in duration-300">
                  <div className="relative mb-6">
                    <div className="w-16 h-16 border-4 border-indigo-500/20 border-t-indigo-500 rounded-full animate-spin"></div>
                    <div className="w-10 h-10 border-4 border-emerald-500/20 border-t-emerald-500 rounded-full animate-spin absolute top-3 left-3 animate-reverse"></div>
                  </div>
                  <h2 className="text-xl font-bold text-slate-800 mb-2 tracking-wide">問題を自動生成中...</h2>
                  <p className="text-slate-500 text-center text-xs sm:text-sm max-w-sm leading-relaxed">
                    Gemini 3.5 Flashが資料を精査し、科目別プロンプトに準じた厳格なクイズを作成しています。
                  </p>
                </div>
              )}


              {/* 3. クイズ進行フェーズ */}
              {step === 'quiz' && questions.length > 0 && (
                <div className="animate-in zoom-in-95 fade-in duration-300">
                  
                  {/* ヘッダーと進捗 */}
                  <div className="mb-6 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
                    <div className="flex-1">
                      <div className="flex justify-between items-end mb-2">
                        <span className="text-xs font-bold text-slate-500">PROGRESS</span>
                        <span className="text-sm font-black text-indigo-600 font-mono">
                          {currentIndex + 1} <span className="text-xs text-slate-400">/ {questions.length}</span>
                        </span>
                      </div>
                      <div className="h-1.5 w-full bg-slate-200 rounded-full overflow-hidden">
                        <div 
                          className="h-full bg-indigo-600 rounded-full transition-all duration-300 ease-out"
                          style={{ width: `${((currentIndex) / questions.length) * 100}%` }}
                        />
                      </div>
                    </div>
                    {/* トークン消費バッジ */}
                    {tokenUsage && (
                      <div className="flex items-center gap-1.5 bg-indigo-55 border border-indigo-200 px-3 py-1.5 rounded-xl text-indigo-700 text-xs shrink-0 self-end sm:self-auto font-mono shadow-sm bg-indigo-50/50">
                        <Icon name="database" className="w-3.5 h-3.5" />
                        <span>生成トークン: {tokenUsage.total_tokens}</span>
                      </div>
                    )}
                  </div>

                  <div className="glass-card rounded-3xl border border-slate-200 shadow-xl overflow-hidden min-h-[420px] flex flex-col relative">
                    
                    {/* 問題文 */}

                        <Icon name="help-circle" className="w-3.5 h-3.5" />
                        QUESTION {currentIndex + 1}
                      </div>
                      <h3 className="text-lg sm:text-xl font-bold text-slate-800 leading-relaxed max-w-2xl">
                        {questions[currentIndex].question}
                      </h3>
                    </div>

                    {/* 選択肢ボタン */}
                    <div className="flex-1 p-6 flex flex-col gap-3 bg-slate-50/50">

                        let buttonClass = "w-full text-left p-4 rounded-2xl border transition-all text-sm sm:text-base font-semibold flex items-center justify-between ";
                        
                        if (!showAnswer) {
                          buttonClass += "bg-white border-slate-200 hover:border-indigo-500 hover:bg-indigo-50/50 text-slate-700 shadow-sm";
                        } else {
                          if (option === questions[currentIndex].correctAnswer) {
                            buttonClass += "bg-emerald-50 border-emerald-300 text-emerald-800 shadow-sm";
                          } else if (option === selectedOption) {
                            buttonClass += "bg-rose-50 border-rose-300 text-rose-800 shadow-sm";
                          } else {
                            buttonClass += "bg-white/40 border-slate-150 text-slate-400 opacity-60";
                          }
                        }
                        return (
                          <button
                            key={idx}
                            onClick={() => handleOptionSelect(option)}
                            disabled={showAnswer}
                            className={buttonClass}
                          >
                            <div className="flex items-center gap-3">
                              <span className={`w-7 h-7 flex-shrink-0 flex items-center justify-center rounded-full text-xs font-bold font-mono border ${

                                  ? 'bg-emerald-100 border-emerald-400 text-emerald-700' 
                                  : 'bg-slate-100 border-slate-200 text-slate-500'
                              }`}>
                                {['A', 'B', 'C', 'D'][idx]}
                              </span>
                              <span>{option}</span>

                              <Icon name="check" className="w-5 h-5 text-emerald-600 shrink-0" />
                            )}
                            {showAnswer && option === selectedOption && option !== questions[currentIndex].correctAnswer && (
                              <Icon name="x" className="w-5 h-5 text-rose-600 shrink-0" />
                            )}
                          </button>
                        );
                      })}
                    </div>

                    {/* 解説表示 */}
                    {showAnswer && (
                      <div className="p-6 bg-white border-t border-slate-200 flex flex-col gap-4 animate-in fade-in slide-in-from-bottom-2">
                        <div className={`font-bold text-sm sm:text-base flex items-center gap-2 ${
                          selectedOption === questions[currentIndex].correctAnswer ? 'text-emerald-600' : 'text-rose-600'
                        }`}>
                          {selectedOption === questions[currentIndex].correctAnswer ? (
                            <><Icon name="smile" className="w-5 h-5 animate-bounce text-emerald-500" /> 正解！お見事です。</>
                          ) : (
                            <><Icon name="frown" className="w-5 h-5 text-rose-500" /> 不正解... 正解は「{questions[currentIndex].correctAnswer}」です</>
                          )}
                        </div>
                        
                        <div className="bg-slate-50 border border-slate-200 p-4 rounded-xl text-slate-700 text-xs sm:text-sm leading-relaxed shadow-inner">

                            <Icon name="lightbulb" className="w-4 h-4 text-amber-500" /> 解説

                          <p>
                            {selectedOption === questions[currentIndex].correctAnswer 
                              ? questions[currentIndex].explanationShort 
                              : questions[currentIndex].explanationDetailed}
                          </p>

                        <button
                          onClick={handleNext}
                          className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 px-8 rounded-xl transition-all shadow-md flex items-center justify-center gap-2 text-sm sm:text-base mt-2 shadow-indigo-600/10"
                        >
                          {currentIndex < questions.length - 1 ? '次の問題へ' : '結果を見る'} <Icon name="chevron-right" className="w-4 h-4" />
                        </button>
                      </div>
                    )}
                  </div>
                </div>
              )}

              {/* 4. 結果表示フェーズ */}
              {step === 'result' && (
                <div className="animate-in slide-in-from-bottom-8 fade-in duration-500 text-center py-8">
                  
                  {/* スコアグラフィック */}
                  <div className="w-20 h-20 bg-indigo-50 text-indigo-600 rounded-3xl flex items-center justify-center mx-auto mb-6 border border-indigo-200 shadow-lg neon-border">
                    <Icon name="award" className="w-10 h-10" />
                  </div>
                  
                  <h2 className="text-2xl sm:text-3xl font-black text-slate-800 mb-2">クイズ完了</h2>
                  <div className="text-4xl sm:text-5xl font-black text-indigo-600 mb-6 font-mono">
                    {score} <span className="text-lg text-slate-500 font-bold font-sans">/ {questions.length} 問正解</span>
                  </div>
                  
                  <p className="text-slate-500 mb-8 max-w-md mx-auto text-sm leading-relaxed font-medium">
                    {score === questions.length ? "パーフェクト！素晴らしい理解力です。" : 
                     score >= questions.length * 0.7 ? "優秀な成績です！復習して満点を目指しましょう。" : 
                     "解説をよく読み、もう一度挑戦してみましょう！"}
                  </p>

                  {/* トークン消費量詳細表示 */}

                    <div className="max-w-md mx-auto mb-8 bg-white p-4 rounded-2xl border border-slate-200 text-left shadow-sm">

                        <Icon name="database" className="w-4 h-4 text-indigo-600" />
                        API Token Usage (Gemini 3.5 Flash)
                      </h4>
                      <div className="grid grid-cols-3 gap-2 text-center text-xs font-mono">
                        <div className="bg-slate-50 p-2.5 rounded-xl border border-slate-200">
                          <p className="text-[10px] text-slate-400 mb-0.5">Input</p>
                          <p className="font-bold text-slate-700">{tokenUsage.prompt_tokens}</p>
                        </div>
                        <div className="bg-slate-50 p-2.5 rounded-xl border border-slate-200">
                          <p className="text-[10px] text-slate-400 mb-0.5">Output</p>
                          <p className="font-bold text-slate-700">{tokenUsage.candidates_tokens}</p>
                        </div>
                        <div className="bg-slate-50 p-2.5 rounded-xl border border-slate-200">
                          <p className="text-[10px] text-slate-400 mb-0.5">Total</p>
                          <p className="font-bold text-indigo-600">{tokenUsage.total_tokens}</p>
                        </div>
                      </div>
                    </div>
                  )}

                  {/* Supabase自動同期ステータス */}
                  <div className="mb-8 max-w-sm mx-auto bg-slate-50 border border-slate-200/80 p-3 rounded-2xl shadow-sm">
                    <div className="flex items-center justify-center min-h-[32px]">
                      {saveStatus === 'saving' && (
                        <span className="text-indigo-600 font-bold text-xs flex items-center justify-center gap-1.5 animate-pulse">
                          <Icon name="loader" className="w-4 h-4 animate-spin text-indigo-500" /> 解答履歴を自動同期しています...
                        </span>
                      )}
                      {saveStatus === 'success' && (
                        <span className="text-emerald-700 font-bold text-xs flex items-center justify-center gap-1.5">
                          <Icon name="check-circle" className="w-4 h-4 text-emerald-500" /> 回答データを自動同期しました！
                        </span>
                      )}
                      {saveStatus === 'error' && (
                        <span className="text-rose-600 font-bold text-xs flex items-center justify-center gap-1.5">
                          <Icon name="alert-circle" className="w-4 h-4 text-rose-500" /> 同期に失敗しました。DB設定を確認してください。
                        </span>
                      )}
                      {!saveStatus && (
                        <span className="text-slate-400 font-medium text-xs flex items-center justify-center gap-1.5">
                          <Icon name="database" className="w-4 h-4 text-slate-300" /> 履歴同期完了
                        </span>
                      )}
                    </div>
                  </div>

                  {/* アクションボタン */}

                    <button

                        setShowAnswer(false);
                        setScore(0);
                        setStep('quiz');
                        setAnswerHistory([]);

                      className="w-full bg-white border border-slate-200 hover:border-slate-350 text-slate-700 hover:text-slate-900 font-bold py-3 px-6 rounded-xl transition-all text-sm shadow-sm"

                      onClick={generateQuestions}

                    >
                      <Icon name="refresh-cw" className="w-4 h-4" /> 別の問題を作成
                    </button>
                    <button
                      onClick={resetApp}
                      className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-xl transition-all shadow-md flex items-center justify-center gap-1.5 text-sm shadow-indigo-600/10"
                    >
                      <Icon name="rotate-ccw" className="w-4 h-4" /> トップに戻る
                    </button>
                  </div>

                  {/* 復習リスト */}
                  <div className="mt-16 text-left max-w-2xl mx-auto border-t border-slate-200 pt-8">
                    <h3 className="text-lg font-bold text-slate-800 mb-6 flex items-center gap-2">
                      <Icon name="book-open" className="text-indigo-600 w-5 h-5" />
                      今回の問題と詳細解説（復習リスト）
                    </h3>
                    <div className="space-y-4">
                      {questions.map((q, idx) => (
                        <div key={idx} className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                          <p className="font-bold text-xs text-indigo-600 mb-1">QUESTION {idx + 1}</p>
                          <p className="text-slate-800 mb-3 font-bold text-base leading-relaxed">{q.question}</p>
                          <div className="bg-emerald-50 text-emerald-750 p-3.5 rounded-xl text-xs sm:text-sm font-semibold border border-emerald-200 flex items-start gap-2 mb-3">
                            <span className="font-bold shrink-0 text-emerald-600">正解：</span>
                            <span>{q.correctAnswer}</span>
                          </div>
                          <div className="text-xs sm:text-sm text-slate-600 bg-slate-50 p-4 rounded-xl border border-slate-200 leading-relaxed shadow-inner">
                            <span className="font-bold text-slate-400 block mb-1 text-xs">解説：</span>
                            {q.explanationDetailed}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              )}
            </main>
          </div>

          {/* フッター */}
          <footer className="max-w-4xl mx-auto px-6 pt-12 border-t border-slate-200 w-full text-center text-[10px] sm:text-xs text-slate-500">
            <p>© 2026 AI Quiz Maker Premium. All Rights Reserved.</p>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
