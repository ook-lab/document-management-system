<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>家計簿 集計</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  :root {
    --bg-main: #f8fafc;
    --bg-card: #ffffff;
    --text-main: #1e293b;
    --text-muted: #64748b;
    --primary: #4f46e5;
    --primary-hover: #4338ca;
    --accent: #3498db;
    --border: #e2e8f0;
    --radius: 12px;
    --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
    --header-bg: #ffffff;
  }

  body { 
    margin:0; 
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; 
    background: var(--bg-main); 
    color: var(--text-main);
  }

  header { 
    background: var(--header-bg); 
    color: var(--text-main); 
    padding: 12px 24px; 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header .logo {
    font-family: 'Outfit', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--primary);
  }

  header nav {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  header nav a { 
    color: var(--text-muted); 
    text-decoration: none; 
    font-size: 14px; 
    font-weight: 500;
    padding: 8px 12px;
    border-radius: 8px;
    transition: all 0.2s;
  }

  header nav a:hover { 
    color: var(--text-main); 
    background: #f1f5f9;
  }

  header nav a.active { 
    color: var(--primary); 
    background: #eef2ff;
    font-weight: 600;
  }

  .settings-btn { 
    background:none; 
    border:none; 
    color: var(--text-muted); 
    cursor:pointer; 
    font-size:18px; 
    line-height:1; 
    padding:8px; 
    border-radius:8px;
    transition: all 0.2s;
  }

  .settings-btn:hover { 
    color: var(--text-main); 
    background: #f1f5f9;
  }

  .container { 
    max-width: 1400px; 
    margin: 24px auto; 
    padding: 0 24px; 
  }

  .card { 
    background: var(--bg-card); 
    border-radius: var(--radius); 
    padding: 24px; 
    margin-bottom: 24px; 
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
  }

  h2 { 
    margin-top:0; 
    color: var(--text-main); 
    font-family: 'Outfit', sans-serif;
    font-size: 18px; 
    font-weight: 600;
    margin-bottom: 20px;
  }

  .kpi-row { display:flex; gap:20px; margin-bottom:24px; }
  .kpi { 
    flex:1; 
    background: var(--bg-card); 
    border-radius: var(--radius); 
    padding: 20px; 
    box-shadow: var(--shadow); 
    text-align: center;
    border: 1px solid var(--border);
  }

  .kpi-label { font-size:13px; color: var(--text-muted); margin-bottom:8px; font-weight: 500; }
  .kpi-value { font-size:32px; font-weight: 700; font-family: 'Outfit', sans-serif; }
  
  .income  { color:#10b981; }
  .expense { color:#ef4444; }
  .net-pos { color:#10b981; }
  .net-neg { color:#ef4444; }

  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { background:#f8fafc; padding:12px; text-align:left; border-bottom:2px solid var(--border); color: var(--text-muted); font-weight: 600; }
  td { padding:10px 12px; border-bottom:1px solid #f1f5f9; }
  tr:hover td { background:#f8fafc; }

  .amt { text-align:right; font-family: 'Inter', monospace; font-variant-numeric: tabular-nums; }
  .amt.neg { color:#ef4444; }
  .amt.pos { color:#10b981; }

  .month-nav { display:flex; align-items:center; gap:12px; }
  .month-nav a { 
    padding:8px 16px; 
    background: var(--bg-card); 
    color: var(--text-main); 
    border: 1px solid var(--border);
    border-radius: 8px; 
    text-decoration: none; 
    font-size: 14px; 
    font-weight: 500;
    transition: all 0.2s;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }
  .month-nav a:hover {
    background: #f8fafc;
    border-color: #cbd5e1;
  }

  .filter-row { display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-bottom:15px; }
  .filter-row label { font-size:13px; color: var(--text-muted); font-weight: 500; }
  .filter-row input, .filter-row select { 
    padding:8px 12px; 
    border:1px solid var(--border); 
    border-radius: 8px; 
    font-size:14px; 
    background: #ffffff;
    color: var(--text-main);
  }
  .filter-row button { 
    padding:8px 20px; 
    background: var(--primary); 
    color:white; 
    border:none; 
    border-radius: 8px; 
    cursor:pointer; 
    font-size:14px; 
    font-weight: 600;
    transition: all 0.2s;
  }
  .filter-row button:hover {
    background: var(--primary-hover);
  }

  .two-col { display:grid; grid-template-columns:1fr 1fr; gap:24px; }
  @media(max-width:900px){ .two-col{ grid-template-columns:1fr; } .kpi-row{ flex-wrap:wrap; } }
</style>
</head>
<body>
<header>
  <div class="logo">Kakeibo Analytics</div>
  <nav>
    <a href="/view/expense"     {% if active=='expense'     %}class="active"{% endif %}>支出サマリー</a>
    <a href="/view/cash"        {% if active=='cash'        %}class="active"{% endif %}>入出金サマリー</a>
    <a href="/view/multi_month" {% if active=='multi_month' %}class="active"{% endif %}>複数月</a>
    <a href="/view/trend"       {% if active=='trend'       %}class="active"{% endif %}>カテゴリ推移</a>
    <a href="/view/person"      {% if active=='person'      %}class="active"{% endif %}>人物別</a>
    <a href="/" style="color:#f59e0b; background: #fffbeb; border: 1px solid #fef3c7;">← 入力アプリ</a>
    <a href="/view/settings" title="集計設定" class="settings-btn">⚙</a>
  </nav>
</header>
<div class="container">
  {% block content %}{% endblock %}
</div>
</body>
</html>
