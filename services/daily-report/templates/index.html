<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日次レポート</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, 'Helvetica Neue', sans-serif; background: #f3f4f6; color: #1f2937; font-size: 15px; }

  /* ── Header ── */
  header {
    position: sticky; top: 0; z-index: 30;
    background: #1e40af; color: #fff;
    padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 2px 6px rgba(0,0,0,.25);
  }
  header h1 { font-size: 16px; font-weight: 700; }
  .header-right { display: flex; gap: 8px; align-items: center; }
  #gen-btn {
    background: #fff; color: #1e40af; border: none;
    border-radius: 8px; padding: 6px 14px; font-size: 13px; font-weight: 700;
    cursor: pointer; white-space: nowrap;
  }
  #gen-btn:disabled { opacity: .5; cursor: wait; }
  #date-input {
    border-radius: 8px; border: none; padding: 6px 10px;
    font-size: 13px; cursor: pointer;
  }
  #days-select {
    border-radius: 8px; border: none; padding: 6px 10px;
    font-size: 13px; cursor: pointer; background: #fff; color: #1e40af;
  }

  /* ── Tabs ── */
  .tab-bar {
    display: flex; overflow-x: auto; background: #1d3a8a;
    scrollbar-width: none; position: sticky; top: 53px; z-index: 20;
  }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0; padding: 10px 16px;
    font-size: 12px; font-weight: 600; color: rgba(255,255,255,.65);
    cursor: pointer; border-bottom: 3px solid transparent;
    white-space: nowrap; transition: color .2s, border-color .2s;
  }
  .tab.active { color: #fff; border-bottom-color: #60a5fa; }

  /* ── Content ── */
  .page { display: none; padding: 16px; max-width: 720px; margin: 0 auto; }
  .page.active { display: block; }

  /* Day header */
  .day-header {
    display: flex; align-items: baseline; gap: 10px;
    margin-bottom: 16px;
  }
  .day-date { font-size: 22px; font-weight: 800; color: #1e3a8a; }
  .day-title { font-size: 13px; color: #6b7280; font-weight: 600; }
  .day-summary {
    background: #eff6ff; border-left: 4px solid #3b82f6;
    border-radius: 0 8px 8px 0; padding: 10px 14px;
    font-size: 13px; color: #1e40af; margin-bottom: 16px;
  }

  /* Section card */
  .section {
    background: #fff; border-radius: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
    margin-bottom: 14px; overflow: hidden;
  }
  .section-header {
    display: flex; align-items: center; gap-8px;
    padding: 10px 14px; background: #f8fafc;
    border-bottom: 1px solid #e5e7eb;
    font-size: 13px; font-weight: 700; color: #374151;
  }
  .section-header .icon { font-size: 16px; margin-right: 6px; }
  .section-body { padding: 10px 14px; }

  /* Event row */
  .event-row {
    display: flex; gap: 10px; align-items: flex-start;
    padding: 8px 0; border-bottom: 1px solid #f3f4f6;
  }
  .event-row:last-child { border-bottom: none; }
  .event-time {
    min-width: 52px; font-size: 12px; font-weight: 700;
    color: #3b82f6; padding-top: 1px;
  }
  .event-body { flex: 1; }
  .event-title { font-size: 14px; font-weight: 600; color: #111827; line-height: 1.4; }
  .event-meta { font-size: 11px; color: #9ca3af; margin-top: 2px; }
  .event-note { font-size: 12px; color: #6b7280; margin-top: 3px; }

  /* Homework row */
  .hw-row {
    display: flex; gap: 10px; align-items: flex-start;
    padding: 8px 0; border-bottom: 1px solid #f3f4f6;
  }
  .hw-row:last-child { border-bottom: none; }
  .hw-subject {
    min-width: 60px; font-size: 11px; font-weight: 700;
    background: #dbeafe; color: #1d4ed8; border-radius: 6px;
    padding: 2px 6px; text-align: center; align-self: flex-start; margin-top: 1px;
  }
  .hw-body { flex: 1; }
  .hw-task { font-size: 14px; color: #111827; line-height: 1.4; }
  .hw-meta { font-size: 11px; color: #9ca3af; margin-top: 2px; }

  /* Tag list (items_to_bring / notices) */
  .tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag {
    background: #f1f5f9; border-radius: 20px;
    padding: 4px 10px; font-size: 12px; color: #374151;
  }
  .tag.notice { background: #fff7ed; color: #c2410c; }

  /* Page 8 – Tasks */
  .task-row {
    padding: 10px 0; border-bottom: 1px solid #f3f4f6;
    display: flex; gap: 10px; align-items: flex-start;
  }
  .task-row:last-child { border-bottom: none; }
  .task-deadline {
    min-width: 64px; font-size: 11px; font-weight: 700;
    color: #dc2626; padding-top: 2px;
  }
  .task-body { flex: 1; }
  .task-title { font-size: 14px; font-weight: 600; color: #111827; }
  .task-sub { font-size: 11px; color: #9ca3af; margin-top: 2px; }
  .task-desc { font-size: 12px; color: #6b7280; margin-top: 4px; }
  .task-person {
    font-size: 11px; background: #f0fdf4; color: #15803d;
    border-radius: 10px; padding: 2px 8px; align-self: flex-start;
    white-space: nowrap;
  }

  /* Empty state */
  .empty { text-align: center; color: #9ca3af; font-size: 13px; padding: 24px 0; }

  /* Loading / Error */
  #loading, #error-msg {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: #fff; border-radius: 16px; padding: 32px 40px;
    box-shadow: 0 8px 32px rgba(0,0,0,.15); text-align: center; z-index: 50;
  }
  #loading .spinner {
    width: 40px; height: 40px; border: 4px solid #e5e7eb;
    border-top-color: #3b82f6; border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { color: #6b7280; font-size: 14px; }
  #error-msg { color: #dc2626; max-width: 80vw; }
  .hidden { display: none !important; }

  /* Generating overlay */
  #gen-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.4);
    z-index: 60; display: flex; align-items: center; justify-content: center;
  }
  #gen-overlay .box {
    background: #fff; border-radius: 16px; padding: 32px 40px; text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,.2);
  }
  #gen-overlay .spinner {
    width: 48px; height: 48px; border: 4px solid #e5e7eb;
    border-top-color: #3b82f6; border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 14px;
  }
  #gen-overlay p { color: #374151; font-size: 14px; }

  @media print {
    header, .tab-bar { display: none; }
    .page { display: block !important; page-break-after: always; }
  }
</style>
</head>
<body>

<header>
  <h1>📋 日次レポート</h1>
  <div class="header-right">
    <select id="days-select">
      <option value="1">1日</option>
      <option value="2">2日</option>
      <option value="3">3日</option>
      <option value="4">4日</option>
      <option value="5">5日</option>
      <option value="6">6日</option>
      <option value="7" selected>7日</option>
    </select>
    <input type="date" id="date-input">
    <button id="gen-btn">⚡ 生成</button>
  </div>
</header>

<div class="tab-bar" id="tab-bar"></div>

<div id="loading">
  <div class="spinner"></div>
  <p>レポート読み込み中...</p>
</div>
<div id="error-msg" class="hidden"></div>
<div id="pages-container"></div>

<div id="gen-overlay" class="hidden">
  <div class="box">
    <div class="spinner"></div>
    <p id="gen-status">レポートを生成中...<br><small>8ページ × AI合成（約30秒）</small></p>
  </div>
</div>

<script>
const TARGET_DATE = {{ target_date | tojson }};

let currentPageNo = 1;
let visibleDays = 7;

// ── Utilities ──────────────────────────────────────────────

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function fmtDate(iso) {
  if (!iso) return '';
  const [y,m,d] = iso.split('-').map(Number);
  const days = ['日','月','火','水','木','金','土'];
  const dow = new Date(y, m-1, d).getDay();
  return `${m}/${d}(${days[dow]})`;
}

// ── Tab & Page rendering ────────────────────────────────────

function renderReport(report) {
  const pages = report.pages || [];
  const tabBar = document.getElementById('tab-bar');
  const container = document.getElementById('pages-container');
  tabBar.innerHTML = '';
  container.innerHTML = '';

  pages.forEach((page, idx) => {
    const isDayPage = page.page_no < 8;
    const hidden = isDayPage && page.page_no > visibleDays;

    // Tab
    const tab = document.createElement('div');
    tab.className = 'tab' + (idx === 0 && !hidden ? ' active' : '');
    if (hidden) tab.classList.add('hidden');
    tab.textContent = page.display || page.title;
    tab.dataset.no = page.page_no;
    tab.addEventListener('click', () => activatePage(page.page_no));
    tabBar.appendChild(tab);

    // Page
    const div = document.createElement('div');
    div.className = 'page' + (idx === 0 && !hidden ? ' active' : '');
    div.dataset.no = page.page_no;
    div.innerHTML = isDayPage ? renderDayPage(page) : renderTaskPage(page);
    container.appendChild(div);
  });

  // 最初に表示するタブを確定
  const firstVisible = document.querySelector('.tab:not(.hidden)');
  if (firstVisible) {
    activatePage(+firstVisible.dataset.no);
  }
}

function applyDaysFilter() {
  document.querySelectorAll('.tab').forEach(tab => {
    const no = +tab.dataset.no;
    const isDayPage = no < 8;
    const hide = isDayPage && no > visibleDays;
    tab.classList.toggle('hidden', hide);
  });
  // アクティブなタブが非表示になったら最初の可視タブへ
  const activeTab = document.querySelector('.tab.active');
  if (!activeTab || activeTab.classList.contains('hidden')) {
    const firstVisible = document.querySelector('.tab:not(.hidden)');
    if (firstVisible) activatePage(+firstVisible.dataset.no);
  }
}

function activatePage(no) {
  currentPageNo = no;
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', +t.dataset.no === no);
  });
  document.querySelectorAll('.page').forEach(p => {
    p.classList.toggle('active', +p.dataset.no === no);
  });
  // scroll tab into view
  const activeTab = document.querySelector('.tab.active');
  if (activeTab) activeTab.scrollIntoView({ inline: 'center', behavior: 'smooth' });
}

// ── Day page HTML ───────────────────────────────────────────

function renderDayPage(page) {
  const schedule = page.schedule || [];
  const homework = page.homework || [];
  const items    = page.items_to_bring || [];
  const notices  = page.notices || [];
  const summary  = page.summary || '';

  let html = `
    <div class="day-header">
      <span class="day-date">${esc(page.display)}</span>
      <span class="day-title">${esc(page.title)}</span>
    </div>`;

  if (summary && summary !== 'この日の予定はありません') {
    html += `<div class="day-summary">${esc(summary)}</div>`;
  }

  // Schedule
  html += `<div class="section">
    <div class="section-header"><span class="icon">📅</span>予定</div>
    <div class="section-body">`;
  if (schedule.length === 0) {
    html += `<p class="empty">予定なし</p>`;
  } else {
    schedule.forEach(ev => {
      html += `<div class="event-row">
        <div class="event-time">${esc(ev.time || '終日')}</div>
        <div class="event-body">
          <div class="event-title">${esc(ev.title)}</div>
          ${ev.person ? `<div class="event-meta">${esc(ev.person)}</div>` : ''}
          ${ev.note   ? `<div class="event-note">${esc(ev.note)}</div>` : ''}
        </div>
      </div>`;
    });
  }
  html += `</div></div>`;

  // Homework
  if (homework.length > 0) {
    html += `<div class="section">
      <div class="section-header"><span class="icon">📝</span>宿題・課題</div>
      <div class="section-body">`;
    homework.forEach(hw => {
      html += `<div class="hw-row">
        <span class="hw-subject">${esc(hw.subject || '-')}</span>
        <div class="hw-body">
          <div class="hw-task">${esc(hw.task)}</div>
          <div class="hw-meta">${esc(hw.person || '')}${hw.deadline ? ' · 期限: ' + esc(hw.deadline) : ''}</div>
        </div>
      </div>`;
    });
    html += `</div></div>`;
  }

  // Items to bring
  if (items.length > 0) {
    html += `<div class="section">
      <div class="section-header"><span class="icon">🎒</span>持ち物</div>
      <div class="section-body">
        <div class="tag-list">
          ${items.map(it => `<span class="tag">${esc(it)}</span>`).join('')}
        </div>
      </div>
    </div>`;
  }

  // Notices
  if (notices.length > 0) {
    html += `<div class="section">
      <div class="section-header"><span class="icon">⚠️</span>注意事項</div>
      <div class="section-body">
        <div class="tag-list">
          ${notices.map(n => `<span class="tag notice">${esc(n)}</span>`).join('')}
        </div>
      </div>
    </div>`;
  }

  if (schedule.length === 0 && homework.length === 0 && items.length === 0 && notices.length === 0) {
    html += `<div class="section"><div class="section-body"><p class="empty">この日のデータはありません</p></div></div>`;
  }

  return html;
}

// ── Task page HTML ──────────────────────────────────────────

function renderTaskPage(page) {
  const tasks = page.tasks || [];
  let html = `
    <div class="day-header">
      <span class="day-date">📋 未完了タスク</span>
    </div>
    <div class="day-summary">${esc(page.summary || '')}</div>
    <div class="section"><div class="section-body">`;

  if (tasks.length === 0) {
    html += `<p class="empty">未完了タスクはありません 🎉</p>`;
  } else {
    tasks.forEach(t => {
      const dl = t.deadline ? fmtDate(t.deadline) || t.deadline : '期限未設定';
      html += `<div class="task-row">
        <div class="task-deadline">${esc(dl)}</div>
        <div class="task-body">
          <div class="task-title">${esc(t.task || t.doc_title || '(不明)')}</div>
          <div class="task-sub">${esc(t.source || '')}${t.doc_title && t.task ? ' · ' + esc(t.doc_title) : ''}</div>
          ${t.description ? `<div class="task-desc">${esc(t.description)}</div>` : ''}
        </div>
        ${t.person ? `<span class="task-person">${esc(t.person)}</span>` : ''}
      </div>`;
    });
  }

  html += `</div></div>`;
  return html;
}

// ── Load report ─────────────────────────────────────────────

async function loadReport(targetDate) {
  document.getElementById('loading').classList.remove('hidden');
  document.getElementById('error-msg').classList.add('hidden');
  document.getElementById('pages-container').innerHTML = '';
  document.getElementById('tab-bar').innerHTML = '';

  try {
    const res  = await fetch(`/api/report/${targetDate}`);
    const json = await res.json();
    document.getElementById('loading').classList.add('hidden');

    if (!json.success) {
      if (res.status === 404) {
        showNotFound(targetDate);
      } else {
        showError(json.error);
      }
      return;
    }
    renderReport(json.report);

    const genAt = json.generated_at ? new Date(json.generated_at).toLocaleString('ja-JP') : '';
    document.querySelector('header h1').textContent = `📋 日次レポート`;
    document.title = `レポート ${targetDate}`;
    if (genAt) {
      document.querySelector('header h1').title = `生成: ${genAt}`;
    }
  } catch (e) {
    document.getElementById('loading').classList.add('hidden');
    showError(e.message);
  }
}

function showNotFound(targetDate) {
  document.getElementById('tab-bar').innerHTML = '';
  document.getElementById('pages-container').innerHTML = `
    <div style="max-width:480px;margin:60px auto;text-align:center;padding:24px">
      <div style="font-size:48px;margin-bottom:16px">📭</div>
      <p style="color:#374151;font-size:16px;margin-bottom:8px">${targetDate} のレポートはまだありません</p>
      <p style="color:#9ca3af;font-size:13px;margin-bottom:24px">「⚡ 生成」ボタンを押してレポートを作成してください</p>
      <button onclick="generate('${targetDate}')"
        style="background:#2563eb;color:#fff;border:none;border-radius:10px;padding:12px 28px;font-size:14px;font-weight:700;cursor:pointer">
        ⚡ 今すぐ生成
      </button>
    </div>`;
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = `エラー: ${msg}`;
  el.classList.remove('hidden');
}

// ── Generate report ─────────────────────────────────────────

async function generate(targetDate) {
  const overlay = document.getElementById('gen-overlay');
  overlay.classList.remove('hidden');
  document.getElementById('gen-btn').disabled = true;

  try {
    const res  = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ base_date: targetDate }),
    });
    const json = await res.json();
    overlay.classList.add('hidden');
    document.getElementById('gen-btn').disabled = false;

    if (json.success) {
      await loadReport(targetDate);
    } else {
      showError(json.error || '生成に失敗しました');
    }
  } catch (e) {
    overlay.classList.add('hidden');
    document.getElementById('gen-btn').disabled = false;
    showError(e.message);
  }
}

// ── Init ────────────────────────────────────────────────────

const daysSelect = document.getElementById('days-select');
daysSelect.addEventListener('change', () => {
  visibleDays = +daysSelect.value;
  applyDaysFilter();
});

const dateInput = document.getElementById('date-input');
dateInput.value = TARGET_DATE;

dateInput.addEventListener('change', () => {
  const d = dateInput.value;
  if (d) {
    history.pushState({}, '', `/report/${d}`);
    loadReport(d);
  }
});

document.getElementById('gen-btn').addEventListener('click', () => {
  generate(dateInput.value || TARGET_DATE);
});

// 初期ロード
loadReport(TARGET_DATE);
</script>
</body>
</html>
