<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI目次ページ作成ツール</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/optimizer_style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
</head>
<body>
    <div class="app-container">
        <section class="pdf-pane">
            <div class="pane-header">
                <div class="logo">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    <span>AI目次ページ作成ツール</span>
                </div>
                <div class="source-actions">
                    <input type="text" id="drive-file-id" placeholder="Google Drive File ID">
                    <button id="drive-load-btn" class="btn btn-secondary">IDで読み込み</button>
                    <button id="drive-pick-btn" class="btn btn-secondary">Driveから読み込み</button>
                    <button id="upload-btn" class="btn btn-primary">ローカルからアップロード</button>
                </div>
                <input type="file" id="file-input" accept="application/pdf" style="display: none;">
            </div>
            <div class="page-scroll" id="page-scroll">
                <div id="page-list" class="page-list single-column"><div class="empty-state">PDFをアップロードしてください</div></div>
            </div>
        </section>
        <main class="toc-pane">
            <div class="pane-header compact-header">
                <div class="form-group file-name-group">
                    <label for="output-filename">保存ファイル名</label>
                    <input type="text" id="output-filename" placeholder="未入力なら元ファイル名で保存">
                </div>
            </div>
            <section class="editor-section">
                <div class="panel-card">
                    <h3>目次生成</h3>
                    <div class="form-group">
                        <label for="toc-instructions">追加指示</label>
                        <textarea id="toc-instructions" rows="4" placeholder="例: 教材名・章名・単元名を優先して、各ページを1行で要約してください。"></textarea>
                    </div>
                    <button id="generate-toc-btn" class="btn btn-secondary">目次生成</button>
                    <p class="help-text">目次挿入後の物理ページ番号（PDF p.2〜）を主軸にし、原本ページ番号は読めた場合だけ補助として入れます。</p>
                </div>
                <div class="panel-card toc-editor-card">
                    <h3>目次内容（手修正できます）</h3>
                    <div class="form-group">
                        <textarea id="toc-markdown" class="toc-editor" placeholder="# 目次&#10;&#10;- PDF p.2 / 元PDF p.1 / 原本 p.不明: ..."></textarea>
                    </div>
                </div>
                <div class="panel-card action-panel">
                    <h3>保存・出力</h3>
                    <button id="save-download-btn" class="btn btn-success">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                        保存してダウンロード
                    </button>
                    <p class="help-text">右側の目次テキストをPDFの1ページ目に挿入します。元ページには何も書き込みません。</p>
                </div>
            </section>
        </main>
    </div>
    <script src="/static/js/drive_picker.js"></script>
    <script>
    const API = '/optimizer';
    let pdfDoc = null, currentFileId = null, originalFilename = '';

    document.addEventListener('DOMContentLoaded', () => {
        const loadingOverlay = document.createElement('div');
        loadingOverlay.className = 'loading-overlay'; loadingOverlay.id = 'loading-overlay';
        loadingOverlay.innerHTML = '<div class="spinner"></div><div id="loading-text">処理中...</div>';
        document.body.appendChild(loadingOverlay);
        document.getElementById('upload-btn').addEventListener('click', () => document.getElementById('file-input').click());
        document.getElementById('file-input').addEventListener('change', handleFileUpload);
        document.getElementById('drive-pick-btn').addEventListener('click', () => {
            window.openDrivePicker(item => {
                document.getElementById('drive-file-id').value = item.id;
                handleDriveLoad();
            });
        });
        document.getElementById('drive-load-btn').addEventListener('click', handleDriveLoad);
        document.getElementById('generate-toc-btn').addEventListener('click', generateToc);
        document.getElementById('save-download-btn').addEventListener('click', saveAndDownload);
    });

    function showLoading(t) { document.getElementById('loading-text').textContent = t; document.getElementById('loading-overlay').classList.add('active'); }
    function hideLoading() { document.getElementById('loading-overlay').classList.remove('active'); }
    function baseName(filename) { return filename.replace(/\.pdf$/i, ''); }
    function withPdfExtension(filename) { return /\.pdf$/i.test(filename) ? filename : `${filename}.pdf`; }

    async function handleFileUpload(e) {
        const file = e.target.files[0]; if (!file) return;
        showLoading('アップロード中...');
        const fd = new FormData(); fd.append('file', file);
        try {
            const res = await fetch(`${API}/upload`, { method: 'POST', body: fd });
            const data = await res.json();
            if (res.ok) {
                await applyLoadedFile(data, file.name);
            } else { alert("Error: " + data.error); }
        } catch (err) { alert("Upload failed."); console.error(err); } finally { hideLoading(); }
    }

    async function handleDriveLoad() {
        const driveFileId = document.getElementById('drive-file-id').value.trim();
        if (!driveFileId) { alert("Google Drive File ID を入力してください。"); return; }
        showLoading('Google DriveからPDFを読み込み中...');
        try {
            const res = await fetch(`${API}/load_from_drive`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ drive_file_id: driveFileId })
            });
            const data = await res.json();
            if (res.ok) await applyLoadedFile(data, data.filename);
            else alert("Error: " + data.error);
        } catch (err) { alert("Drive load failed."); console.error(err); } finally { hideLoading(); }
    }

    async function applyLoadedFile(data, fallbackName) {
        currentFileId = data.file_id;
        originalFilename = data.filename || fallbackName || 'document.pdf';
        document.getElementById('output-filename').value = '';
        document.getElementById('output-filename').placeholder = originalFilename;
        document.getElementById('toc-markdown').value = '';
        await loadPDF(`${API}/files/${currentFileId}`);
        try {
            showLoading('PDF情報の解析中...');
            await fetch(`${API}/analyze/${currentFileId}`);
        } catch (err) { console.error("Analysis failed", err); }
    }

    async function loadPDF(url) {
        showLoading('PDFを読み込み中...');
        try {
            pdfDoc = await pdfjsLib.getDocument(url).promise;
            const lc = document.getElementById('page-list'); lc.innerHTML = '';
            const root = document.getElementById('page-scroll');
            const obs = new IntersectionObserver((entries) => { entries.forEach(en => { if (en.isIntersecting) { renderPage(parseInt(en.target.dataset.index), en.target); obs.unobserve(en.target); } }); }, { root, rootMargin: '600px' });
            for (let i = 0; i < pdfDoc.numPages; i++) {
                const item = document.createElement('div'); item.className = 'page-item'; item.id = `page-${i}`; item.dataset.index = i;
                item.innerHTML = `<div class="page-num">${i+1}</div><div class="canvas-container"><canvas></canvas></div>`;
                lc.appendChild(item); obs.observe(item);
            }
        } catch (err) { console.error(err); alert("Failed to render PDF"); } finally { hideLoading(); }
    }

    async function renderPage(index, element) {
        try {
            const page = await pdfDoc.getPage(index + 1);
            const container = element.querySelector('.canvas-container');
            const canvas = element.querySelector('canvas');
            const ctx = canvas.getContext('2d');
            const uv = page.getViewport({ scale: 1.0 });
            const targetWidth = Math.max(320, container.clientWidth - 24);
            const scale = targetWidth / uv.width;
            const vp = page.getViewport({ scale });
            canvas.width = vp.width; canvas.height = vp.height;
            await page.render({ canvasContext: ctx, viewport: vp }).promise;
        } catch (err) { console.error("Error rendering page", index, err); }
    }

    async function generateToc() {
        if (!currentFileId) { alert("PDFをアップロードしてください。"); return; }
        showLoading('Geminiで各ページの目次を作成しています...');
        const payload = {
            metadata: { title: baseName(originalFilename) },
            instructions: document.getElementById('toc-instructions').value
        };
        try {
            const res = await fetch(`${API}/generate_toc/${currentFileId}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            const data = await res.json();
            if (res.ok && data.toc_markdown) document.getElementById('toc-markdown').value = data.toc_markdown;
            else alert("エラー: " + data.error);
        } catch (err) { console.error(err); alert("通信エラー"); } finally { hideLoading(); }
    }

    async function saveAndDownload() {
        if (!currentFileId) { alert("PDFをアップロードしてください。"); return; }
        const tocMarkdown = document.getElementById('toc-markdown').value.trim();
        if (!tocMarkdown) { alert("目次内容を入力してください。"); return; }
        const inputName = document.getElementById('output-filename').value.trim();
        const outputName = withPdfExtension(inputName || originalFilename);
        showLoading('目次ページを挿入して保存しています...');
        const payload = {
            filename: outputName,
            metadata: { title: baseName(outputName), subject: 'NotebookLM Optimization' },
            toc_markdown: tocMarkdown
        };
        try {
            const res = await fetch(`${API}/process/${currentFileId}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            const data = await res.json();
            if (res.ok && data.download_url) window.location.href = data.download_url;
            else alert("エラー: " + data.error);
        } catch (err) { console.error(err); alert("通信エラー"); } finally { hideLoading(); }
    }
    </script>
</body>
</html>
