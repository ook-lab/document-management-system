<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>テキスト座標抽出ツール</title>
    <link rel="stylesheet" href="/static/css/ocr_style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
</head>
<body class="light-mode">
    <header>
        <div class="logo" style="font-size: 1.2rem;">テキスト<span>座標抽出</span>ツール</div>
        <div class="actions">
            <select id="templateSelector">
                {% for tid, tdata in templates.items() %}
                <option value="{{ tid }}">{{ tdata.name }}</option>
                {% endfor %}
            </select>
            <button id="editTemplateBtn" class="btn secondary">⚙️ テンプレート管理</button>
            <input type="text" id="driveFileId" placeholder="Google Drive File ID" style="margin-left:10px; padding:6px; border:1px solid #ccc; border-radius:4px; min-width:200px;">
            <button id="driveLoadBtn" class="btn secondary">IDで読み込み</button>
            <button id="drivePickBtn" class="btn secondary">Driveから読み込み</button>
            <input type="file" id="pdfUpload" accept="application/pdf" hidden>
            <button id="uploadBtn" class="btn primary">ローカルからアップロード</button>
            <input type="text" id="outputFilename" placeholder="保存ファイル名" style="margin-left:10px; padding:6px; border:1px solid #ccc; border-radius:4px; min-width:200px;">
            <button id="generateFilenameBtn" class="btn secondary" disabled>ファイル名AI生成</button>
            <button id="savePdfBtn" class="btn success" disabled>テキスト座標PDFを保存</button>
        </div>
    </header>

    <main>
        <aside id="sidebar" class="hidden">
            <h3>ページ一覧</h3>
            <div id="pageList"></div>
        </aside>

        <section id="workspace">
            <div id="loading" class="hidden">
                <div class="spinner"></div>
                <p>AIが分析しています...</p>
            </div>
            
            <div class="split-view">
                <div class="pane image-pane">
                    <div class="pane-header">オリジナル画像 (PDFビュー)</div>
                    <div class="image-viewport" id="imageViewport">
                        <img id="pageImage" src="" alt="PDF Page">
                        <svg id="svgOverlay" width="0" height="0"></svg>
                    </div>
                </div>
                <div class="pane text-pane">
                    <div class="pane-header" style="display: flex; justify-content: space-between; align-items: center;">
                        <span>抽出・修正テキスト</span>
                        <div style="display: flex; gap: 0.4rem; align-items: center;">
                            <span style="font-size: 0.7rem; color: #666;">AI再分析:</span>
                            <button class="btn" style="font-size: 0.65rem; padding: 2px 6px; background: #4338ca; color: white;" onclick="runOcr(currentPageNum, 'gemini-3.1-flash-lite-preview')">3.1 Flash-Lite</button>
                            <button class="btn" style="font-size: 0.65rem; padding: 2px 6px; background: var(--primary-color); color: white;" onclick="runOcr(currentPageNum, 'gemini-2.5-flash')">2.5 Flash</button>
                            <button class="btn" style="font-size: 0.65rem; padding: 2px 6px; background: #0891b2; color: white;" onclick="runOcr(currentPageNum, 'gemini-2.5-flash-lite')">2.5 Lite</button>
                        </div>
                    </div>
                    <div id="textEditor" class="editor-content">
                        <div class="placeholder">
                            <p>PDFをアップロードして分析を開始してください</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="templateModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>テンプレート管理</h3>
                <span class="close-btn" id="closeModal">&times;</span>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>テンプレート名</label>
                    <input type="text" id="tplName" placeholder="例: 請求書 (標準型)">
                </div>
                <div class="form-group">
                    <label>AIプロンプト (抽出指示)</label>
                    <textarea id="tplPrompt" rows="8" placeholder="例: 表形式で抽出し、金額、日付、提供会社名を取得してください。"></textarea>
                </div>
                <button id="saveTemplateBtn" class="btn primary full-width">保存する</button>
            </div>
        </div>
    </div>

    <div id="notification" class="hidden"></div>
    <script src="/static/js/drive_picker.js"></script>
    <script>
    // All API calls prefixed with /ocr/
    const API_PREFIX = '/ocr';

    let currentPdfId = null;
    let currentPreviews = [];
    let currentPageNum = 0;
    let allOcrData = {}; 

    const elements = {
        pdfUpload: document.getElementById('pdfUpload'),
        uploadBtn: document.getElementById('uploadBtn'),
        savePdfBtn: document.getElementById('savePdfBtn'),
        templateSelector: document.getElementById('templateSelector'),
        editTemplateBtn: document.getElementById('editTemplateBtn'),
        pageImage: document.getElementById('pageImage'),
        svgOverlay: document.getElementById('svgOverlay'),
        textEditor: document.getElementById('textEditor'),
        loading: document.getElementById('loading'),
        notification: document.getElementById('notification'),
        pageList: document.getElementById('pageList'),
        sidebar: document.getElementById('sidebar'),
        modal: document.getElementById('templateModal'),
        tplName: document.getElementById('tplName'),
        tplPrompt: document.getElementById('tplPrompt'),
        saveTemplateBtn: document.getElementById('saveTemplateBtn'),
        closeModal: document.getElementById('closeModal'),
        outputFilename: document.getElementById('outputFilename'),
        generateFilenameBtn: document.getElementById('generateFilenameBtn'),
        driveFileId: document.getElementById('driveFileId'),
        driveLoadBtn: document.getElementById('driveLoadBtn'),
        drivePickBtn: document.getElementById('drivePickBtn')
    };

    elements.uploadBtn.addEventListener('click', () => elements.pdfUpload.click());
    elements.pdfUpload.addEventListener('change', uploadPdf);
    elements.drivePickBtn.addEventListener('click', () => {
        window.openDrivePicker(item => {
            elements.driveFileId.value = item.id;
            loadFromDrive();
        });
    });
    elements.driveLoadBtn.addEventListener('click', loadFromDrive);
    elements.savePdfBtn.addEventListener('click', saveSearchablePdf);
    elements.generateFilenameBtn.addEventListener('click', async () => {
        let allText = [];
        for (let pageIdx in allOcrData) {
            const pageData = allOcrData[pageIdx];
            const rawData = pageData.raw || (Array.isArray(pageData) ? pageData : []);
            rawData.forEach(item => allText.push(item.text));
        }
        const combinedText = allText.join(" ");
        if (!combinedText.trim()) { showNotification("エラー: テキストがありません。"); return; }
        showLoading(true, "AIがファイル名を生成中...");
        try {
            const response = await fetch(`${API_PREFIX}/generate_filename`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: combinedText })
            });
            const data = await response.json();
            if (data.error) throw new Error(data.error);
            elements.outputFilename.value = data.filename;
            showNotification("ファイル名を生成しました！");
        } catch (err) { showNotification("エラー: " + err.message); }
        finally { showLoading(false); }
    });
    elements.editTemplateBtn.addEventListener('click', () => {
        elements.modal.classList.remove('hidden');
        elements.tplName.value = elements.templateSelector.options[elements.templateSelector.selectedIndex].text;
    });
    elements.closeModal.addEventListener('click', () => elements.modal.classList.add('hidden'));

    async function uploadPdf(e) {
        const file = e.target.files[0];
        if (!file) return;
        const formData = new FormData();
        formData.append('file', file);
        showLoading(true, "PDFを処理中...");
        try {
            const response = await fetch(`${API_PREFIX}/upload`, { method: 'POST', body: formData });
            const data = await response.json();
            if (data.error) throw new Error(data.error);
            applyLoadedPdf(data);
        } catch (err) { showNotification("エラー: " + err.message); }
        finally { showLoading(false); }
    }

    async function loadFromDrive() {
        const driveFileId = elements.driveFileId.value.trim();
        if (!driveFileId) { showNotification("Google Drive File ID を入力してください。"); return; }
        showLoading(true, "Google DriveからPDFを読み込み中...");
        try {
            const response = await fetch(`${API_PREFIX}/load_from_drive`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ drive_file_id: driveFileId })
            });
            const data = await response.json();
            if (data.error) throw new Error(data.error);
            applyLoadedPdf(data);
        } catch (err) { showNotification("エラー: " + err.message); }
        finally { showLoading(false); }
    }

    function applyLoadedPdf(data) {
        currentPdfId = data.pdf_id;
        currentPreviews = data.previews;
        allOcrData = {};
        elements.outputFilename.value = data.filename ? data.filename.replace(/\.pdf$/i, '') : '';
        renderPageList();
        loadPage(0);
        elements.sidebar.classList.remove('hidden');
    }

    function renderPageList() {
        elements.pageList.innerHTML = '';
        currentPreviews.forEach((prev, idx) => {
            const div = document.createElement('div');
            div.className = `page-item ${idx === currentPageNum ? 'active' : ''}`;
            div.style.padding = '0.75rem'; div.style.cursor = 'pointer';
            div.style.borderBottom = '1px solid #eee';
            div.style.background = idx === currentPageNum ? '#f1f5f9' : 'transparent';
            div.innerHTML = `<span style="font-size:0.9rem">Page ${idx + 1}</span>`;
            div.onclick = () => loadPage(idx);
            elements.pageList.appendChild(div);
        });
    }

    async function loadPage(idx) {
        currentPageNum = idx;
        const page = currentPreviews[idx];
        elements.pageImage.src = page.url;
        elements.pageImage.onload = () => { updateSvgSize(); };
        renderPageList();
        if (allOcrData[idx] && (allOcrData[idx].grid || allOcrData[idx].raw || allOcrData[idx].length > 0)) {
            renderEditor(); renderOverlay();
        } else {
            elements.textEditor.innerHTML = `
                <div class="placeholder">
                    <div style="text-align:center">
                        <p style="margin-bottom:1.5rem">分析に使用するモデルを選択してください</p>
                        <div style="display:flex; flex-direction:column; gap:1rem; align-items:center;">
                            <button class="btn indigo" onclick="runOcr(${idx}, 'gemini-3.1-flash-lite-preview')" style="width:280px">Gemini 3.1 Flash-Lite (Pre)</button>
                            <button class="btn primary" onclick="runOcr(${idx}, 'gemini-2.5-flash')" style="width:280px">Gemini 2.5 Flash</button>
                            <button class="btn cyan" onclick="runOcr(${idx}, 'gemini-2.5-flash-lite')" style="width:280px">Gemini 2.5 Flash-Lite</button>
                        </div>
                    </div>
                </div>`;
            elements.svgOverlay.innerHTML = '';
        }
    }

    function updateSvgSize() {
        const img = elements.pageImage;
        elements.svgOverlay.style.width = img.clientWidth + 'px';
        elements.svgOverlay.style.height = img.clientHeight + 'px';
        elements.svgOverlay.setAttribute('viewBox', '0 0 1000 1000');
        elements.svgOverlay.setAttribute('preserveAspectRatio', 'none');
    }

    window.runOcr = async (pageNum, modelName) => {
        showLoading(true, `AI (${modelName}) が分析中...`);
        try {
            const response = await fetch(`${API_PREFIX}/run_ocr`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    pdf_id: currentPdfId, 
                    page_num: pageNum, 
                    template_id: elements.templateSelector.value,
                    model: modelName
                })
            });
            const data = await response.json();
            if (data.error) throw new Error(data.error);
            allOcrData[pageNum] = data;
            renderEditor(); renderOverlay();
            elements.savePdfBtn.disabled = false;
            elements.generateFilenameBtn.disabled = false;
        } catch (err) { showNotification("抽出エラー: " + err.message); }
        finally { showLoading(false); }
    }

    function renderEditor() {
        const pageData = allOcrData[currentPageNum];
        if (!pageData) return;

        // 1. グリッド表示 (物理的な表の再構成)
        let html = '';
        if (pageData.grid && pageData.grid.length > 0) {
            html += '<div style="margin-bottom:1.5rem"><h4>再構成された表 (Python Logic)</h4>';
            html += '<div class="table-container" style="overflow-x:auto; margin-top:0.5rem">';
            html += '<table style="width:100%; border-collapse:collapse; background:white; border:1px solid #e2e8f0; font-size:0.9rem">';
            pageData.grid.forEach((row, rIdx) => {
                html += '<tr>';
                row.forEach((cell, cIdx) => {
                    html += `<td style="border:1px solid #e2e8f0; padding:4px"><textarea style="width:100%; border:none; outline:none; resize:none; min-width:80px" rows="1" onchange="updateGridCell(${currentPageNum}, ${rIdx}, ${cIdx}, this.value)">${cell}</textarea></td>`;
                });
                html += '</tr>';
            });
            html += '</table></div></div>';
        }

        // 2. 元のテキストアイテム表示 (座標修正用)
        html += '<h4>抽出アイテム (座標確認用)</h4>';
        const rawData = pageData.raw || (Array.isArray(pageData) ? pageData : []);
        rawData.forEach((item, idx) => {
            html += `
                <div class="text-item" id="text-item-${idx}" onmouseenter="highlightBound(${idx}, true)" onmouseleave="highlightBound(${idx}, false)">
                    <textarea rows="2" oninput="updateRawText(${currentPageNum}, ${idx}, this.value)">${item.text}</textarea>
                    <div class="meta">座標: [${item.box_2d.map(Math.round).join(', ')}]</div>
                </div>`;
        });
        elements.textEditor.innerHTML = html;
    }

    window.updateGridCell = (pIdx, rIdx, cIdx, val) => {
        allOcrData[pIdx].grid[rIdx][cIdx] = val;
    };

    window.updateRawText = (pIdx, itemIdx, val) => {
        if (allOcrData[pIdx].raw) {
            allOcrData[pIdx].raw[itemIdx].text = val;
        } else {
            allOcrData[pIdx][itemIdx].text = val;
        }
    };

    function renderOverlay() {
        elements.svgOverlay.innerHTML = '';
        const pageData = allOcrData[currentPageNum];
        if (!pageData) return;
        const rawData = pageData.raw || (Array.isArray(pageData) ? pageData : []);
        rawData.forEach((item, idx) => {
            const [ymin, xmin, ymax, xmax] = item.box_2d;
            const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            rect.setAttribute('x', xmin); rect.setAttribute('y', ymin);
            rect.setAttribute('width', xmax - xmin); rect.setAttribute('height', ymax - ymin);
            rect.setAttribute('class', 'rect-bound'); rect.id = `bound-${idx}`;
            rect.style.pointerEvents = 'all';
            rect.onmouseenter = () => { highlightBound(idx, true); document.getElementById(`text-item-${idx}`).scrollIntoView({ behavior: 'smooth', block: 'center' }); };
            rect.onmouseleave = () => highlightBound(idx, false);
            elements.svgOverlay.appendChild(rect);
        });
    }

    function highlightBound(idx, active) {
        const bound = document.getElementById(`bound-${idx}`);
        const editorItem = document.getElementById(`text-item-${idx}`);
        if (bound) bound.classList.toggle('active', active);
        if (editorItem) editorItem.style.background = active ? '#eff6ff' : '#fafafa';
    }

    async function saveSearchablePdf() {
        showLoading(true, "テキスト座標PDFを出力中...");
        let corrections = [];
        for (let pageIdx in allOcrData) {
            const pageData = allOcrData[pageIdx];
            const rawData = pageData.raw || (Array.isArray(pageData) ? pageData : []);
            rawData.forEach(item => {
                corrections.push({ page_num: parseInt(pageIdx), text: item.text, box_2d: item.box_2d });
            });
        }
        try {
            const response = await fetch(`${API_PREFIX}/save`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pdf_id: currentPdfId, corrections: corrections, filename: elements.outputFilename.value })
            });
            const data = await response.json();
            if (data.error) throw new Error(data.error);
            if (data.download_url) {
                const link = document.createElement('a');
                link.href = data.download_url; link.download = data.filename || 'edited_searchable.pdf';
                link.click(); showNotification("保存しました！");
            }
        } catch (err) { showNotification("保存エラー: " + err.message); }
        finally { showLoading(false); }
    }

    elements.saveTemplateBtn.onclick = async () => {
        const id = elements.templateSelector.value;
        const name = elements.tplName.value;
        const prompt = elements.tplPrompt.value;
        const response = await fetch(`${API_PREFIX}/save_template`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id, content: { name, prompt } })
        });
        if (response.ok) { showNotification("テンプレートを更新しました。"); elements.modal.classList.add('hidden'); location.reload(); }
    };

    function showLoading(show, message = "") {
        elements.loading.classList.toggle('hidden', !show);
        if (message) elements.loading.querySelector('p').innerText = message;
    }
    function showNotification(msg) {
        elements.notification.innerText = msg;
        elements.notification.classList.remove('hidden');
        setTimeout(() => { elements.notification.classList.add('hidden'); }, 3000);
    }
    window.onresize = updateSvgSize;
    </script>
</body>
</html>
