<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>見開きPDF分割ツール</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border-color: #e2e8f0;
            --success: #10b981;
            --error: #ef4444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .container {
            width: 100%;
            max-width: 540px;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 3rem 2rem;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }
        .content { position: relative; z-index: 1; }
        h1 { text-align: center; font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; color: var(--accent); }
        p.subtitle { text-align: center; color: var(--text-muted); margin-bottom: 2.5rem; font-size: 0.95rem; }
        .drop-zone {
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 3rem 2rem;
            text-align: center;
            transition: all 0.3s ease;
            background: #fdfdfd;
            margin-bottom: 1.5rem;
            cursor: pointer;
        }
        .drop-zone.dragover { border-color: var(--accent); background: #f0f7ff; transform: scale(1.01); }
        .icon { font-size: 3rem; margin-bottom: 1rem; display: inline-block; }
        .file-input { display: none; }
        .btn-select {
            display: inline-block;
            background: #f1f5f9;
            color: var(--text-main);
            padding: 0.5rem 1.25rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            margin-top: 1rem;
            transition: background 0.3s ease;
            border: 1px solid var(--border-color);
        }
        .drop-zone:hover .btn-select { background: #e2e8f0; }
        .file-name { display: block; margin-top: 1rem; font-weight: 500; color: var(--accent); word-break: break-all; }
        .form-group { margin-bottom: 1.5rem; }
        .label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--text-muted); font-weight: 600; }
        select {
            width: 100%;
            padding: 0.875rem 1rem;
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-main);
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            appearance: none;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
        .btn-submit { width: 100%; background: var(--accent); color: white; border: none; padding: 1rem; border-radius: 10px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; gap: 0.5rem; box-shadow: 0 4px 6px -1px rgba(59,130,246,0.3); }
        .btn-submit:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 10px 15px -3px rgba(59,130,246,0.4); }
        .btn-submit:active { transform: translateY(0); }
        .btn-submit:disabled { background: #cbd5e1; cursor: not-allowed; transform: none; box-shadow: none; }
        .error { background: #fef2f2; color: var(--error); padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; font-size: 0.9rem; border: 1px solid #fee2e2; text-align: center; }
        .loading { display: none; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 1s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="content">
            <h1>見開きPDF分割ツール</h1>
            <p class="subtitle">PDFの各ページを左右半分に分割します。</p>
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                <div class="error">{{ messages[0] }}</div>
              {% endif %}
            {% endwith %}
            <form id="upload-form" action="/splitter/split" method="POST" enctype="multipart/form-data">
                <div class="drop-zone" id="drop-zone">
                    <span class="icon">📄</span>
                    <h3>PDFファイルをここにドロップ</h3>
                    <p style="color: var(--text-muted); margin-top: 0.5rem; font-size: 0.85rem;">または</p>
                    <span class="btn-select">ファイルを選択する</span>
                    <input type="file" name="pdf_file" id="file-input" class="file-input" accept="application/pdf">
                    <span class="file-name" id="file-name"></span>
                </div>
                <div class="form-group">
                    <label class="label">出力ページの順序</label>
                    <select name="order" id="order">
                        <option value="ltor">左側 → 右側 (一般的な横書き)</option>
                        <option value="rtol">右側 → 左側 (一般的な縦書き・漫画)</option>
                    </select>
                </div>
                <button type="submit" class="btn-submit" id="submit-btn" disabled>
                    処理を開始する
                    <div class="loading" id="loading-spinner"></div>
                </button>
            </form>
        </div>
    </div>
    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const fileNameDisplay = document.getElementById('file-name');
        const submitBtn = document.getElementById('submit-btn');
        const form = document.getElementById('upload-form');
        const loadingSpinner = document.getElementById('loading-spinner');
        ['dragenter','dragover','dragleave','drop'].forEach(e => { dropZone.addEventListener(e, ev => { ev.preventDefault(); ev.stopPropagation(); }); document.body.addEventListener(e, ev => { ev.preventDefault(); ev.stopPropagation(); }); });
        ['dragenter','dragover'].forEach(e => dropZone.addEventListener(e, () => dropZone.classList.add('dragover')));
        ['dragleave','drop'].forEach(e => dropZone.addEventListener(e, () => dropZone.classList.remove('dragover')));
        dropZone.addEventListener('drop', e => { handleFiles(e.dataTransfer.files); });
        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', function() { handleFiles(this.files); });
        function handleFiles(files) {
            if (files.length > 0) {
                const file = files[0];
                if (file.type === 'application/pdf') {
                    fileNameDisplay.textContent = file.name; submitBtn.disabled = false;
                    if (fileInput.files.length === 0 || fileInput.files[0] !== file) {
                        const dt = new DataTransfer(); dt.items.add(file); fileInput.files = dt.files;
                    }
                } else {
                    fileNameDisplay.textContent = 'エラー: PDFファイルを選択してください。';
                    fileNameDisplay.style.color = 'var(--error)'; submitBtn.disabled = true; fileInput.value = '';
                }
            }
        }
        form.addEventListener('submit', () => {
            submitBtn.disabled = true;
            submitBtn.childNodes[0].textContent = '処理中... ';
            loadingSpinner.style.display = 'block';
            setTimeout(() => { submitBtn.disabled = false; submitBtn.childNodes[0].textContent = '処理を開始する '; loadingSpinner.style.display = 'none'; }, 3000);
        });
    </script>
</body>
</html>
