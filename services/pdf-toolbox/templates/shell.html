<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF ツールボックス</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc;
            --surface: #ffffff;
            --surface-2: #f1f5f9;
            --text: #1e293b;
            --text-muted: #64748b;
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.15);
            --accent-ocr: #f59e0b;
            --accent-embed: #10b981;
            --accent-split: #3b82f6;
            --accent-opt: #ec4899;
            --accent-label: #8b5cf6;
            --border: #e2e8f0;
            --radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ===== HEADER ===== */
        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            gap: 2rem;
            height: 60px;
            z-index: 100;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text);
        }

        .logo-icon {
            font-size: 1.4rem;
        }

        .logo span {
            background: linear-gradient(135deg, var(--primary), #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ===== TAB BAR ===== */
        .tab-bar {
            display: flex;
            gap: 0.5rem;
            height: 100%;
            align-items: flex-end;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 0.6rem 1.25rem;
            cursor: pointer;
            border-radius: 8px 8px 0 0;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            position: relative;
            white-space: nowrap;
            border: 1px solid transparent;
            border-bottom: none;
        }

        .tab-btn:hover {
            color: var(--primary);
            background: var(--surface-2);
        }

        .tab-btn.active {
            color: var(--primary);
            background: var(--bg);
            border-color: var(--border);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--bg);
            z-index: 2;
        }

        .tab-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .tab-btn[data-tab="ocr"] .tab-dot { background: var(--accent-ocr); }
        .tab-btn[data-tab="embedder"] .tab-dot { background: var(--accent-embed); }
        .tab-btn[data-tab="splitter"] .tab-dot { background: var(--accent-split); }
        .tab-btn[data-tab="optimizer"] .tab-dot { background: var(--accent-opt); }
        .tab-btn[data-tab="labeler"] .tab-dot { background: var(--accent-label); }

        /* ===== CONTENT ===== */
        .tab-content {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .tab-content iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
            background: white;
        }

        .tab-content iframe.active {
            display: block;
        }

        /* ===== WELCOME SCREEN ===== */
        .welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 2rem;
            animation: fadeIn 0.5s ease;
            background: #fff;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .welcome h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--text);
        }

        .welcome p {
            color: var(--text-muted);
            max-width: 480px;
            text-align: center;
            line-height: 1.6;
        }

        .tool-cards {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1rem;
            max-width: 1100px;
            width: 100%;
            padding: 0 2rem;
        }

        .tool-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .tool-card:hover {
            transform: translateY(-4px);
            border-color: var(--primary);
            box-shadow: 0 10px 20px -5px var(--primary-glow);
        }

        .tool-card .icon {
            font-size: 2rem;
            margin-bottom: 0.75rem;
            display: block;
        }

        .tool-card h3 {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text);
        }

        .tool-card p {
            font-size: 0.8rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .tool-card:nth-child(1) { --card-accent: var(--accent-ocr); }
        .tool-card:nth-child(2) { --card-accent: var(--accent-embed); }
        .tool-card:nth-child(3) { --card-accent: var(--accent-split); }
        .tool-card:nth-child(4) { --card-accent: var(--accent-opt); }

        .tool-card:hover h3 { color: var(--primary); }

        @media (max-width: 768px) {
            .tool-cards { grid-template-columns: repeat(2, 1fr); }
            .tab-btn { font-size: 0.75rem; padding: 0.5rem 0.75rem; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <span class="logo-icon">📄</span>
            <span>PDF ツールボックス</span>
        </div>
        <nav class="tab-bar" id="tabBar">
            <button class="tab-btn" data-tab="ocr"><span class="tab-dot"></span>テキスト座標抽出</button>
            <button class="tab-btn" data-tab="embedder"><span class="tab-dot"></span>Markdown抽出</button>
            <button class="tab-btn" data-tab="splitter"><span class="tab-dot"></span>見開き分割</button>
            <button class="tab-btn" data-tab="optimizer"><span class="tab-dot"></span>AI目次ページ</button>
            <button class="tab-btn" data-tab="labeler"><span class="tab-dot"></span>ページ見出し付与</button>
        </nav>
    </header>

    <div class="tab-content" id="tabContent">
        <!-- Welcome screen shown initially -->
        <div class="welcome" id="welcomeScreen">
            <h2>PDF ツールボックスへようこそ</h2>
            <p>5つのPDFツールが1つに統合されました。上のタブまたは下のカードをクリックして開始してください。</p>
            <div class="tool-cards">
                <div class="tool-card" onclick="switchTab('ocr')">
                    <span class="icon">🔍</span>
                    <h3>テキスト座標抽出</h3>
                    <p>ページ画像から座標付きテキストを抽出・編集</p>
                </div>
                <div class="tool-card" onclick="switchTab('embedder')">
                    <span class="icon">📋</span>
                    <h3>Markdown抽出</h3>
                    <p>ページ画像をMarkdown化してPDF/MD保存</p>
                </div>
                <div class="tool-card" onclick="switchTab('splitter')">
                    <span class="icon">✂️</span>
                    <h3>見開き分割</h3>
                    <p>見開きPDFを左右に分割</p>
                </div>
                <div class="tool-card" onclick="switchTab('optimizer')">
                    <span class="icon">📑</span>
                    <h3>AI目次ページ</h3>
                    <p>各ページをAIで要約し、先頭に目次を追加</p>
                </div>
                <div class="tool-card" onclick="switchTab('labeler')">
                    <span class="icon">🏷️</span>
                    <h3>ページ見出し付与</h3>
                    <p>手入力した見出しを画像としてページに焼き込み</p>
                </div>
            </div>
        </div>

        <!-- Iframes loaded lazily -->
        <iframe id="iframe-ocr" data-src="/ocr/"></iframe>
        <iframe id="iframe-embedder" data-src="/embedder/"></iframe>
        <iframe id="iframe-splitter" data-src="/splitter/"></iframe>
        <iframe id="iframe-optimizer" data-src="/optimizer/"></iframe>
        <iframe id="iframe-labeler" data-src="/labeler/"></iframe>
    </div>

    <script>
        const tabBtns = document.querySelectorAll('.tab-btn');
        const iframes = document.querySelectorAll('iframe');
        const welcome = document.getElementById('welcomeScreen');

        function switchTab(tabId) {
            // Hide welcome
            welcome.style.display = 'none';

            // Update buttons
            tabBtns.forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tab === tabId);
            });

            // Show target iframe, hide others
            iframes.forEach(iframe => {
                const isTarget = iframe.id === `iframe-${tabId}`;
                iframe.classList.toggle('active', isTarget);

                // Lazy load: set src on first activation
                if (isTarget && !iframe.src) {
                    iframe.src = iframe.dataset.src;
                }
            });
        }

        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => switchTab(btn.dataset.tab));
        });
    </script>
</body>
</html>
