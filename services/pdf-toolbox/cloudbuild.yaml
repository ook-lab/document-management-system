steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '-t'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/pdf-toolbox:latest'
      - '-f'
      - 'services/pdf-toolbox/Dockerfile'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'push'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/pdf-toolbox:latest'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    dir: 'services/pdf-toolbox'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'pdf-toolbox'
      - '--image'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/pdf-toolbox:latest'
      - '--region'
      - 'asia-northeast1'
      - '--allow-unauthenticated'
      - '--service-account=document-management-system@$PROJECT_ID.iam.gserviceaccount.com'
      - '--memory'
      - '1Gi'
      - '--update-env-vars=GOOGLE_CLOUD_PROJECT=$PROJECT_ID,VERTEX_AI_REGION=${_VERTEX_AI_REGION}'
      - '--remove-env-vars=GOOGLE_AI_API_KEY'
      - '--set-secrets=GOOGLE_AI_API_KEY=GOOGLE_AI_API_KEY:latest,GOOGLE_APPLICATION_CREDENTIALS=GOOGLE_APPLICATION_CREDENTIALS:latest,GMAIL_USER_EMAIL=GMAIL_USER_EMAIL:latest'

images:
  - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/pdf-toolbox:latest'

substitutions:
  _VERTEX_AI_REGION: 'us-central1'

options:
  logging: CLOUD_LOGGING_ONLY
  substitutionOption: 'ALLOW_LOOSE'
