steps:
  # キャッシュ用に既存イメージを pull（失敗しても続行）
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'docker pull asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/quiz-maker-ema:latest || true'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--cache-from'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/quiz-maker-ema:latest'
      - '-t'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/quiz-maker-ema:latest'
      - '-f'
      - 'services/quiz-maker-ema/Dockerfile'
      - '.'
    dir: '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/quiz-maker-ema:latest'

  # Deployment Step
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'quiz-maker-ema'
      - '--image=asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/quiz-maker-ema:latest'
      - '--region=asia-northeast1'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--timeout=300'
      - '--allow-unauthenticated'
      - '--service-account=document-management-system@$PROJECT_ID.iam.gserviceaccount.com'
      - '--update-env-vars=SUPABASE_URL=${_SUPABASE_URL},SUPABASE_KEY=${_SUPABASE_KEY},SUPABASE_SERVICE_ROLE_KEY=${_SUPABASE_SERVICE_ROLE_KEY},EMA_SCHOOL_FOLDER_ID=${_EMA_SCHOOL_FOLDER_ID},HOME_LIVING_FOLDER_ID=${_HOME_LIVING_FOLDER_ID},HOME_COOKING_FOLDER_ID=${_HOME_COOKING_FOLDER_ID},LOG_LEVEL=INFO'
      - '--set-secrets=GEMINI_AI_API_KEY=GEMINI_E_AI_API_KEY:latest'

images:
  - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/quiz-maker-ema:latest'

substitutions:
  _SUPABASE_URL: ''
  _SUPABASE_KEY: ''
  _SUPABASE_SERVICE_ROLE_KEY: ''
  _EMA_SCHOOL_FOLDER_ID: ''
  _HOME_LIVING_FOLDER_ID: ''
  _HOME_COOKING_FOLDER_ID: ''

options:
  logging: CLOUD_LOGGING_ONLY
  substitutionOption: ALLOW_LOOSE

timeout: 600s
