<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sansu-base | 解答記録</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$','$'],['\\(','\\)']], displayMath: [['$$','$$'],['\\[','\\]']], processEscapes: true },
            options: { ignoreHtmlClass: 'tex2jax_ignore', processHtmlClass: 'tex2jax_process' }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        /* ── layout ─────────────────────────────────── */
        .page-body {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem;
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 1.25rem;
            min-height: calc(100vh - 80px);
        }

        /* ── card shell ─────────────────────────────── */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            box-shadow: var(--shadow-premium);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .card-header {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--card-border);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
        }
        .card-header h2 {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 0.45rem;
        }
        .card-body {
            flex: 1;
            overflow-y: auto;
            padding: 1rem 1.25rem;
        }

        /* ── filter bar ──────────────────────────────── */
        .filter-bar {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            margin-bottom: 1rem;
        }
        .filter-bar select {
            width: 100%;
            padding: 0.55rem 0.75rem;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.88rem;
            background: white;
            color: var(--text-main);
            cursor: pointer;
            outline: none;
            transition: var(--transition-smooth);
        }
        .filter-bar select:focus { border-color: var(--accent-primary); box-shadow: 0 0 0 3px rgba(79,70,229,.12); }

        /* ── problem list ────────────────────────────── */
        .prob-list { display: flex; flex-direction: column; gap: 0.45rem; }
        .prob-item {
            padding: 0.65rem 0.85rem;
            border: 1px solid #e8ecf1;
            border-radius: 10px;
            cursor: pointer;
            transition: var(--transition-smooth);
            background: #fafafa;
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }
        .prob-item:hover { border-color: var(--accent-primary); background: white; box-shadow: 0 2px 8px rgba(79,70,229,.08); }
        .prob-item.selected { border-color: var(--accent-primary); background: rgba(79,70,229,.04); }
        .prob-item-top { display: flex; align-items: center; gap: 0.5rem; }
        .prob-id-badge {
            font-size: 0.72rem; font-weight: 700; padding: 0.15rem 0.5rem;
            border-radius: 6px; background: var(--accent-gradient); color: white; white-space: nowrap;
        }
        .prob-book { font-size: 0.8rem; font-weight: 600; color: var(--text-main); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .prob-chapter { font-size: 0.73rem; color: var(--text-muted); }
        .prob-stat {
            display: flex; align-items: center; gap: 0.4rem; margin-top: 0.1rem;
        }
        .ans-dot {
            width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
        }
        .ans-dot.correct { background: #10b981; }
        .ans-dot.wrong   { background: #ef4444; }
        .ans-dot.none    { background: #d1d5db; }
        .prob-stat-text { font-size: 0.72rem; color: var(--text-muted); }

        /* ── empty / loading states ─────────────────── */
        .empty-state {
            text-align: center; padding: 2.5rem 1rem; color: var(--text-muted); font-size: 0.85rem;
        }
        .empty-state i { font-size: 2rem; margin-bottom: 0.75rem; display: block; opacity: 0.35; }

        /* ── detail panel ────────────────────────────── */
        .detail-placeholder {
            display: flex; align-items: center; justify-content: center; flex-direction: column;
            gap: 0.75rem; height: 100%; color: var(--text-muted);
        }
        .detail-placeholder i { font-size: 3rem; opacity: 0.2; }

        /* answer action buttons */
        .answer-btns {
            display: flex; gap: 1rem; padding: 1rem 1.25rem;
            border-top: 1px solid var(--card-border); flex-shrink: 0;
            background: rgba(255,255,255,.5);
        }
        .btn-correct {
            flex: 1; padding: 0.8rem; border: none; border-radius: 12px;
            font-size: 1.5rem; font-weight: 900; cursor: pointer;
            background: linear-gradient(135deg,#10b981,#059669); color: white;
            box-shadow: 0 4px 14px rgba(16,185,129,.3);
            transition: var(--transition-smooth);
        }
        .btn-wrong {
            flex: 1; padding: 0.8rem; border: none; border-radius: 12px;
            font-size: 1.5rem; font-weight: 900; cursor: pointer;
            background: linear-gradient(135deg,#ef4444,#dc2626); color: white;
            box-shadow: 0 4px 14px rgba(239,68,68,.3);
            transition: var(--transition-smooth);
        }
        .btn-correct:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(16,185,129,.4); }
        .btn-wrong:hover   { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(239,68,68,.4); }
        .btn-correct:disabled, .btn-wrong:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        /* note input */
        .note-row {
            padding: 0 1.25rem 0.75rem;
            display: flex; gap: 0.5rem; flex-shrink: 0;
        }
        .note-row input {
            flex: 1; padding: 0.45rem 0.7rem; border: 1px solid #e2e8f0;
            border-radius: 8px; font-size: 0.82rem; outline: none;
        }
        .note-row input:focus { border-color: var(--accent-primary); }

        /* problem body */
        .prob-body { padding: 1.25rem; overflow-y: auto; flex: 1; }
        .section-label {
            font-size: 0.75rem; font-weight: 700; letter-spacing: 0.05em;
            text-transform: uppercase; color: var(--text-muted); margin: 1rem 0 0.5rem;
        }
        .section-label:first-child { margin-top: 0; }
        .md-block {
            font-size: 0.88rem; line-height: 1.75; color: #1e293b;
            white-space: pre-wrap; background: #f8fafc; border-radius: 8px;
            padding: 0.75rem 1rem; border-left: 3px solid var(--accent-primary);
        }
        .exp-md-block {
            font-size: 0.88rem; line-height: 1.75; color: #1e293b;
            white-space: pre-wrap; background: #f0fdf4; border-radius: 8px;
            padding: 0.75rem 1rem; border-left: 3px solid #10b981;
        }

        /* history table */
        .history-section { padding: 0 1.25rem 1.25rem; flex-shrink: 0; }
        .history-section h3 { font-size: 0.8rem; font-weight: 700; color: var(--text-muted); margin-bottom: 0.5rem; }
        .history-table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
        .history-table th {
            text-align: left; padding: 0.3rem 0.5rem;
            background: #f1f5f9; color: var(--text-muted); font-weight: 600;
            border-bottom: 1px solid #e2e8f0;
        }
        .history-table td {
            padding: 0.35rem 0.5rem; border-bottom: 1px solid #f1f5f9; color: #334155;
        }
        .result-circle { color: #10b981; font-size: 1rem; font-weight: 900; }
        .result-cross  { color: #ef4444; font-size: 1rem; font-weight: 900; }

        /* tags */
        .tag-chip {
            display: inline-block; font-size: 0.72rem; font-weight: 600; padding: 0.2rem 0.55rem;
            border-radius: 20px; background: rgba(79,70,229,.1); color: var(--accent-primary);
            margin: 0.1rem 0.15rem 0.1rem 0;
        }

        /* toast */
        #toast {
            position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(20px);
            background: #0f172a; color: white; padding: 0.7rem 1.5rem; border-radius: 10px;
            font-size: 0.88rem; font-weight: 600; opacity: 0; pointer-events: none;
            transition: all 0.3s; z-index: 9999; white-space: nowrap;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        #toast.correct-toast { background: linear-gradient(135deg,#10b981,#059669); }
        #toast.wrong-toast   { background: linear-gradient(135deg,#ef4444,#dc2626); }

        /* count badge */
        .count-badge {
            font-size: 0.72rem; font-weight: 700; padding: 0.1rem 0.55rem;
            border-radius: 20px; background: #e2e8f0; color: #475569;
        }
    </style>
</head>
<body class="tex2jax_process">

<header>
    <div class="brand">
        <div class="brand-logo"><i class="fa-solid">∑</i></div>
        <h1>sansu-base</h1>
    </div>
    <nav style="display:flex;gap:1.5rem;">
        <a href="/" style="text-decoration:none;color:var(--text-muted);font-weight:600;font-size:0.95rem;display:flex;align-items:center;gap:0.5rem;">
            <i class="fa-solid fa-camera"></i> OCR登録
        </a>
        <a href="/manual-input" style="text-decoration:none;color:var(--text-muted);font-weight:600;font-size:0.95rem;display:flex;align-items:center;gap:0.5rem;">
            <i class="fa-solid fa-pen-to-square"></i> 問題を編集
        </a>
        <a href="/answer" style="text-decoration:none;color:var(--accent-primary);font-weight:700;font-size:0.95rem;display:flex;align-items:center;gap:0.5rem;border-bottom:2px solid var(--accent-primary);padding-bottom:0.25rem;">
            <i class="fa-solid fa-circle-check"></i> 解答記録
        </a>
        <a href="/study" style="text-decoration:none;color:var(--text-muted);font-weight:600;font-size:0.95rem;display:flex;align-items:center;gap:0.5rem;">
            <i class="fa-solid fa-brain"></i> 学習提案
        </a>
    </nav>
</header>

<div class="page-body">

    <!-- ─── Left: Filter + List ─── -->
    <div class="card">
        <div class="card-header">
            <h2><i class="fa-solid fa-list-ul" style="color:var(--accent-primary);"></i> 問題リスト</h2>
            <span class="count-badge" id="prob-count">0件</span>
        </div>
        <div class="card-body">
            <div class="filter-bar">
                <select id="filter-book">
                    <option value="">── 教材名（すべて）──</option>
                </select>
                <select id="filter-chapter">
                    <option value="">── 章・回（すべて）──</option>
                </select>
            </div>
            <div class="prob-list" id="prob-list">
                <div class="empty-state">
                    <i class="fa-solid fa-book-open"></i>
                    <p>教材名を選択して問題を絞り込んでください</p>
                </div>
            </div>
        </div>
    </div>

    <!-- ─── Right: Detail + Answer ─── -->
    <div class="card" id="detail-card">
        <div class="card-header" id="detail-header" style="display:none;">
            <div style="flex:1;min-width:0;">
                <h2 id="detail-display-id" style="font-size:1rem;"></h2>
                <div style="font-size:0.78rem;color:var(--text-muted);margin-top:0.1rem;" id="detail-meta"></div>
            </div>
            <div id="detail-stat-badge" style="font-size:0.8rem;font-weight:700;color:#475569;"></div>
        </div>

        <!-- placeholder when nothing selected -->
        <div class="detail-placeholder" id="detail-placeholder">
            <i class="fa-solid fa-arrow-left"></i>
            <p style="font-size:0.9rem;">左のリストから問題を選択</p>
        </div>

        <!-- problem + explanation body -->
        <div class="prob-body tex2jax_ignore" id="detail-body" style="display:none;"></div>

        <!-- history -->
        <div class="history-section" id="detail-history" style="display:none;">
            <h3><i class="fa-solid fa-clock-rotate-left"></i> 解答履歴</h3>
            <table class="history-table">
                <thead><tr><th>実施日</th><th>小問</th><th>結果</th><th>メモ</th><th></th></tr></thead>
                <tbody id="history-tbody"></tbody>
            </table>
        </div>

        <!-- answer input area -->
        <div id="answer-input-area" style="display:none;border-top:1px solid var(--card-border);padding:0.9rem 1.25rem;display:none;flex-direction:column;gap:0.6rem;background:rgba(255,255,255,.5);flex-shrink:0;">
            <!-- 実施日 -->
            <div style="display:flex;align-items:center;gap:0.6rem;">
                <label style="font-size:0.78rem;font-weight:700;color:var(--text-muted);white-space:nowrap;">実施日</label>
                <input type="date" id="practice-date" style="padding:0.35rem 0.6rem;border:1px solid #e2e8f0;border-radius:8px;font-size:0.85rem;outline:none;flex:1;">
            </div>
            <!-- 小問選択 -->
            <div style="display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;">
                <label style="font-size:0.78rem;font-weight:700;color:var(--text-muted);white-space:nowrap;">小問</label>
                <div id="sub-question-chips" style="display:flex;gap:0.35rem;flex-wrap:wrap;"></div>
            </div>
            <!-- メモ -->
            <div style="display:flex;gap:0.5rem;">
                <input type="text" id="note-input" placeholder="メモ（任意）" maxlength="200"
                    style="flex:1;padding:0.4rem 0.7rem;border:1px solid #e2e8f0;border-radius:8px;font-size:0.82rem;outline:none;">
            </div>
            <!-- ○✕ ボタン -->
            <div style="display:flex;gap:0.75rem;">
                <button class="btn-correct" id="btn-correct">○ 正解</button>
                <button class="btn-wrong"   id="btn-wrong">✕ 不正解</button>
            </div>
        </div>
    </div>

</div>

<div id="toast"></div>

<script>
    // ─── state ───────────────────────────────────────
    let allProblems = [];
    let selectedProblem = null;
    let selectedSubQuestion = null; // null = 全体

    // ─── helpers ─────────────────────────────────────
    function showToast(msg, type = '') {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = 'show' + (type ? ' ' + type + '-toast' : '');
        clearTimeout(t._tid);
        t._tid = setTimeout(() => { t.className = ''; }, 2600);
    }

    function todayStr() {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    function relativeDate(isoStr) {
        if (!isoStr) return null;
        const diff = Date.now() - new Date(isoStr).getTime();
        const mins = Math.floor(diff / 60000);
        if (mins < 1) return 'たった今';
        if (mins < 60) return `${mins}分前`;
        const hrs = Math.floor(mins / 60);
        if (hrs < 24) return `${hrs}時間前`;
        const days = Math.floor(hrs / 24);
        if (days < 30) return `${days}日前`;
        return `${Math.floor(days / 30)}ヶ月前`;
    }

    function formatDate(dateStr) {
        if (!dateStr) return '';
        // practice_date は "YYYY-MM-DD"、answered_at は ISO 文字列
        const s = dateStr.substring(0, 10);
        const [y, m, d] = s.split('-');
        return `${y}/${m}/${d}`;
    }

    // ─── 問題文から小問ラベルを抽出 ──────────────────
    function extractSubQuestions(markdown) {
        const labels = new Set();
        // (1) (2) （1） （２） など全角・半角混在に対応
        const re = /[（(]([１-９\d][０-９\d]*)[）)]/g;
        let m;
        while ((m = re.exec(markdown)) !== null) {
            // 全角数字を半角に変換
            const num = m[1].replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));
            labels.add(`(${num})`);
        }
        return Array.from(labels).sort((a, b) => {
            const na = parseInt(a.replace(/\D/g, ''));
            const nb = parseInt(b.replace(/\D/g, ''));
            return na - nb;
        });
    }

    function renderSubQuestionChips(subLabels) {
        const container = document.getElementById('sub-question-chips');
        container.innerHTML = '';
        selectedSubQuestion = null;

        const allLabels = ['全体', ...subLabels];
        allLabels.forEach((label, i) => {
            const chip = document.createElement('button');
            chip.textContent = label;
            chip.dataset.val = label === '全体' ? '' : label;
            chip.style.cssText = `
                padding:0.25rem 0.65rem;border-radius:20px;font-size:0.78rem;font-weight:700;
                cursor:pointer;border:1px solid #cbd5e1;background:${i === 0 ? 'var(--accent-primary)' : '#f1f5f9'};
                color:${i === 0 ? 'white' : '#475569'};transition:all .2s;
            `;
            if (i === 0) selectedSubQuestion = '';
            chip.addEventListener('click', () => {
                container.querySelectorAll('button').forEach(b => {
                    b.style.background = '#f1f5f9';
                    b.style.color = '#475569';
                    b.style.borderColor = '#cbd5e1';
                });
                chip.style.background = 'var(--accent-primary)';
                chip.style.color = 'white';
                chip.style.borderColor = 'var(--accent-primary)';
                selectedSubQuestion = chip.dataset.val;
            });
            container.appendChild(chip);
        });
    }

    // ─── load source books ────────────────────────────
    async function loadSourceBooks() {
        const res = await fetch('/api/history/source-books');
        const books = await res.json();
        const sel = document.getElementById('filter-book');
        books.forEach(b => {
            const opt = document.createElement('option');
            opt.value = b; opt.textContent = b;
            sel.appendChild(opt);
        });
    }

    async function loadChapters(book) {
        const sel = document.getElementById('filter-chapter');
        sel.innerHTML = '<option value="">── 章・回（すべて）──</option>';
        if (!book) return;
        const res = await fetch(`/api/history/chapters?source_book=${encodeURIComponent(book)}`);
        const chapters = await res.json();
        chapters.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c; opt.textContent = c;
            sel.appendChild(opt);
        });
    }

    // ─── load problem list ────────────────────────────
    async function loadProblems() {
        const book    = document.getElementById('filter-book').value;
        const chapter = document.getElementById('filter-chapter').value;
        let url = '/api/answer/problems';
        const params = [];
        if (book)    params.push('source_book=' + encodeURIComponent(book));
        if (chapter) params.push('chapter='     + encodeURIComponent(chapter));
        if (params.length) url += '?' + params.join('&');

        const res = await fetch(url);
        allProblems = await res.json();
        renderProbList(allProblems);
    }

    function renderProbList(problems) {
        const list = document.getElementById('prob-list');
        document.getElementById('prob-count').textContent = problems.length + '件';
        if (!problems.length) {
            list.innerHTML = '<div class="empty-state"><i class="fa-solid fa-inbox"></i><p>該当する問題がありません</p></div>';
            return;
        }
        list.innerHTML = problems.map(p => {
            const total  = p.total_answers;
            const dotCls = total === 0 ? 'none' : (p.last_is_correct ? 'correct' : 'wrong');
            const statTxt = total === 0
                ? '未回答'
                : `${p.correct_answers}/${total}回正解 · ${relativeDate(p.last_answered_at)}`;
            const chapLine = p.chapter ? `<div class="prob-chapter">${p.chapter}</div>` : '';
            return `
            <div class="prob-item" data-id="${p.display_id}" onclick="selectProblem('${p.display_id}')">
                <div class="prob-item-top">
                    <span class="prob-id-badge">${p.display_id}</span>
                    <span class="prob-book">${p.source_book || ''}</span>
                </div>
                ${chapLine}
                <div class="prob-stat">
                    <span class="ans-dot ${dotCls}"></span>
                    <span class="prob-stat-text">${statTxt}</span>
                </div>
            </div>`;
        }).join('');
    }

    // ─── select & show problem ────────────────────────
    async function selectProblem(displayId) {
        document.querySelectorAll('.prob-item').forEach(el => {
            el.classList.toggle('selected', el.dataset.id === displayId);
        });

        const res = await fetch(`/api/answer/detail/${encodeURIComponent(displayId)}`);
        if (!res.ok) { showToast('問題の取得に失敗しました', 'wrong'); return; }
        const detail = await res.json();
        selectedProblem = detail;

        document.getElementById('detail-placeholder').style.display = 'none';
        document.getElementById('detail-header').style.display = 'flex';
        document.getElementById('detail-display-id').textContent =
            `${detail.display_id}  ${detail.source_book || ''}`;
        document.getElementById('detail-meta').textContent =
            [detail.chapter, detail.unit].filter(Boolean).join(' · ');

        const tags = detail.tags || [];
        const body = document.getElementById('detail-body');
        body.style.display = 'block';
        const tagHtml = tags.length
            ? '<div style="margin-bottom:0.75rem;">' + tags.map(t => `<span class="tag-chip">${t}</span>`).join('') + '</div>'
            : '';
        body.innerHTML = tagHtml
            + '<div class="section-label">問題</div>'
            + `<div class="md-block tex2jax_process">${escapeHtml(detail.problem_markdown || '')}</div>`
            + '<div class="section-label">解説</div>'
            + `<div class="exp-md-block tex2jax_process">${escapeHtml(detail.explanation_markdown || '')}</div>`;
        if (window.MathJax) MathJax.typesetPromise([body]).catch(() => {});

        await refreshHistory(displayId);

        // 小問チップを生成
        const subLabels = extractSubQuestions(detail.problem_markdown || '');
        renderSubQuestionChips(subLabels);

        // 入力エリア表示、日付を今日にリセット
        const inputArea = document.getElementById('answer-input-area');
        inputArea.style.display = 'flex';
        document.getElementById('practice-date').value = todayStr();
        document.getElementById('note-input').value = '';

        updateStatBadge(displayId);
    }

    function updateStatBadge(displayId) {
        const stat = allProblems.find(p => p.display_id === displayId);
        if (!stat) return;
        const pct = stat.total_answers
            ? Math.round(stat.correct_answers / stat.total_answers * 100) + '%'
            : '-';
        document.getElementById('detail-stat-badge').textContent =
            `${stat.correct_answers}/${stat.total_answers}回 (${pct})`;
    }

    async function refreshHistory(displayId) {
        const hres = await fetch(`/api/answer/history/${encodeURIComponent(displayId)}`);
        const history = await hres.json();
        const tbody = document.getElementById('history-tbody');
        document.getElementById('detail-history').style.display = 'block';
        if (!history.length) {
            tbody.innerHTML = '<tr><td colspan="5" style="color:#94a3b8;text-align:center;padding:0.75rem;">まだ解答がありません</td></tr>';
            return;
        }
        tbody.innerHTML = history.map(h => `
            <tr data-record-id="${h.id}">
                <td>${formatDate(h.practice_date || h.answered_at)}</td>
                <td style="color:#475569;font-weight:600;">${h.sub_question || '全体'}</td>
                <td>${h.is_correct
                    ? '<span class="result-circle">○</span>'
                    : '<span class="result-cross">✕</span>'}</td>
                <td style="color:#64748b;">${h.note || ''}</td>
                <td>
                    <button onclick="deleteRecord('${h.id}')"
                        style="background:none;border:none;cursor:pointer;color:#cbd5e1;font-size:0.85rem;padding:0.1rem 0.3rem;border-radius:4px;transition:color .15s;"
                        onmouseover="this.style.color='#ef4444'" onmouseout="this.style.color='#cbd5e1'"
                        title="削除">✕</button>
                </td>
            </tr>`).join('');
    }

    async function deleteRecord(recordId) {
        if (!confirm('この解答記録を削除しますか？')) return;
        const res = await fetch(`/api/answer/record/${recordId}`, { method: 'DELETE' });
        if (!res.ok) { showToast('削除に失敗しました', 'wrong'); return; }
        showToast('削除しました');
        await refreshHistory(selectedProblem.display_id);
        await loadProblems();
        updateStatBadge(selectedProblem.display_id);
        document.querySelectorAll('.prob-item').forEach(el => {
            el.classList.toggle('selected', el.dataset.id === selectedProblem.display_id);
        });
    }

    // ─── record answer ────────────────────────────────
    async function recordAnswer(isCorrect) {
        if (!selectedProblem) return;
        const note         = document.getElementById('note-input').value.trim();
        const practiceDate = document.getElementById('practice-date').value;
        const subQuestion  = selectedSubQuestion || null;

        const btn1 = document.getElementById('btn-correct');
        const btn2 = document.getElementById('btn-wrong');
        btn1.disabled = btn2.disabled = true;

        const res = await fetch('/api/answer/record', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                display_id:    selectedProblem.display_id,
                is_correct:    isCorrect,
                note,
                sub_question:  subQuestion,
                practice_date: practiceDate || null,
            })
        });
        btn1.disabled = btn2.disabled = false;

        if (!res.ok) { showToast('保存に失敗しました', 'wrong'); return; }
        document.getElementById('note-input').value = '';
        const label = subQuestion ? ` ${subQuestion}` : '';
        showToast(isCorrect ? `○ 正解！${label}` : `✕ 不正解${label}`, isCorrect ? 'correct' : 'wrong');

        await refreshHistory(selectedProblem.display_id);
        await loadProblems();
        updateStatBadge(selectedProblem.display_id);
        document.querySelectorAll('.prob-item').forEach(el => {
            el.classList.toggle('selected', el.dataset.id === selectedProblem.display_id);
        });
    }

    function escapeHtml(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ─── events ───────────────────────────────────────
    document.getElementById('filter-book').addEventListener('change', async function () {
        await loadChapters(this.value);
        await loadProblems();
    });
    document.getElementById('filter-chapter').addEventListener('change', loadProblems);
    document.getElementById('btn-correct').addEventListener('click', () => recordAnswer(true));
    document.getElementById('btn-wrong').addEventListener('click',   () => recordAnswer(false));

    // ─── init ─────────────────────────────────────────
    (async () => {
        await loadSourceBooks();
        await loadProblems();
    })();
</script>
</body>
</html>
