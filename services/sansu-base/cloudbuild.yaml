steps:
  # Pull existing image for cache
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'docker pull asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/sansu-base:latest || true'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--cache-from'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/sansu-base:latest'
      - '-t'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/sansu-base:latest'
      - '-f'
      - 'services/sansu-base/Dockerfile'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/sansu-base:latest'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'sansu-base'
      - '--image=asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/sansu-base:latest'
      - '--region=asia-northeast1'
      - '--allow-unauthenticated'
      - '--timeout=3600'
      - '--service-account=document-management-system@$PROJECT_ID.iam.gserviceaccount.com'
      - '--update-env-vars=GOOGLE_CLOUD_PROJECT=$PROJECT_ID'
      - '--remove-env-vars=SUPABASE_URL,SUPABASE_SERVICE_ROLE_KEY,SUPABASE_KEY,GOOGLE_AI_API_KEY'
      - '--set-secrets=SUPABASE_URL=SUPABASE_URL:latest,SUPABASE_SERVICE_ROLE_KEY=SUPABASE_SERVICE_ROLE_KEY:latest,SUPABASE_KEY=SUPABASE_KEY:latest,GOOGLE_AI_API_KEY=GOOGLE_AI_API_KEY:latest'

images:
  - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/sansu-base:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  substitutionOption: ALLOW_LOOSE
