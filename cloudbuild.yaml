# =============================================================================
# 警告（トリガー設計）
# このファイルは html-to-a4 のビルド・デプロイ用。
# Cloud Build の「リポジトリ push トリガー」をこの cloudbuild.yaml に向けたまま、
# 各サービスの services/*/cloudbuild.yaml にも別トリガーを付けると、
# 同じコミットで二重ビルド・二重デプロイになる。
# 「変更のあったサービスだけ」運用するなら:
#   - 各サービス用トリガーは services/<name>/cloudbuild.yaml のみを指す
#   - 本ファイル用のトリガーは無効化するか、手動 submit 専用にする
#   - 詳細は scripts/deploy/README.md（includedFiles / dms/** / 二重トリガー回避）
# =============================================================================

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/html-to-a4:${_TAG}'
      - '-f'
      - 'services/html-to-a4/Dockerfile'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/html-to-a4:${_TAG}'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'html-to-a4'
      - '--image=asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/html-to-a4:${_TAG}'
      - '--region=asia-northeast1'
      - '--allow-unauthenticated'
      - '--service-account=document-management-system@$PROJECT_ID.iam.gserviceaccount.com'
      - '--update-env-vars=GOOGLE_CLOUD_PROJECT=$PROJECT_ID'

images:
  - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/html-to-a4:${_TAG}'

substitutions:
  _TAG: 'latest'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
  substitutionOption: ALLOW_LOOSE

timeout: 3600s
